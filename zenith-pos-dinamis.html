<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir POS - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
        .radio-peer:checked + div { transform: scale(0.95); background-color: #10b981; color: white; border-color: #10b981; }
        .radio-peer-month:checked + div { transform: scale(0.95); background-color: #0f172a; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        .spinner { border: 3px solid rgba(16, 185, 129, 0.3); border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 pb-32 pt-4 px-4 flex justify-center selection:bg-emerald-200">

    <main class="w-full max-w-md relative z-10 flex flex-col min-h-[90vh]">
        <header class="mb-5 flex items-center justify-between bg-white p-4 rounded-[2rem] shadow-sm border relative">
            <a href="index.html" class="p-2 bg-slate-50 rounded-full text-slate-500 mr-2"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="flex items-center gap-3 flex-grow">
                <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center shrink-0"><i data-lucide="smartphone-charging" class="w-6 h-6 text-emerald-400"></i></div>
                <div><h1 class="font-black text-xl leading-none">Kasir POS</h1><p class="text-[10px] font-bold text-emerald-600 uppercase">Live Sync</p></div>
            </div>
            <button onclick="fetchCustomersFromCloud()" id="btnRefresh" class="p-2.5 bg-emerald-50 rounded-xl text-emerald-600"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </header>

        <div id="customerStats" class="mb-5 glass-panel p-4 rounded-3xl hidden">
            <div class="flex justify-between mb-3 border-b pb-2"><span class="text-xs font-bold text-slate-500">Rekap <span id="statName" class="text-emerald-600 font-black">...</span></span></div>
            <div class="flex justify-between items-end">
                <div><p class="text-[10px] font-bold text-slate-400">Sisa Hutang</p><p class="text-xl font-black text-slate-800" id="statSisa">Rp 0</p></div>
                <div class="text-right"><p class="text-[10px] font-bold text-slate-400">Sudah Terbayar</p><p class="text-sm font-bold text-emerald-600" id="statTerbayar">Rp 0</p></div>
            </div>
        </div>

        <section class="glass-panel p-5 rounded-[2rem] mb-6">
            <form id="posForm" class="space-y-6" onsubmit="event.preventDefault();">
                <div>
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2">1. PELANGGAN DARI GOOGLE SHEETS</label>
                    <div id="customerGrid" class="grid grid-cols-3 gap-2 max-h-40 overflow-y-auto no-scrollbar p-1"></div>
                </div>
                <div>
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2">2. CICILAN KE</label>
                    <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="cicilanGrid"></div>
                </div>
                <div>
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2">3. NOMINAL MASUK</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-5 text-emerald-500 font-black text-xl">Rp</span>
                        <input type="text" id="nominal" inputmode="numeric" class="w-full pl-14 pr-5 py-4 bg-slate-50 border rounded-2xl text-slate-900 font-black text-2xl outline-none">
                    </div>
                </div>
            </form>
        </section>

        <section class="mb-8 opacity-0 translate-y-2 transition-all duration-300" id="previewContainer">
            <div class="flex flex-col items-end px-2"><div class="p-4 bg-[#d9fdd3] rounded-2xl rounded-tr-none text-[#111b21] max-w-[95%]"><p id="previewText" class="whitespace-pre-wrap text-[12px] font-medium"></p></div></div>
        </section>

        <div class="fixed bottom-6 left-0 right-0 px-4 z-40 flex justify-center pointer-events-none">
            <button id="btnProses" class="pointer-events-auto w-full max-w-md bg-slate-900 text-white font-extrabold py-4 rounded-[1.25rem] active:scale-95 flex justify-center gap-2 border">
                <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i><span id="txtBtnProses">Catat & Kirim WA Kuitansi</span>
            </button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        
        // KONFIGURASI DITANAM LANGSUNG
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbxHjPjVfzD2QYpxGgZLAC0jhBReN4nFFw-Yi1vfY4rG_BgF6zTxr0_J0IwFR7WDyH3T/exec",
            WA_ADMIN: "62895410571547"
        };
        
        // FUNGSI ANTI-CRASH ANIMASI
        function toggleLoading(isLoading) {
            const icon = document.querySelector('#btnRefresh svg') || document.querySelector('#btnRefresh i');
            if (icon) {
                if (isLoading) icon.classList.add('animate-spin');
                else icon.classList.remove('animate-spin');
            }
        }

        let dbCustomers = [];
        const formatRupiah = (num) => (num === 0 || isNaN(num)) ? "0" : new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;

        async function fetchCustomersFromCloud() {
            const grid = document.getElementById('customerGrid');
            toggleLoading(true);
            grid.innerHTML = `<div class="col-span-3 text-center py-4 text-emerald-600 text-xs font-bold flex justify-center"><div class="spinner"></div> Menarik data...</div>`;
            
            try {
                const res = await fetch(CONFIG.API_URL + "?action=getAll&nocache=" + Date.now());
                const result = await res.json();

                if (result.status === "error") {
                    grid.innerHTML = `<div class="col-span-3 text-center py-2 text-slate-400 text-xs">${result.message || "Belum ada data."}</div>`;
                    toggleLoading(false); return;
                }

                dbCustomers = (result.data || []).filter(c => c.nama && c.wa && (c.hutang - c.terbayar) > 0); 
                
                grid.innerHTML = '';
                if(dbCustomers.length === 0) {
                    grid.innerHTML = `<div class="col-span-3 text-center py-2 text-slate-400 text-xs">Semua pelanggan Lunas atau data kosong.</div>`;
                } else {
                    dbCustomers.forEach(cust => {
                        grid.innerHTML += `<label class="cursor-pointer relative"><input type="radio" name="pelanggan" value="${cust.wa}" class="radio-peer sr-only" onchange="selectCustomer('${cust.wa}')"><div class="w-full py-3 px-2 rounded-xl bg-slate-50 border-2 border-slate-100 text-slate-600 font-bold text-sm text-center truncate">${cust.nama}</div></label>`;
                    });
                }
            } catch(e) { grid.innerHTML = `<div class="col-span-3 text-center py-2 text-red-500 text-xs">Gagal memuat API.</div>`; }
            toggleLoading(false);
        }

        document.getElementById('nominal').addEventListener('input', (e) => { e.target.value = formatRupiah(parseRupiah(e.target.value)); renderPreview(); });

        const selectCustomer = (waId) => {
            const cust = dbCustomers.find(c => c.wa === waId);
            document.getElementById('customerStats').classList.remove('hidden');
            let sisa = cust.hutang - cust.terbayar; if(sisa < 0) sisa = 0;
            
            document.getElementById('statName').innerText = cust.nama;
            document.getElementById('statSisa').innerText = `Rp ${formatRupiah(sisa)}`;
            document.getElementById('statTerbayar').innerText = `Rp ${formatRupiah(cust.terbayar)}`;
            document.getElementById('nominal').value = formatRupiah(cust.cicilanPerBulan);
            
            document.getElementById('cicilanGrid').innerHTML = `<label class="cursor-pointer relative shrink-0"><input type="radio" name="cicilan" value="${cust.cicilanKe}" class="radio-peer-month sr-only" checked onchange="renderPreview()"><div class="px-4 h-12 rounded-xl bg-slate-50 border-2 border-slate-100 text-slate-600 font-black text-sm flex items-center shadow-sm">Bulan Ke-${cust.cicilanKe}</div></label> <label class="cursor-pointer relative shrink-0"><input type="radio" name="cicilan" value="Pelunasan" class="radio-peer-month sr-only" onchange="renderPreview()"><div class="px-4 h-12 rounded-xl bg-slate-50 border-2 border-slate-100 text-slate-600 font-black text-sm flex items-center shadow-sm">Lunas Full</div></label>`;
            renderPreview();
        };

        const renderPreview = () => {
            const custRadio = document.querySelector('input[name="pelanggan"]:checked'), cicilanEl = document.querySelector('input[name="cicilan"]:checked'), nominalVal = parseRupiah(document.getElementById('nominal').value);
            if (!custRadio || !cicilanEl || nominalVal === 0) { document.getElementById('previewContainer').classList.add('opacity-0'); return null; } 
            else { document.getElementById('previewContainer').classList.remove('opacity-0'); }

            const custData = dbCustomers.find(c => c.wa === custRadio.value);
            const terbayarBaru = custData.terbayar + nominalVal;
            let sisaBaru = custData.hutang - terbayarBaru; if(sisaBaru < 0) sisaBaru = 0;
            
            const tgl = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            const pesan = `*KUITANSI RESMI - ZENITH CELL* 🧾\n-----------------------------------\n🗓 Tgl : ${tgl}\n👤 Dari : *${custData.nama}*\n-----------------------------------\n*PEMBAYARAN:*\n🏷 Cicilan : *${cicilanEl.value}*\n💰 Nominal : *Rp ${formatRupiah(nominalVal)}*\n-----------------------------------\n📊 *SISA TAGIHAN:*\nTotal Terbayar: Rp ${formatRupiah(terbayarBaru)}\n*Sisa Hutang : Rp ${formatRupiah(sisaBaru)}*\n-----------------------------------\n_Terima kasih!_`;
            document.getElementById('previewText').innerText = pesan;
            return { pesan, custData, cicilan: cicilanEl.value, nominalVal, sisaBaru };
        };

        document.getElementById('btnProses').addEventListener('click', () => {
            const data = renderPreview(); if (!data) { alert("Pilih Pelanggan & Masukkan Nominal!"); return; }

            const payloadKasir = { tipe: "KAS_MASUK_CICILAN", waktu: new Date().toLocaleString('id-ID'), nama: data.custData.nama, whatsapp: data.custData.wa, cicilanKe: data.cicilan, nominalMasuk: data.nominalVal, catatan: "Sisa: Rp " + formatRupiah(data.sisaBaru) };

            fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadKasir) });

            const waLink = `https://api.whatsapp.com/send?phone=${data.custData.wa}&text=${encodeURIComponent(data.pesan)}`;
            window.open(waLink, '_blank');

            fetchCustomersFromCloud(); 
            document.getElementById('nominal').value = '';
            document.getElementById('previewContainer').classList.add('opacity-0');
        });

        fetchCustomersFromCloud(); 
    </script>
</body>
</html>
