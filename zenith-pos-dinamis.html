<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir POS - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        .spinner { border: 3px solid rgba(16, 185, 129, 0.3); border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .receipt-paper { background: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace; width: 100%; max-width: 340px; margin: 0 auto; padding: 30px 20px; position: relative; }
        .is-whatsapp .brand-color { color: #10b981 !important; }
        .is-whatsapp .brand-bg { background-color: #f0fdf4 !important; border: 1px solid #dcfce7 !important; border-radius: 8px; }
        .is-whatsapp .receipt-paper { border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1); }
        .is-printer .brand-color { color: #000000 !important; font-weight: 900 !important; }
        .is-printer .brand-bg { background: transparent !important; border: 2px solid #000000 !important; border-radius: 4px; }
        .is-printer .receipt-paper { border: none !important; box-shadow: none !important; padding: 15px 5px; }
        .dashed-line { border-top: 2px dashed #e2e8f0; margin: 15px 0; }
        .is-printer .dashed-line { border-top: 2px dashed #000000 !important; }
        .solid-line { border-top: 3px solid #000000; margin: 15px 0; }
        .flex-between { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    </style>
</head>
<body class="text-slate-800 lg:p-8 min-h-screen flex selection:bg-emerald-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <main class="m-auto w-full max-w-5xl bg-white lg:rounded-[2.5rem] lg:shadow-2xl overflow-hidden flex flex-col lg:flex-row relative z-10 min-h-screen lg:min-h-[85vh]">
        <section class="w-full lg:w-7/12 p-4 lg:p-8 flex flex-col border-r border-slate-100">
            <header class="mb-5 flex items-center justify-between bg-slate-50 p-4 rounded-[2rem] shadow-sm border relative">
                <a href="index.html" class="p-2 bg-white rounded-full text-slate-500 mr-2 active:scale-95 transition-all shadow-sm"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <div class="flex items-center gap-3 flex-grow">
                    <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center shrink-0"><i data-lucide="smartphone-charging" class="w-6 h-6 text-emerald-400"></i></div>
                    <div><h1 class="font-black text-xl leading-none">Kasir POS</h1><p class="text-[10px] font-bold text-emerald-600 uppercase">Input & Pelunasan</p></div>
                </div>
                <button onclick="fetchCustomersFromCloud()" class="p-2.5 bg-emerald-100 rounded-xl text-emerald-700 active:rotate-180 transition-all shadow-sm"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
            </header>

            <form id="posForm" class="space-y-6 flex-grow">
                <div>
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">1. Pilih Pelanggan Aktif</label>
                    <div id="customerGrid" class="grid grid-cols-2 sm:grid-cols-3 gap-2 max-h-48 lg:max-h-64 overflow-y-auto no-scrollbar p-1"></div>
                </div>
                <div id="cicilanArea" class="hidden">
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">2. Opsi Pembayaran</label>
                    <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="cicilanGrid"></div>
                </div>
                <div id="nominalArea" class="hidden">
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">3. Nominal Angsuran Pokok</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-5 text-emerald-500 font-black text-xl">Rp</span>
                        <input type="text" id="nominal" inputmode="numeric" class="w-full pl-14 pr-5 py-4 bg-slate-50 border-2 border-slate-200 rounded-2xl text-slate-900 font-black text-2xl outline-none focus:border-emerald-500 transition-all">
                    </div>
                    
                    <div id="dendaArea" class="mt-4 p-4 bg-red-50 border border-red-100 rounded-2xl hidden">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-[10px] font-black text-red-600 uppercase">Denda / Dana Kebajikan</label>
                            <i data-lucide="alert-circle" class="w-4 h-4 text-red-400"></i>
                        </div>
                        <div class="relative flex items-center mb-1">
                            <span class="absolute left-3 text-red-500 font-bold text-sm">Rp</span>
                            <input type="text" id="denda" inputmode="numeric" placeholder="0" class="w-full pl-9 pr-3 py-3 bg-white border border-red-200 rounded-xl text-red-700 font-bold text-sm outline-none focus:border-red-500 transition-all">
                        </div>
                    </div>
                </div>
            </form>
            
            <div id="btnProsesContainer" class="mt-6 hidden lg:block sticky bottom-0 lg:static bg-white pt-2 pb-4">
                <button id="btnProses" class="w-full bg-slate-900 text-white font-extrabold py-4 rounded-[1.5rem] active:scale-95 flex justify-center items-center gap-2 shadow-2xl transition-all">
                    <i data-lucide="save" class="w-5 h-5 text-emerald-400"></i><span>Simpan & Buat Struk</span>
                </button>
            </div>
        </section>

        <section class="w-full lg:w-5/12 bg-slate-50 p-4 lg:p-8 flex flex-col relative" id="previewPanel">
            <div class="mb-4 opacity-0 translate-y-2 transition-all duration-500 hidden flex-grow" id="previewContainer">
                <div id="strukWrapper" class="is-whatsapp mx-auto"> 
                    <div id="strukCard" class="receipt-paper">
                        <div class="text-center">
                            <h2 class="text-[32px] font-black tracking-tighter leading-none mb-1 brand-color">ZENITH CELL</h2>
                            <p class="text-[10px] font-bold uppercase">Jl. Sanan 5a, Purwantoro</p>
                            <p class="text-[10px] font-bold opacity-70">Admin: 0895-4105-71547</p>
                        </div>
                        <div class="dashed-line"></div><div id="isiStruk"></div><div class="dashed-line"></div>
                        <div class="text-center mt-2">
                            <p class="text-sm font-black uppercase brand-color">Terima Kasih!</p>
                            <div class="my-4 brand-bg py-2 px-3"><p class="text-[10px] font-black uppercase brand-color italic">Layanan Gadget Syariah</p></div>
                        </div>
                    </div>
                </div>

                <div id="actionButtons" class="hidden flex-col gap-3 mt-6 w-full max-w-[340px] mx-auto">
                    <div class="grid grid-cols-2 gap-3">
                        <button id="btnShareWA" class="bg-[#25D366] text-white font-bold py-4 rounded-2xl flex flex-col items-center justify-center shadow-lg transition-all active:scale-95"><i data-lucide="share-2" class="w-5 h-5 mb-1"></i><span class="text-[10px] uppercase">Share WA</span></button>
                        <button id="btnPrint" class="bg-slate-800 text-white font-bold py-4 rounded-2xl flex flex-col items-center justify-center shadow-lg transition-all active:scale-95"><i data-lucide="printer" class="w-5 h-5 mb-1"></i><span class="text-[10px] uppercase">Thermal</span></button>
                    </div>
                    <button onclick="window.location.reload()" class="w-full bg-white text-slate-500 border font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-all"><i data-lucide="plus-circle" class="w-4 h-4"></i> Transaksi Baru</button>
                </div>
            </div>
            
            <div id="btnProsesContainerMobile" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] z-50 lg:hidden hidden">
                <button id="btnProsesMobile" class="w-full bg-slate-900 text-white font-extrabold py-4 rounded-[1.5rem] active:scale-95 flex justify-center items-center gap-2 shadow-2xl border border-slate-700">
                    <i data-lucide="save" class="w-5 h-5 text-emerald-400"></i><span>Simpan & Buat Struk</span>
                </button>
            </div>
            <div class="h-24 lg:hidden block shrink-0"></div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        let dbCustomers = [], isSaved = false, currentSavedData = null; window.currentDiskon = 0;
        
        function buatIdTransaksi(kodeTipe) {
            const now = new Date(); const yy = String(now.getFullYear()).slice(-2);
            const mm = String(now.getMonth() + 1).padStart(2, '0'); const dd = String(now.getDate()).padStart(2, '0');
            const hh = String(now.getHours()).padStart(2, '0'); const mins = String(now.getMinutes()).padStart(2, '0');
            return `${kodeTipe}${yy}${mm}${dd}${hh}${mins}${Math.floor(Math.random() * 90 + 10)}`;
        }
        const formatRp = (n) => new Intl.NumberFormat('id-ID').format(n);
        const parseRp = (s) => parseInt(s.toString().replace(/[^0-9]/g, '')) || 0;

        function showToast(msg, type = 'success') {
            const t = document.createElement('div');
            t.className = `${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'} text-white px-6 py-4 rounded-2xl shadow-2xl fixed top-5 left-1/2 -translate-x-1/2 z-[1000] font-bold text-sm text-center min-w-[250px] pointer-events-auto`;
            t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        async function fetchCustomersFromCloud() {
            const grid = document.getElementById('customerGrid');
            grid.innerHTML = `<div class="col-span-full text-center py-6"><div class="spinner mx-auto mb-2"></div><p class="text-[10px] text-slate-400 font-bold">Sinkronisasi...</p></div>`;
            try {
                const res = await fetch(CONFIG.API_URL + "?action=getAll&nocache=" + Date.now());
                const result = await res.json();
                dbCustomers = (result.data || []).filter(c => c.nama && (c.hutang - c.terbayar) > 0);
                grid.innerHTML = '';
                if (dbCustomers.length === 0) return grid.innerHTML = `<div class="col-span-full text-center text-slate-400 text-xs font-bold py-4">Kosong</div>`;
                dbCustomers.forEach(c => {
                    grid.innerHTML += `<label class="cursor-pointer"><input type="radio" name="pelanggan" value="${c.idKontrak}" class="peer sr-only" onchange="selectCustomer('${c.idKontrak}')"><div class="w-full py-4 px-2 rounded-2xl bg-white border-2 border-slate-100 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 text-slate-600 font-bold text-[11px] text-center truncate transition-all shadow-sm">${c.nama}</div></label>`;
                });
            } catch(e) { grid.innerHTML = `<div class="col-span-full text-red-500 text-xs font-bold py-4 text-center">Gagal Terhubung</div>`; }
        }

        window.selectCustomer = function(id) {
            const c = dbCustomers.find(i => i.idKontrak === id);
            const sisaHutang = c.hutang - c.terbayar; window.currentDiskon = Math.round(sisaHutang * 0.1); 
            
            document.getElementById('cicilanArea').classList.remove('hidden');
            document.getElementById('nominalArea').classList.remove('hidden');
            document.getElementById('dendaArea').classList.remove('hidden');
            document.getElementById('nominal').value = formatRp(c.cicilanPerBulan);
            document.getElementById('denda').value = "";
            document.getElementById('btnProsesContainer').classList.remove('hidden');
            document.getElementById('btnProsesContainerMobile').classList.remove('hidden');
            
            document.getElementById('cicilanGrid').innerHTML = `
                <label class="flex-1"><input type="radio" name="cicilan" value="${c.cicilanKe}" class="peer sr-only" checked onchange="document.getElementById('nominal').value='${formatRp(c.cicilanPerBulan)}'; renderPreview()"><div class="px-3 py-3 rounded-xl bg-white border-2 border-slate-200 peer-checked:bg-slate-900 peer-checked:text-white text-slate-600 font-black text-xs text-center transition-all">Bulan Ke-${c.cicilanKe}</div></label>
                <label class="flex-1"><input type="radio" name="cicilan" value="Pelunasan" class="peer sr-only" onchange="document.getElementById('nominal').value='${formatRp(sisaHutang - window.currentDiskon)}'; document.getElementById('denda').value=''; renderPreview()"><div class="px-3 py-3 rounded-xl bg-white border-2 border-slate-200 peer-checked:bg-slate-900 peer-checked:text-white text-slate-600 font-black text-xs text-center transition-all">Lunas Full <span class="text-[8px] text-amber-400 block">Diskon 10%</span></div></label>`;
            renderPreview();
        }

        const renderPreview = () => {
            const custRadio = document.querySelector('input[name="pelanggan"]:checked'), cicilanEl = document.querySelector('input[name="cicilan"]:checked');
            const nominalVal = parseRp(document.getElementById('nominal').value), dendaVal = parseRp(document.getElementById('denda').value);
            if (!custRadio || !cicilanEl || nominalVal === 0) return null;
            
            document.getElementById('previewContainer').classList.remove('hidden', 'opacity-0');
            
            const data = dbCustomers.find(c => c.idKontrak === custRadio.value);
            let isLunas = cicilanEl.value === 'Pelunasan';
            if (!window.tempIdTransaksi || window.isLunasTemp !== isLunas) { window.tempIdTransaksi = buatIdTransaksi(isLunas ? 3 : 2); window.isLunasTemp = isLunas; }
            
            let sisaHutangAsli = data.hutang - data.terbayar;
            let sisaBaru = Math.max(0, isLunas ? 0 : sisaHutangAsli - nominalVal);
            const tBayar = nominalVal + dendaVal;

            document.getElementById('isiStruk').innerHTML = `
                <div class="flex-between mb-1"><span class="text-[10px] uppercase font-bold text-slate-400">No. Transaksi:</span><span class="text-[10px] font-black brand-color">${window.tempIdTransaksi}</span></div>
                <div class="flex-between mb-4"><span class="text-[10px] uppercase font-bold text-slate-400">No. Kontrak:</span><span class="text-[10px] font-black">${data.idKontrak}</span></div>
                <div class="flex-between mb-1"><span class="text-xs font-black uppercase">Pelanggan:</span><span class="text-xs font-black brand-color uppercase">${data.nama}</span></div>
                <div class="flex-between mb-4"><span class="text-xs font-black uppercase">Unit:</span><span class="text-xs font-black uppercase">${data.barang || '-'}</span></div>
                <div class="solid-line"></div>
                <div class="flex-between mb-1"><span class="text-[11px] font-black uppercase">${isLunas ? 'Pelunasan Pokok' : 'Angsuran Ke-'+cicilanEl.value}:</span><span class="text-sm font-black">Rp ${formatRp(nominalVal)}</span></div>
                ${isLunas ? `<div class="flex-between mb-1"><span class="text-[10px] uppercase font-bold text-emerald-600">Diskon Ibra':</span><span class="text-[10px] font-black text-emerald-600">- Rp ${formatRp(window.currentDiskon)}</span></div>` : ''}
                ${dendaVal > 0 ? `<div class="flex-between mb-1"><span class="text-[10px] uppercase font-bold text-red-600">Dana Kebajikan:</span><span class="text-[10px] font-black text-red-600">+ Rp ${formatRp(dendaVal)}</span></div>` : ''}
                <div class="dashed-line"></div>
                <div class="flex-between items-center"><span class="text-base font-black brand-color uppercase">Total Kas:</span><span class="text-2xl font-black brand-color">Rp ${formatRp(tBayar)}</span></div>
                <div class="solid-line"></div>
                <div class="flex-between"><span class="text-[10px] uppercase font-bold">Sisa Hutang Pokok:</span><span class="text-sm font-black">Rp ${formatRp(sisaBaru)}</span></div>`;
            return { data, cicilan: cicilanEl.value, nominalVal, dendaVal, totalBayarPlusDenda: tBayar, sisaBaru, isLunas, idTransaksi: window.tempIdTransaksi };
        };

        ['nominal', 'denda'].forEach(id => document.getElementById(id).addEventListener('input', (e) => { if(isSaved) return; e.target.value = formatRp(parseRp(e.target.value)); renderPreview(); }));

        const eksekusiSimpan = async () => {
            const p = renderPreview(); if (!p) return showToast("Lengkapi data nominal!", "error");
            document.getElementById('btnProses').disabled = true; document.getElementById('btnProsesMobile').disabled = true;
            
            try {
                let payload = { tipe: p.isLunas ? "PELUNASAN_AWAL" : "KAS_MASUK_CICILAN", idTransaksi: p.idTransaksi, idKontrak: p.data.idKontrak, waktu: new Date().toLocaleString('id-ID'), bulanIni: new Date().getMonth() + 1, nama: p.data.nama, whatsapp: p.data.wa, cicilanKe: p.cicilan, nominalMasuk: p.nominalVal, dendaMasuk: p.dendaVal, catatan: p.isLunas ? "Pelunasan" : "Sisa: Rp " + formatRp(p.sisaBaru) };
                await fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                isSaved = true; currentSavedData = p;
                document.getElementById('nominal').disabled = true; document.getElementById('denda').disabled = true;
                document.getElementById('formSection').style.opacity = '0.3';
                document.getElementById('btnProsesContainer').classList.add('hidden'); document.getElementById('btnProsesContainerMobile').classList.add('hidden');
                document.getElementById('actionButtons').classList.replace('hidden', 'flex');
                showToast(p.isLunas ? "LUNAS! Riwayat telah dicatat." : "Berhasil Disimpan!");
                
                // Gulir ke preview struk di HP
                if(window.innerWidth < 1024) document.getElementById('previewPanel').scrollIntoView({behavior: 'smooth'});
            } catch(e) { showToast("Gagal menyimpang jaringan.", "error"); }
        };

        document.getElementById('btnProses').addEventListener('click', eksekusiSimpan);
        document.getElementById('btnProsesMobile').addEventListener('click', eksekusiSimpan);

        async function captureAndShare() {
            if(!currentSavedData) return; showToast("Mempersiapkan Struk...");
            setTimeout(async () => {
                const canvas = await html2canvas(document.getElementById('strukCard'), { scale: 2.5, backgroundColor: "#ffffff" });
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], `Zenith_${Date.now()}.png`, { type: "image/png" });
                    if (navigator.share && navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file], text: `Kuitansi Zenith Cell a.n ${currentSavedData.data.nama}. Terima kasih.` });
                    } else { const a = document.createElement('a'); a.download = file.name; a.href = URL.createObjectURL(blob); a.click(); }
                }, "image/png");
            }, 200);
        }

        function cetakStrukTajam() {
            if (!currentSavedData) return; const p = currentSavedData;
            let s = "        ZENITH CELL         \n--------------------------------\nTgl: " + new Date().toLocaleString('id-ID') + "\nNo : " + p.idTransaksi + "\n--------------------------------\nNama: " + p.data.nama + "\nKet : Ke-" + p.cicilan + "\nPokok: Rp " + formatRp(p.nominalVal) + "\n";
            if(p.dendaVal>0) s+= "Denda: Rp " + formatRp(p.dendaVal) + "\n";
            s += "TOTAL: Rp " + formatRp(p.totalBayarPlusDenda) + "\nSisa : Rp " + formatRp(p.sisaBaru) + "\n--------------------------------\n      Terima Kasih      \n\n\n";
            window.location.href = "intent:" + encodeURIComponent(s) + "#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;";
        }

        document.getElementById('btnShareWA').onclick = captureAndShare; document.getElementById('btnPrint').onclick = cetakStrukTajam;
        fetchCustomersFromCloud();
    </script>
</body>
</html>
