<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kasir POS - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; } 
        .spinner { border: 3px solid rgba(16, 185, 129, 0.3); border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .receipt-paper { background: #ffffff; color: #000000; font-family: 'Courier New', Courier, monospace; width: 100%; max-width: 340px; margin: 0 auto; padding: 30px 20px; position: relative; }
        .is-whatsapp .brand-color { color: #10b981 !important; }
        .is-whatsapp .brand-bg { background-color: #f0fdf4 !important; border: 1px solid #dcfce7 !important; border-radius: 8px; }
        .is-whatsapp .receipt-paper { border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1); }
        .is-printer .brand-color { color: #000000 !important; font-weight: 900 !important; }
        .is-printer .brand-bg { background: transparent !important; border: 2px solid #000000 !important; border-radius: 4px; }
        .is-printer .receipt-paper { border: none !important; box-shadow: none !important; padding: 15px 5px; }
        .dashed-line { border-top: 2px dashed #e2e8f0; margin: 15px 0; }
        .is-printer .dashed-line { border-top: 2px dashed #000000 !important; }
        .solid-line { border-top: 3px solid #000000; margin: 15px 0; }
        .flex-between { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    </style>
</head>
<body class="text-slate-800 pt-4 px-4 flex justify-center selection:bg-emerald-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4"></div>

    <main class="w-full max-w-md relative z-10 flex flex-col min-h-screen">
        <header class="mb-5 flex items-center justify-between bg-white p-4 rounded-[2rem] shadow-sm border relative">
            <a href="index.html" class="p-2 bg-slate-50 rounded-full text-slate-500 mr-2 active:scale-95 transition-all"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="flex items-center gap-3 flex-grow">
                <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center shrink-0"><i data-lucide="smartphone-charging" class="w-6 h-6 text-emerald-400"></i></div>
                <div><h1 class="font-black text-xl leading-none">Kasir POS</h1><p class="text-[10px] font-bold text-emerald-600 uppercase">Input & Pelunasan</p></div>
            </div>
            <button onclick="fetchCustomersFromCloud()" id="btnRefresh" class="p-2.5 bg-emerald-50 rounded-xl text-emerald-600 active:rotate-180 transition-all"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </header>

        <section id="formSection" class="glass-panel p-5 rounded-[2.5rem] mb-6 transition-all duration-500">
            <form id="posForm" class="space-y-6">
                <div>
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">1. Pilih Pelanggan Aktif</label>
                    <div id="customerGrid" class="grid grid-cols-3 gap-2 max-h-48 overflow-y-auto no-scrollbar p-1"></div>
                </div>
                <div id="cicilanArea" class="hidden">
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">2. Opsi Pembayaran</label>
                    <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="cicilanGrid"></div>
                </div>
                <div id="nominalArea" class="hidden">
                    <label class="block text-[11px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">3. Masukkan Nominal</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-5 text-emerald-500 font-black text-xl">Rp</span>
                        <input type="text" id="nominal" inputmode="numeric" class="w-full pl-14 pr-5 py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-slate-900 font-black text-2xl outline-none focus:border-emerald-500 transition-all">
                    </div>
                </div>
            </form>
        </section>

        <!-- AREA PREVIEW STRUK -->
        <section class="mb-4 opacity-0 translate-y-2 transition-all duration-500 hidden" id="previewContainer">
            <div id="strukWrapper" class="is-whatsapp"> 
                <div id="strukCard" class="receipt-paper">
                    <div class="text-center">
                        <h2 class="text-[32px] font-black tracking-tighter leading-none mb-1 brand-color">ZENITH CELL</h2>
                        <p class="text-[10px] font-bold uppercase">Jl. Sanan 5a, Purwantoro</p>
                        <p class="text-[10px] font-bold uppercase mb-2">Kota Malang - Jawa Timur</p>
                        <p class="text-[9px] font-bold opacity-70">Admin: 0895-4105-71547</p>
                    </div>
                    
                    <div class="dashed-line"></div>
                    <div id="isiStruk"></div>
                    <div class="dashed-line"></div>
                    
                    <div class="text-center mt-2">
                        <p class="text-sm font-black uppercase tracking-widest brand-color">Terima Kasih!</p>
                        <div class="my-4 brand-bg py-2 px-3">
                            <p class="text-[10px] font-black uppercase brand-color italic">Layanan Gadget Syariah</p>
                        </div>
                        <p class="text-[8px] font-bold leading-relaxed opacity-60 uppercase">Barang yang sudah dibeli tidak dapat ditukar/dikembalikan. Simpan struk ini sebagai bukti sah.</p>
                    </div>
                </div>
            </div>

            <div id="actionButtons" class="hidden flex-col gap-3 px-2 mt-6">
                <div class="grid grid-cols-2 gap-3">
                    <button id="btnShareWA" class="bg-[#25D366] text-white font-bold py-4 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 shadow-lg border-b-4 border-green-700 transition-all">
                        <i data-lucide="share-2" class="w-6 h-6"></i>
                        <span class="text-[11px] uppercase tracking-wider">Share Ke WA</span>
                    </button>
                    <button id="btnPrint" class="bg-slate-800 text-white font-bold py-4 rounded-2xl flex flex-col items-center justify-center gap-1 active:scale-95 shadow-lg border-b-4 border-slate-900 transition-all">
                        <i data-lucide="printer" class="w-6 h-6"></i>
                        <span class="text-[11px] uppercase tracking-wider">Print Thermal</span>
                    </button>
                </div>
                <button onclick="window.location.reload()" class="w-full mt-2 bg-white text-slate-500 border border-slate-200 font-bold py-3.5 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-all">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> <span class="text-xs uppercase tracking-wider">Transaksi Baru</span>
                </button>
            </div>
        </section>

        <div class="w-full h-32 shrink-0"></div>

        <div id="btnProsesContainer" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-40 hidden">
            <button id="btnProses" class="w-full bg-slate-900 text-white font-extrabold py-4 rounded-[1.5rem] active:scale-95 flex justify-center items-center gap-2 shadow-2xl border-t border-slate-700 transition-all">
                <i data-lucide="save" class="w-5 h-5 text-emerald-400"></i><span id="txtBtnProses">Simpan & Buat Struk</span>
            </button>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let dbCustomers = [], isSaved = false, currentSavedData = null;
        window.currentDiskon = 0;
        
        const formatRp = (n) => new Intl.NumberFormat('id-ID').format(n);
        const parseRp = (s) => parseInt(s.toString().replace(/[^0-9]/g, '')) || 0;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            toast.className = `${bgColor} text-white px-6 py-4 rounded-2xl shadow-2xl fixed top-5 left-1/2 -translate-x-1/2 z-[1000] font-bold text-sm text-center min-w-[250px] transition-all`;
            toast.innerText = message; document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function fetchCustomersFromCloud() {
            const grid = document.getElementById('customerGrid');
            grid.innerHTML = `<div class="col-span-3 text-center py-6"><div class="spinner mx-auto mb-2"></div><p class="text-[10px] text-slate-400 font-bold">Sinkronisasi...</p></div>`;
            try {
                const res = await fetch(CONFIG.API_URL + "?action=getAll&nocache=" + Date.now());
                if (!res.ok) throw new Error("Jaringan bermasalah");
                
                const result = await res.json();
                if (result.status === "error") throw new Error(result.msg);

                dbCustomers = (result.data || []).filter(c => c.nama && (c.hutang - c.terbayar) > 0);
                grid.innerHTML = '';
                
                if (dbCustomers.length === 0) {
                    grid.innerHTML = `<div class="col-span-3 text-center text-slate-400 text-xs font-bold py-4">Tidak ada tagihan aktif.</div>`;
                    return;
                }

                dbCustomers.forEach(c => {
                    grid.innerHTML += `<label class="cursor-pointer"><input type="radio" name="pelanggan" value="${c.idKontrak}" class="peer sr-only" onchange="selectCustomer('${c.idKontrak}')"><div class="w-full py-4 px-2 rounded-2xl bg-white border-2 border-slate-100 peer-checked:border-emerald-500 peer-checked:bg-emerald-50 text-slate-600 font-bold text-[11px] text-center truncate shadow-sm transition-all">${c.nama}</div></label>`;
                });
            } catch(e) { 
                grid.innerHTML = `<div class="col-span-3 bg-red-50 p-4 rounded-xl text-center"><p class="text-red-500 text-xs font-bold mb-1">Gagal Terhubung</p><p class="text-[9px] text-red-400">Pastikan URL Config benar dan internet stabil.</p></div>`; 
            }
        }

        window.selectCustomer = function(id) {
            const c = dbCustomers.find(i => i.idKontrak === id);
            const sisaHutang = c.hutang - c.terbayar;
            const diskon = Math.round(sisaHutang * 0.1); 
            const totalLunas = sisaHutang - diskon;
            window.currentDiskon = diskon;

            document.getElementById('cicilanArea').classList.remove('hidden');
            document.getElementById('nominalArea').classList.remove('hidden');
            document.getElementById('nominal').value = formatRp(c.cicilanPerBulan);
            document.getElementById('btnProsesContainer').classList.remove('hidden');
            
            document.getElementById('cicilanGrid').innerHTML = `
                <label><input type="radio" name="cicilan" value="${c.cicilanKe}" class="peer sr-only" checked onchange="document.getElementById('nominal').value='${formatRp(c.cicilanPerBulan)}'; renderPreview()"><div class="px-5 py-3 rounded-xl bg-white border-2 border-slate-200 peer-checked:bg-slate-900 peer-checked:text-white peer-checked:border-slate-900 text-slate-600 font-black text-xs flex flex-col items-center transition-all"><span>Bulan Ke-${c.cicilanKe}</span><span class="text-[8px] font-bold opacity-70 mt-0.5">Bulanan</span></div></label>
                <label><input type="radio" name="cicilan" value="Pelunasan" class="peer sr-only" onchange="document.getElementById('nominal').value='${formatRp(totalLunas)}'; renderPreview()"><div class="px-5 py-3 rounded-xl bg-white border-2 border-slate-200 peer-checked:bg-slate-900 peer-checked:text-white peer-checked:border-slate-900 text-slate-600 font-black text-xs flex flex-col items-center transition-all"><span>Lunas Full</span><span class="text-[8px] font-bold text-amber-400 mt-0.5 uppercase tracking-widest">Diskon 10%</span></div></label>`;
            renderPreview();
        }

        const renderPreview = () => {
            const custRadio = document.querySelector('input[name="pelanggan"]:checked'), cicilanEl = document.querySelector('input[name="cicilan"]:checked'), nominalVal = parseRp(document.getElementById('nominal').value);
            if (!custRadio || !cicilanEl || nominalVal === 0) return null;
            
            document.getElementById('previewContainer').classList.remove('hidden');
            document.getElementById('previewContainer').classList.remove('opacity-0');
            
            const data = dbCustomers.find(c => c.idKontrak === custRadio.value);
            let isLunas = cicilanEl.value === 'Pelunasan';
            
            let sisaHutangAsli = data.hutang - data.terbayar;
            let sisaBaru = isLunas ? 0 : sisaHutangAsli - nominalVal; 
            if(sisaBaru < 0) sisaBaru = 0;

            let strukDiskonHtml = isLunas ? `<div class="flex-between mb-1"><span class="text-[10px] uppercase font-bold text-emerald-600">Diskon Ibra':</span><span class="text-[10px] font-black text-right uppercase text-emerald-600">- Rp ${formatRp(window.currentDiskon)}</span></div>` : '';
            
            document.getElementById('isiStruk').innerHTML = `
                <div class="flex-between mb-1"><span class="text-[10px] uppercase font-bold">Tgl/Waktu:</span><span class="text-[10px] font-bold text-right">${new Date().toLocaleString('id-ID')}</span></div>
                <div class="flex-between mb-4"><span class="text-[10px] uppercase font-bold">No. Kontrak:</span><span class="text-[10px] font-black text-right">${data.idKontrak}</span></div>
                
                <div class="flex-between mb-1"><span class="text-xs font-black uppercase">Pelanggan:</span><span class="text-xs font-black text-right uppercase brand-color">${data.nama}</span></div>
                <div class="flex-between mb-4"><span class="text-xs font-black uppercase">Unit/Barang:</span><span class="text-xs font-black text-right uppercase">${data.barang || '-'}</span></div>
                
                <div class="flex-between mb-1"><span class="text-[10px] uppercase font-bold">Keterangan:</span><span class="text-[10px] font-black text-right uppercase">${isLunas ? 'Pelunasan Muroqoshoh' : 'Angsuran Ke-' + cicilanEl.value}</span></div>
                <div class="flex-between mb-1"><span class="text-[10px] uppercase font-bold">Metode:</span><span class="text-[10px] font-black text-right uppercase">Transfer/Cash</span></div>
                ${strukDiskonHtml}
                <div class="solid-line"></div>
                <div class="flex-between my-2 items-center"><span class="text-base font-black brand-color uppercase">Bayar:</span><span class="text-[26px] font-black brand-color tracking-tighter">Rp ${formatRp(nominalVal)}</span></div>
                <div class="solid-line"></div>
                
                <div class="flex-between mt-3"><span class="text-[10px] uppercase font-bold">Sisa Hutang:</span><span class="text-sm font-black text-right uppercase">Rp ${formatRp(sisaBaru)}</span></div>`;
            return { data, cicilan: cicilanEl.value, nominalVal, sisaBaru, isLunas };
        };

        document.getElementById('nominal').addEventListener('input', (e) => { if(isSaved) return; e.target.value = formatRp(parseRp(e.target.value)); renderPreview(); });

        document.getElementById('btnProses').addEventListener('click', async () => {
            const p = renderPreview(); if (!p) return showToast("Lengkapi data nominal!", "error");
            const btn = document.getElementById('btnProses'); btn.disabled = true; btn.innerHTML = "Menyimpan...";
            
            try {
                let payload = { 
                    tipe: p.isLunas ? "PELUNASAN_AWAL" : "KAS_MASUK_CICILAN", 
                    idKontrak: p.data.idKontrak, 
                    waktu: new Date().toLocaleString('id-ID'), 
                    bulanIni: new Date().getMonth() + 1, 
                    nama: p.data.nama, 
                    whatsapp: p.data.wa, 
                    cicilanKe: p.cicilan, 
                    nominalMasuk: p.nominalVal, 
                    catatan: p.isLunas ? "Pelunasan Muroqoshoh Selesai" : "Sisa: Rp " + formatRp(p.sisaBaru) 
                };
                
                await fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                
                isSaved = true; currentSavedData = p;
                document.getElementById('nominal').disabled = true;
                document.getElementById('formSection').style.opacity = '0.3';
                document.getElementById('btnProsesContainer').classList.add('hidden');
                document.getElementById('actionButtons').classList.replace('hidden', 'flex');
                
                if (p.isLunas) {
                    showToast("LUNAS! Riwayat telah dicatat.", "success");
                } else {
                    showToast("Berhasil Disimpan!", "success");
                }
            } catch(e) { 
                btn.disabled = false; btn.innerHTML = "Gagal. Coba lagi."; 
                showToast("Terjadi kendala jaringan.", "error");
            }
        });

        // PESAN SHARE STRUK WA (Formal tapi santai)
        async function captureAndShare(mode) {
            if(!currentSavedData) return;
            const wrapper = document.getElementById('strukWrapper');
            wrapper.className = mode === 'wa' ? "is-whatsapp" : "is-printer";
            showToast("Mempersiapkan Struk...");
            
            setTimeout(async () => {
                try {
                    const canvas = await html2canvas(document.getElementById('strukCard'), { scale: 2.5, backgroundColor: "#ffffff", useCORS: true });
                    canvas.toBlob(async (blob) => {
                        const fileName = `Zenith_${currentSavedData.data.nama.replace(/\s/g,'')}_${Date.now()}.png`;
                        const file = new File([blob], fileName, { type: "image/png" });

                        if (navigator.share && navigator.canShare({ files: [file] })) {
                            await navigator.share({ 
                                files: [file], 
                                title: 'Kuitansi Zenith Cell', 
                                text: `Assalamu'alaikum Kak ${currentSavedData.data.nama}.\n\nBerikut dilampirkan kuitansi bukti pembayaran angsurannya. Dana telah kami terima dan dicatat di sistem.\n\nTerima kasih atas kepercayaannya kepada Zenith Cell. Semoga senantiasa diberikan kelancaran rezeki.` 
                            });
                        } else {
                            const a = document.createElement('a'); a.download = fileName; a.href = URL.createObjectURL(blob); a.click();
                        }
                    }, "image/png");
                } catch(e) { showToast("Gagal memproses struk.", "error"); }
            }, 200);
        }

        function cetakStrukTajam() {
            if (!currentSavedData) return showToast("Data transaksi belum ada!", "error");
            const p = currentSavedData;
            const tgl = new Date().toLocaleString('id-ID');
            const ketCicilan = p.isLunas ? 'Pelunasan Full' : 'Angsuran Ke-' + p.cicilan;
            const barang = p.data.barang ? p.data.barang : '-';

            let struk = "        ZENITH CELL         \n";
            struk += " Gadget Syariah Kota Malang \n";
            struk += "--------------------------------\n";
            struk += "Tgl   : " + tgl + "\n";
            struk += "Kasir : Admin Pusat\n";
            struk += "--------------------------------\n";
            struk += "No. Kntrk: " + p.data.idKontrak + "\n";
            struk += "Pelanggan: " + p.data.nama.toUpperCase() + "\n";
            struk += "Unit     : " + barang.toUpperCase() + "\n";
            struk += "Ket      : " + ketCicilan + "\n";
            if(p.isLunas) struk += "Diskon   : Rp " + formatRp(window.currentDiskon) + "\n";
            struk += "--------------------------------\n";
            struk += "BAYAR    : Rp " + formatRp(p.nominalVal) + "\n";
            struk += "Sisa     : Rp " + formatRp(p.sisaBaru) + "\n";
            struk += "--------------------------------\n";
            struk += "     Alhamdulillah Sah!     \n";
            struk += " Terima kasih, moga berkah! \n";
            struk += "\n\n\n"; 

            let teksEncoded = encodeURIComponent(struk);
            window.location.href = "intent:" + teksEncoded + "#Intent;scheme=rawbt;package=ru.a402d.rawbtprinter;end;";
        }

        document.getElementById('btnShareWA').onclick = () => captureAndShare('wa');
        document.getElementById('btnPrint').onclick = () => cetakStrukTajam();
        
        fetchCustomersFromCloud();
    </script>
</body>
</html>
