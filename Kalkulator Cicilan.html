<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Simulasi - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Panggil File Config -->
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
        .glass-panel-dark { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .radio-btn-label { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .radio-input:checked + .radio-btn-label { transform: scale(0.95); }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 50% { transform: scale(1.02); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.5s forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:disabled { background-color: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen flex p-4 sm:p-6 lg:p-8 text-slate-800 selection:bg-emerald-200">

    <main class="m-auto w-full max-w-5xl glass-card rounded-[2.5rem] overflow-hidden flex flex-col lg:flex-row relative z-10">
        <section class="w-full lg:w-7/12 p-6 sm:p-8 md:p-10 flex flex-col justify-center">
            <header class="mb-8">
                <a href="index.html" class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 mb-5 shadow-sm"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <div class="flex items-center gap-2 mb-3">
                    <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-emerald-100/80 text-emerald-700 text-xs font-bold uppercase"><i data-lucide="shield-check" class="w-4 h-4"></i> Standar OJK</div>
                </div>
                <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight leading-tight">Simulasi Cicilan <br/><span class="text-emerald-600">Zenith Cell.</span></h1>
            </header>

            <form id="calcForm" class="space-y-8" onsubmit="event.preventDefault();">
                <div class="space-y-5">
                    <div class="group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Harga Gadget Normal</label>
                        <div class="relative flex items-center">
                            <div class="absolute left-4 text-slate-400 font-bold">Rp</div>
                            <input type="text" id="price" inputmode="numeric" placeholder="15.000.000" class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 rounded-2xl font-black text-xl outline-none">
                        </div>
                    </div>
                    <div class="group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Uang Muka (DP) <span class="text-slate-400 font-normal ml-1">Opsional</span></label>
                        <div class="relative flex items-center">
                            <div class="absolute left-4 text-slate-400 font-bold">Rp</div>
                            <input type="text" id="dp" inputmode="numeric" placeholder="0" class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 rounded-2xl font-bold text-xl outline-none">
                        </div>
                    </div>
                </div>

                <div class="relative" id="voucherContainer">
                    <div class="bg-gradient-to-r from-amber-50 to-orange-50 border-2 border-amber-200 p-4 sm:p-5 rounded-2xl relative overflow-hidden flex flex-col gap-4" id="voucherBox">
                        <div class="flex items-center gap-4 w-full">
                            <div class="w-12 h-12 bg-amber-100 rounded-full flex items-center justify-center shrink-0 border border-amber-300" id="voucherIconBox"><i data-lucide="ticket-percent" class="w-6 h-6 text-amber-600" id="voucherIcon"></i></div>
                            <div class="flex-grow">
                                <h3 class="text-sm font-black text-amber-900 mb-0.5" id="voucherTitle">Punya Kode Voucher?</h3>
                                <p class="text-xs text-amber-700 font-medium" id="voucherDesc">Ketik kode promo atau kosongkan lalu klik <b class="text-amber-800">Cek Hoki</b>!</p>
                            </div>
                        </div>
                        <div class="flex flex-col sm:flex-row gap-2 w-full">
                            <input type="text" id="kodePromo" placeholder="Kode promo (Opsional)" class="w-full sm:w-1/2 px-4 py-3.5 bg-white border-2 border-amber-200 rounded-xl text-sm font-bold uppercase outline-none">
                            <button id="btnVoucher" onclick="klaimVoucher()" class="w-full sm:w-1/2 shrink-0 bg-amber-500 text-white text-sm font-extrabold py-3.5 px-5 rounded-xl shadow-lg active:scale-95 flex justify-center items-center gap-2"><i data-lucide="party-popper" class="w-5 h-5"></i> <span id="btnText">Cek Hoki Saya</span></button>
                        </div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Pilih Durasi Cicilan (Tenor)</label>
                    <div class="grid grid-cols-5 gap-2 sm:gap-3">
                        <script>
                            for(let i=1; i<=10; i++) {
                                let isChecked = i === 6 ? 'checked' : '';
                                document.write(`<label class="cursor-pointer relative"><input type="radio" name="tenor" value="${i}" class="radio-input peer sr-only" ${isChecked} onchange="calculate()"><div class="radio-btn-label w-full py-3 rounded-xl bg-white border-2 flex flex-col items-center justify-center peer-checked:bg-slate-800 peer-checked:text-white shadow-sm group"><span class="text-lg sm:text-xl font-black leading-none">${i}</span><span class="text-[9px] font-bold uppercase mt-1 opacity-70">Bln</span></div></label>`);
                            }
                        </script>
                    </div>
                </div>
            </form>
        </section>

        <!-- KANAN: HASIL -->
        <section class="w-full lg:w-5/12 bg-slate-900 text-white p-6 sm:p-8 md:p-10 flex flex-col relative overflow-hidden">
            <div class="relative z-10 flex-grow flex flex-col h-full">
                <div class="mb-6 lg:mb-10 mt-2">
                    <h2 class="text-slate-400 font-semibold tracking-widest text-xs uppercase mb-4 flex items-center gap-2"><i data-lucide="calculator" class="w-4 h-4"></i> Estimasi Cicilan</h2>
                    <div class="flex items-start gap-1.5 mb-2"><span class="text-2xl sm:text-3xl font-bold mt-1.5 text-emerald-400">Rp</span><span class="text-5xl sm:text-6xl font-black" id="resCicilan">0</span></div>
                </div>

                <div class="glass-panel-dark rounded-[2rem] p-6 space-y-4 mb-6 mt-auto">
                    <div class="flex justify-between items-center sm:pl-4"><span class="text-slate-300 text-sm">Pokok Pembiayaan</span><span class="font-bold text-white" id="resPokok">Rp 0</span></div>
                    <div class="flex justify-between items-center sm:pl-4">
                        <span class="text-slate-300 text-sm flex items-center gap-2">Biaya Layanan <span class="text-[9px] font-bold bg-blue-500/20 px-1.5 py-0.5 rounded text-blue-300 uppercase" id="resMarginText">Standar OJK</span></span>
                        <span class="font-bold text-white" id="resMargin">Rp 0</span>
                    </div>
                    <div class="pt-4 border-t border-white/10 flex justify-between items-center sm:pl-4"><span class="text-emerald-400 text-sm font-bold uppercase">Total Akad</span><span class="font-black text-xl text-white" id="resTotal">Rp 0</span></div>
                </div>

                <button onclick="lanjutKeForm()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-all">Lanjut Isi Form Pengajuan <i data-lucide="arrow-right" class="w-5 h-5"></i></button>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        const priceInput = document.getElementById('price'), dpInput = document.getElementById('dp');
        const resPokok = document.getElementById('resPokok'), resMargin = document.getElementById('resMargin'), resTotal = document.getElementById('resTotal'), resCicilan = document.getElementById('resCicilan');
        let currentMargin = 25; let isVoucherClaimed = false;

        function klaimVoucher() {
            if (isVoucherClaimed) return;
            const btn = document.getElementById('btnVoucher'), desc = document.getElementById('voucherDesc'), title = document.getElementById('voucherTitle'), inputKode = document.getElementById('kodePromo');
            const kodeVal = inputKode.value.trim().toLowerCase();
            
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Memproses...`; btn.classList.add('opacity-90', 'cursor-wait'); inputKode.disabled = true;
            
            setTimeout(() => {
                let pesanBerhasil = ""; let isDiskon = true;
                if (kodeVal === 'dulurdewe22') { currentMargin = 22; pesanBerhasil = `Kode valid! Biaya layanan <b class="text-emerald-700 bg-emerald-100 px-1 rounded">22%</b> 🎉`; } 
                else if (kodeVal === 'nawakewed') { currentMargin = 20; pesanBerhasil = `Kode valid! Biaya VVIP <b class="text-emerald-700 bg-emerald-100 px-1 rounded">20%</b> 🔥`; } 
                else {
                    const gachaPool = [25,25,25,25,25,24,24,24,24,24,23,23,23,23,23,22,22,21,21,20];
                    currentMargin = gachaPool[Math.floor(Math.random() * gachaPool.length)];
                    if (currentMargin === 25) { isDiskon = false; pesanBerhasil = `Biaya normal OJK <b class="text-blue-700 bg-blue-100 px-1 rounded">25%</b>. Transaksi aman diawasi negara! 🛡️`; } 
                    else if (kodeVal !== "") { pesanBerhasil = `Kode hangus, tapi undian hoki memotong biaya menjadi <b class="text-emerald-700 bg-emerald-100 px-1 rounded">${currentMargin}%</b> 🥳`; } 
                    else { pesanBerhasil = `Hoki! Hasil undian otomatis memotong biaya layanan menjadi <b class="text-emerald-700 bg-emerald-100 px-1 rounded">${currentMargin}%</b> 🎉`; }
                }
                
                isVoucherClaimed = true; btn.innerHTML = `<i data-lucide="check-circle-2" class="w-5 h-5"></i> Selesai`; btn.classList.remove('cursor-wait');
                
                if(isDiskon) {
                    title.innerText = "Status: Potongan Aktif!";
                    btn.classList.replace('bg-amber-500', 'bg-emerald-500'); document.getElementById('voucherBox').className = "bg-gradient-to-r from-emerald-50 to-teal-50 border-2 border-emerald-200 p-4 sm:p-5 rounded-2xl relative flex flex-col gap-4 animate-pop";
                    document.getElementById('voucherIcon').className = "w-6 h-6 text-emerald-600"; desc.className = "text-xs text-emerald-800 font-medium"; title.className = "text-sm font-black text-emerald-900 mb-0.5";
                } else {
                    title.innerText = "Status: Terverifikasi OJK";
                    btn.classList.replace('bg-amber-500', 'bg-blue-500'); document.getElementById('voucherBox').className = "bg-gradient-to-r from-blue-50 to-indigo-50 border-2 border-blue-200 p-4 sm:p-5 rounded-2xl relative flex flex-col gap-4 animate-pop";
                    document.getElementById('voucherIcon').className = "w-6 h-6 text-blue-600"; desc.className = "text-xs text-blue-800 font-medium"; title.className = "text-sm font-black text-blue-900 mb-0.5";
                }
                inputKode.classList.add('opacity-60'); desc.innerHTML = pesanBerhasil;
                lucide.createIcons(); calculate(); 
            }, 1200); 
        }

        const formatRupiah = (num) => (num === 0 || isNaN(num)) ? "0" : new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;
        priceInput.addEventListener('input', (e) => { let val = parseRupiah(e.target.value); e.target.value = val === 0 ? '' : formatRupiah(val); calculate(); });
        dpInput.addEventListener('input', (e) => { let val = parseRupiah(e.target.value); e.target.value = val === 0 ? '' : formatRupiah(val); calculate(); });

        function calculate() {
            const price = parseRupiah(priceInput.value); const dp = parseRupiah(dpInput.value);
            const tenor = parseInt(document.querySelector('input[name="tenor"]:checked').value);
            document.getElementById('resMarginText').innerText = currentMargin < 25 ? `Promo (${currentMargin}%)` : `Standar OJK (${currentMargin}%)`;

            if (price === 0) { resPokok.innerText = "Rp 0"; resMargin.innerText = "Rp 0"; resTotal.innerText = "Rp 0"; resCicilan.innerText = "0"; return; }

            let pokok = price - dp; if (pokok < 0) pokok = 0; 
            const nominalMargin = pokok * (currentMargin / 100);
            const total = pokok + nominalMargin;
            resPokok.innerText = `Rp ${formatRupiah(pokok)}`; resMargin.innerText = `Rp ${formatRupiah(nominalMargin)}`; resTotal.innerText = `Rp ${formatRupiah(total)}`;
            resCicilan.innerText = formatRupiah(Math.round(total / tenor));
        }
        calculate();

        function lanjutKeForm() {
            const harga = parseRupiah(priceInput.value);
            if(harga === 0) return alert("Isi Harga Gadget!");
            const dp = parseRupiah(dpInput.value);
            const tenor = document.querySelector('input[name="tenor"]:checked').value;
            // LEMPAR DATA OTOMATIS KE FORM
            window.location.href = `form-pengajuan.html?harga=${harga}&dp=${dp}&tenor=${tenor}`;
        }
    </script>
</body>
</html>
