<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Simulasi - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05); }
        .glass-panel-dark { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .radio-btn-label { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .radio-input:checked + .radio-btn-label { transform: scale(0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input:focus { border-color: #10b981 !important; box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
    </style>
</head>
<body class="min-h-screen flex p-4 sm:p-6 lg:p-8 text-slate-800 selection:bg-emerald-200">

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4"></div>

    <main class="m-auto w-full max-w-5xl glass-card rounded-[2.5rem] overflow-hidden flex flex-col lg:flex-row relative z-10">
        <!-- Area Input -->
        <section class="w-full lg:w-7/12 p-6 sm:p-8 md:p-10 flex flex-col justify-center">
            <header class="mb-8">
                <a href="index.html" class="inline-flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-500 mb-5 shadow-sm transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <div class="flex items-center gap-2 mb-3">
                    <div class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-emerald-100/80 text-emerald-700 text-xs font-bold uppercase"><i data-lucide="shield-check" class="w-4 h-4"></i> Transparan & Syariah</div>
                </div>
                <h1 class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight leading-tight">Simulasi Cicilan <br/><span class="text-emerald-600">Zenith Cell.</span></h1>
            </header>

            <form id="calcForm" class="space-y-8" onsubmit="event.preventDefault();">
                <div class="space-y-5">
                    <!-- Harga Barang -->
                    <div class="group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Harga Gadget Normal</label>
                        <div class="relative flex items-center">
                            <div class="absolute left-4 text-slate-400 font-bold">Rp</div>
                            <input type="text" id="price" inputmode="numeric" placeholder="15.000.000" class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-black text-xl outline-none transition-all">
                        </div>
                    </div>

                    <!-- Uang Muka -->
                    <div class="group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Uang Muka (DP) <span class="text-slate-400 font-normal ml-1">Opsional</span></label>
                        <div class="relative flex items-center">
                            <div class="absolute left-4 text-slate-400 font-bold">Rp</div>
                            <input type="text" id="dp" inputmode="numeric" placeholder="0" class="w-full pl-12 pr-4 py-4 bg-slate-50 border-2 border-transparent rounded-2xl font-bold text-xl outline-none transition-all">
                        </div>
                    </div>
                    
                    <!-- Pilihan Jalur -->
                    <div class="group">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Pilih Jalur & Jaminan</label>
                        <select id="jenisJalur" onchange="calculate()" class="w-full px-4 py-4 bg-emerald-50 border-2 border-emerald-200 text-emerald-800 rounded-2xl font-bold outline-none text-sm appearance-none cursor-pointer hover:bg-emerald-100 transition-colors">
                            <option value="25" selected>REGULER (Margin 25%) - Tanpa Jaminan</option>
                            <option value="15">🌟 JALUR VIP (Margin 15%) - Syarat Titip Jaminan</option>
                        </select>
                        <p class="text-[10px] text-slate-500 font-medium mt-2 leading-relaxed">Jalur VIP memerlukan titipan jaminan fisik (BPKB/Ijazah Asli) selama masa angsuran.</p>
                    </div>
                </div>

                <!-- Tenor -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3">Pilih Tenor (Durasi Cicilan)</label>
                    <div class="grid grid-cols-4 gap-2 sm:gap-3">
                        <label class="cursor-pointer relative"><input type="radio" name="tenor" value="3" class="radio-input peer sr-only" onchange="calculate()"><div class="radio-btn-label w-full py-3 rounded-xl bg-white border-2 border-slate-100 flex flex-col items-center justify-center peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 shadow-sm transition-all"><span class="text-lg sm:text-xl font-black leading-none">3</span><span class="text-[9px] font-bold uppercase mt-1 opacity-70">Bln</span></div></label>
                        <label class="cursor-pointer relative"><input type="radio" name="tenor" value="5" class="radio-input peer sr-only" checked onchange="calculate()"><div class="radio-btn-label w-full py-3 rounded-xl bg-white border-2 border-slate-100 flex flex-col items-center justify-center peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 shadow-sm transition-all"><span class="text-lg sm:text-xl font-black leading-none">5</span><span class="text-[9px] font-bold uppercase mt-1 opacity-70">Bln</span></div></label>
                        <label class="cursor-pointer relative"><input type="radio" name="tenor" value="8" class="radio-input peer sr-only" onchange="calculate()"><div class="radio-btn-label w-full py-3 rounded-xl bg-white border-2 border-slate-100 flex flex-col items-center justify-center peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 shadow-sm transition-all"><span class="text-lg sm:text-xl font-black leading-none">8</span><span class="text-[9px] font-bold uppercase mt-1 opacity-70">Bln</span></div></label>
                        <label class="cursor-pointer relative"><input type="radio" name="tenor" value="10" class="radio-input peer sr-only" onchange="calculate()"><div class="radio-btn-label w-full py-3 rounded-xl bg-white border-2 border-slate-100 flex flex-col items-center justify-center peer-checked:bg-slate-800 peer-checked:text-white peer-checked:border-slate-800 shadow-sm transition-all"><span class="text-lg sm:text-xl font-black leading-none">10</span><span class="text-[9px] font-bold uppercase mt-1 opacity-70">Bln</span></div></label>
                    </div>
                </div>
            </form>
        </section>

        <!-- Area Hasil -->
        <section class="w-full lg:w-5/12 bg-slate-900 text-white p-6 sm:p-8 md:p-10 flex flex-col relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-emerald-500/10 blur-[100px] rounded-full -mr-20 -mt-20"></div>
            
            <div class="relative z-10 flex-grow flex flex-col h-full">
                <div class="mb-6 lg:mb-10 mt-2">
                    <h2 class="text-slate-400 font-semibold tracking-widest text-xs uppercase mb-4 flex items-center gap-2"><i data-lucide="calculator" class="w-4 h-4"></i> Estimasi Cicilan</h2>
                    <div class="flex items-start gap-1.5 mb-2"><span class="text-2xl sm:text-3xl font-bold mt-1.5 text-emerald-400">Rp</span><span class="text-5xl sm:text-6xl font-black" id="resCicilan">0</span></div>
                    <p class="text-slate-400 text-[10px] font-medium italic">*Simulasi bersifat estimasi awal.</p>
                </div>

                <div class="glass-panel-dark rounded-[2rem] p-6 space-y-4 mb-6 mt-auto">
                    <div class="flex justify-between items-center"><span class="text-slate-300 text-sm">Pokok Pembiayaan</span><span class="font-bold text-white" id="resPokok">Rp 0</span></div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-300 text-sm flex items-center gap-2">Biaya Layanan <span class="text-[9px] font-bold bg-blue-500/20 px-1.5 py-0.5 rounded text-blue-300 uppercase" id="resMarginText">25%</span></span>
                        <span class="font-bold text-white" id="resMargin">Rp 0</span>
                    </div>
                    <div class="pt-4 border-t border-white/10 flex justify-between items-center"><span class="text-emerald-400 text-sm font-bold uppercase tracking-wider">Total Akad</span><span class="font-black text-xl text-white" id="resTotal">Rp 0</span></div>
                </div>

                <button onclick="lanjutKeForm()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-black py-4 rounded-2xl flex items-center justify-center gap-2 active:scale-95 transition-all shadow-lg shadow-emerald-500/20">Lanjut Isi Form Pengajuan <i data-lucide="arrow-right" class="w-5 h-5"></i></button>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        // --- FUNGSI TOAST MODERN ---
        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.className = `${bgColor} text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 transform -translate-y-10 opacity-0 transition-all duration-300 w-full pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 shrink-0"></i><span class="text-sm font-bold">${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => { toast.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { 
                toast.classList.add('-translate-y-10', 'opacity-0'); 
                setTimeout(() => toast.remove(), 300); 
            }, 3500);
        }

        const priceInput = document.getElementById('price');
        const dpInput = document.getElementById('dp');
        const resPokok = document.getElementById('resPokok');
        const resMargin = document.getElementById('resMargin');
        const resTotal = document.getElementById('resTotal');
        const resCicilan = document.getElementById('resCicilan');
        const resMarginText = document.getElementById('resMarginText');

        const formatRupiah = (num) => (num === 0 || isNaN(num)) ? "0" : new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;

        priceInput.addEventListener('input', (e) => { 
            let val = parseRupiah(e.target.value); 
            e.target.value = val === 0 ? '' : formatRupiah(val); 
            calculate(); 
        });

        dpInput.addEventListener('input', (e) => { 
            let val = parseRupiah(e.target.value); 
            e.target.value = val === 0 ? '' : formatRupiah(val); 
            calculate(); 
        });

        function calculate() {
            const price = parseRupiah(priceInput.value); 
            const dp = parseRupiah(dpInput.value);
            const tenor = parseInt(document.querySelector('input[name="tenor"]:checked').value);
            const finalMargin = parseInt(document.getElementById('jenisJalur').value);

            resMarginText.innerText = `${finalMargin}%`;

            if (price === 0) {
                resPokok.innerText = "Rp 0"; resMargin.innerText = "Rp 0"; resTotal.innerText = "Rp 0"; resCicilan.innerText = "0";
                return;
            }

            let pokok = price - dp; 
            if (pokok < 0) pokok = 0; 
            
            const nominalMargin = pokok * (finalMargin / 100);
            const total = pokok + nominalMargin;
            
            resPokok.innerText = `Rp ${formatRupiah(pokok)}`; 
            resMargin.innerText = `Rp ${formatRupiah(nominalMargin)}`; 
            resTotal.innerText = `Rp ${formatRupiah(total)}`;
            resCicilan.innerText = formatRupiah(Math.round(total / tenor));
        }
        
        function lanjutKeForm() {
            const harga = parseRupiah(priceInput.value);
            if(harga === 0) {
                showToast("Silakan isi Harga Gadget terlebih dahulu!");
                priceInput.focus();
                return;
            }
            
            const dp = parseRupiah(dpInput.value);
            const tenor = document.querySelector('input[name="tenor"]:checked').value;
            const jaminan = document.getElementById('jenisJalur').value === "15" ? "Jaminan" : "Tanpa";
            
            window.location.href = `form-pengajuan.html?harga=${harga}&dp=${dp}&tenor=${tenor}&jalur=${jaminan}`;
        }

        calculate();
    </script>
</body>
</html>
