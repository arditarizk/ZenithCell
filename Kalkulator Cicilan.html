<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalkulator Simulasi - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        input:focus-within, select:focus-within { outline: 2px solid #10b981; outline-offset: 2px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 lg:p-8 min-h-screen flex selection:bg-emerald-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4"></div>

    <main class="m-auto w-full max-w-md lg:max-w-5xl bg-white/50 lg:bg-white lg:glass-panel lg:rounded-[2.5rem] lg:p-8 lg:shadow-xl relative z-10 flex flex-col pb-24 lg:pb-8 pt-6 lg:pt-8">
        <header class="mb-6 flex items-center gap-4 bg-white p-4 rounded-[2rem] lg:rounded-2xl shadow-sm border relative mx-4 lg:mx-0">
            <a href="index.html" class="p-2.5 bg-slate-50 border border-slate-100 rounded-full text-slate-500 active:scale-95 transition-all"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div>
                <h1 class="font-black text-xl leading-none text-slate-900">Simulasi Kredit</h1>
                <p class="text-[10px] font-bold text-emerald-600 uppercase mt-1 tracking-widest">Kalkulator Murabahah</p>
            </div>
        </header>

        <div class="px-4 lg:px-0 flex-grow grid grid-cols-1 lg:grid-cols-2 gap-5 lg:gap-8">
            <div class="space-y-4">
                <section class="glass-panel p-5 rounded-3xl">
                    <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="calculator" class="w-4 h-4 text-emerald-500"></i> Nilai Barang</h2>
                    <div class="space-y-3">
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-slate-400 font-bold text-sm">Rp</span>
                            <input type="text" id="hargaBarang" inputmode="numeric" placeholder="Harga Pokok Barang" class="w-full pl-10 pr-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-base focus:border-emerald-500">
                        </div>
                        <div class="relative flex items-center">
                            <span class="absolute left-4 text-slate-400 font-bold text-sm">Rp</span>
                            <input type="text" id="dpBarang" inputmode="numeric" placeholder="Uang Muka (DP) - Opsional" class="w-full pl-10 pr-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-base focus:border-emerald-500">
                        </div>
                    </div>
                </section>

                <section class="glass-panel p-5 rounded-3xl">
                    <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="settings-2" class="w-4 h-4 text-emerald-500"></i> Pengaturan Akad</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest">Pilih Jalur Transaksi</label>
                            <select id="jenisJalur" onchange="hitungSimulasi()" class="w-full px-4 py-3 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                                <option value="25" selected>REGULER (Margin 25%) - Tanpa Jaminan</option>
                                <option value="15">🌟 VIP (Margin 15%) - Titip Jaminan</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest">Tenor (Lama Cicilan)</label>
                            <div class="flex gap-2">
                                <label class="flex-1"><input type="radio" name="tenor" value="3" class="peer sr-only" onchange="hitungSimulasi()"><div class="text-center py-2.5 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-500 font-bold text-xs peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 transition-all cursor-pointer">3 Bln</div></label>
                                <label class="flex-1"><input type="radio" name="tenor" value="5" class="peer sr-only" checked onchange="hitungSimulasi()"><div class="text-center py-2.5 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-500 font-bold text-xs peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 transition-all cursor-pointer">5 Bln</div></label>
                                <label class="flex-1"><input type="radio" name="tenor" value="8" class="peer sr-only" onchange="hitungSimulasi()"><div class="text-center py-2.5 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-500 font-bold text-xs peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 transition-all cursor-pointer">8 Bln</div></label>
                                <label class="flex-1"><input type="radio" name="tenor" value="10" class="peer sr-only" onchange="hitungSimulasi()"><div class="text-center py-2.5 rounded-xl border-2 border-slate-100 bg-slate-50 text-slate-500 font-bold text-xs peer-checked:border-emerald-500 peer-checked:bg-emerald-50 peer-checked:text-emerald-700 transition-all cursor-pointer">10 Bln</div></label>
                            </div>
                        </div>

                        <div class="p-3 bg-amber-50 border border-amber-100 rounded-xl">
                            <div class="flex items-center gap-2 mb-2"><i data-lucide="ticket-percent" class="w-3.5 h-3.5 text-amber-500"></i><span class="text-[10px] font-black text-amber-700 uppercase tracking-widest">Punya Promo?</span></div>
                            <div class="flex gap-2">
                                <input type="text" id="kodePromo" placeholder="Ketik kode..." class="flex-grow px-3 py-2 bg-white border border-amber-200 rounded-lg font-black uppercase outline-none text-xs focus:border-amber-500">
                                <button onclick="cekPromo()" class="bg-amber-500 text-white px-3 rounded-lg font-bold text-[10px] active:scale-95 transition-all">Gunakan</button>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <div class="flex flex-col justify-between">
                <section class="glass-panel p-6 rounded-[2rem] bg-slate-900 text-white shadow-2xl relative overflow-hidden border border-slate-800 h-full flex flex-col justify-center">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/20 rounded-full blur-3xl"></div>
                    
                    <h3 class="text-center text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1">Angsuran Per Bulan</h3>
                    <div class="text-center mb-8 flex justify-center items-start gap-1">
                        <span class="text-emerald-400 font-bold mt-1">Rp</span>
                        <span class="text-4xl font-black tracking-tight" id="resCicilan">0</span>
                    </div>

                    <div class="space-y-4 relative z-10">
                        <div class="flex justify-between items-center pb-3 border-b border-slate-700/50">
                            <span class="text-xs text-slate-400 font-medium">Sisa Pokok (Setelah DP)</span>
                            <span class="text-sm font-bold" id="resPokok">Rp 0</span>
                        </div>
                        <div class="flex justify-between items-center pb-3 border-b border-slate-700/50">
                            <span class="text-xs text-slate-400 font-medium flex items-center gap-1">Margin / Profit <span id="labelMarginAktif" class="bg-emerald-500/20 text-emerald-400 px-1.5 rounded text-[9px] font-black">25%</span></span>
                            <span class="text-sm font-bold" id="resMargin">Rp 0</span>
                        </div>
                        <div class="flex justify-between items-center pt-2">
                            <span class="text-xs text-slate-300 font-bold uppercase tracking-wider">Total Akad Jual Beli</span>
                            <span class="text-lg font-black text-emerald-400" id="resTotal">Rp 0</span>
                        </div>
                    </div>
                </section>

                <div class="fixed lg:static bottom-4 left-1/2 lg:left-auto -translate-x-1/2 lg:translate-x-0 w-[92%] lg:w-full z-50 lg:z-auto lg:mt-8">
                    <button onclick="lanjutKeForm()" class="w-full bg-emerald-500 text-white font-extrabold py-4 px-6 rounded-2xl active:scale-95 transition-all flex justify-center items-center gap-2 shadow-lg shadow-emerald-500/30 border border-emerald-400">
                        <span>Lanjut Ajukan Pembiayaan</span><i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        let promoMargin = null;

        const priceInput = document.getElementById('hargaBarang');
        const dpInput = document.getElementById('dpBarang');
        
        const resCicilan = document.getElementById('resCicilan');
        const resPokok = document.getElementById('resPokok');
        const resMargin = document.getElementById('resMargin');
        const resTotal = document.getElementById('resTotal');
        const labelMarginAktif = document.getElementById('labelMarginAktif');

        const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num);
        // FIX BUG PARSING: Membuang desimal agar angka aman
        const parseRupiah = (str) => parseInt(str.toString().split(',')[0].replace(/[^0-9]/g, '')) || 0;

        function showToast(msg, type = 'error') {
            const container = document.getElementById('toastContainer');
            container.innerHTML = ''; 
            
            const toast = document.createElement('div');
            let bgColor = 'bg-red-500'; let icon = 'alert-circle';
            
            if (type === 'success') { bgColor = 'bg-emerald-500'; icon = 'check-circle'; }
            else if (type === 'info') { bgColor = 'bg-amber-500'; icon = 'info'; }
            
            toast.className = `${bgColor} text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center justify-center gap-2 transform -translate-y-10 opacity-0 transition-all duration-300 w-full pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 shrink-0"></i><span class="text-sm font-bold text-center">${msg}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();
            
            setTimeout(() => { toast.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        [priceInput, dpInput].forEach(el => {
            el.addEventListener('input', function(e) {
                this.value = formatRupiah(parseRupiah(this.value)) || '';
                hitungSimulasi();
            });
        });

        function cekPromo() {
            const kode = document.getElementById('kodePromo').value.trim().toLowerCase();
            const jalurM = document.getElementById('jenisJalur').value;
            if(!kode) return showToast("Masukkan kode promo.");
            
            if(typeof CONFIG !== 'undefined' && CONFIG.VOUCHERS && CONFIG.VOUCHERS[kode]) {
                if(CONFIG.VOUCHERS[kode].margin >= parseInt(jalurM)) {
                    showToast(`Jalur pilihan Anda (${jalurM}%) sudah lebih murah dari promo ini.`, "info");
                    return;
                }
                promoMargin = CONFIG.VOUCHERS[kode].margin;
                const pesanCustom = CONFIG.VOUCHERS[kode].pesan || `Promo Aktif! Margin turun menjadi ${promoMargin}%`;
                showToast(pesanCustom, "success");
                hitungSimulasi();
            } else {
                promoMargin = null;
                showToast("Kode promo tidak valid.");
                hitungSimulasi();
            }
        }

        function hitungSimulasi() {
            const price = parseRupiah(priceInput.value);
            const dp = parseRupiah(dpInput.value);
            const tenor = parseInt(document.querySelector('input[name="tenor"]:checked').value);
            const baseMargin = parseInt(document.getElementById('jenisJalur').value);
            
            const finalMargin = promoMargin !== null ? promoMargin : baseMargin;
            labelMarginAktif.innerText = `${finalMargin}%`;

            if (price === 0) {
                resPokok.innerText = "Rp 0"; resMargin.innerText = "Rp 0"; resTotal.innerText = "Rp 0"; resCicilan.innerText = "0";
                return;
            }

            let pokok = price - dp; if (pokok < 0) pokok = 0; 
            
            // FIX BUG MATEMATIKA: Bulatkan hasil kali dan totalnya agar tidak koma
            const nominalMargin = Math.round(pokok * (finalMargin / 100));
            const total = Math.round(pokok + nominalMargin);
            
            resPokok.innerText = `Rp ${formatRupiah(pokok)}`; 
            resMargin.innerText = `Rp ${formatRupiah(nominalMargin)}`; 
            resTotal.innerText = `Rp ${formatRupiah(total)}`;
            resCicilan.innerText = formatRupiah(Math.round(total / tenor));
        }
        
        function lanjutKeForm() {
            const harga = parseRupiah(priceInput.value);
            if(harga === 0) {
                showToast("Silakan isi Harga Gadget terlebih dahulu.", "error");
                priceInput.focus();
                return;
            }
            const dp = parseRupiah(dpInput.value);
            const tenor = document.querySelector('input[name="tenor"]:checked').value;
            const jalur = document.getElementById('jenisJalur').value; 
            const voucher = document.getElementById('kodePromo').value.trim();
            
            let url = `form-pengajuan.html?harga=${harga}&dp=${dp}&tenor=${tenor}&jalur=${jalur}`;
            if(voucher && promoMargin !== null) { 
                url += `&voucher=${encodeURIComponent(voucher)}`;
            }
            
            window.location.href = url;
        }
    </script>
</body>
</html>
