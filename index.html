<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zenith Cell - Gadget Syariah Kota Malang</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .clean-card { background: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 4px 20px -5px rgba(0,0,0,0.03); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 flex justify-center selection:bg-emerald-200">

    <main class="w-full max-w-md lg:max-w-4xl px-5 pt-8 lg:pt-16 relative z-10 flex flex-col min-h-screen mx-auto">
        <header class="mb-8 text-center flex flex-col items-center relative">
            <button onclick="bukaSidebar()" class="absolute top-0 right-0 lg:right-auto lg:left-0 p-3 bg-white rounded-xl shadow-sm border border-slate-200 text-slate-500 hover:text-emerald-500 active:scale-95 transition-all"><i data-lucide="menu" class="w-6 h-6"></i></button>

            <div class="w-24 h-24 lg:w-32 lg:h-32 bg-white p-2 rounded-[1.5rem] lg:rounded-[2rem] shadow-sm border border-slate-100 flex items-center justify-center mb-5 lg:mb-6 mt-2">
                <img src="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/5daa1530-3351-436c-abc0-38c81c73669f.png" class="w-full h-full object-contain rounded-[1.25rem]">
            </div>

            <h1 class="font-extrabold text-3xl lg:text-5xl text-slate-900 tracking-tight leading-none mb-3">Zenith Cell</h1>
            <p class="text-[10px] lg:text-xs font-black text-emerald-600 uppercase tracking-widest bg-emerald-50 px-4 py-2 rounded-xl border border-emerald-100">Ekosistem Gadget Syariah</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            <section class="clean-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-emerald-200 active:scale-95 transition-transform group cursor-pointer" onclick="window.open('https://drive.google.com/uc?export=download&id=1E2UrhhMmcF5Nf4F7uUJtdWuY4704ht9d')">
                <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center group-hover:bg-emerald-500 transition-colors"><i data-lucide="file-text" class="w-7 h-7 text-emerald-600 group-hover:text-white"></i></div>
                <div><h3 class="font-bold text-sm text-slate-800">Form Akad</h3><p class="text-[10px] text-slate-500">Unduh PDF</p></div>
            </section>

            <a href="cek-tagihan-live.html" class="clean-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-blue-200 active:scale-95 transition-transform group">
                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center group-hover:bg-blue-500 transition-colors"><i data-lucide="search" class="w-7 h-7 text-blue-600 group-hover:text-white"></i></div>
                <div><h3 class="font-bold text-sm text-slate-800">Cek Tagihan</h3><p class="text-[10px] text-slate-500">Live Tracker</p></div>
            </a>

            <a href="Kalkulator Cicilan.html" class="clean-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-amber-200 active:scale-95 transition-transform group">
                <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center group-hover:bg-amber-500 transition-colors"><i data-lucide="calculator" class="w-7 h-7 text-amber-600 group-hover:text-white"></i></div>
                <div><h3 class="font-bold text-sm text-slate-800">Kalkulator</h3><p class="text-[10px] text-slate-500">Simulasi Angsuran</p></div>
            </a>

            <a href="form-pengajuan.html" class="clean-card p-5 rounded-[1.5rem] flex items-center gap-4 hover:border-indigo-200 active:scale-95 transition-transform group">
                <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center group-hover:bg-indigo-500 transition-colors"><i data-lucide="clipboard-list" class="w-7 h-7 text-indigo-600 group-hover:text-white"></i></div>
                <div><h3 class="font-bold text-sm text-slate-800">Ajukan Kredit</h3><p class="text-[10px] text-slate-500">Daftar Sekarang</p></div>
            </a>
        </div>

        <footer class="text-center mt-auto pb-6 pt-8 border-t border-slate-200">
            <div class="text-[11px] font-medium text-slate-400">&copy; 2026 Zenith Cell Ecosystem. Designed by <span class="font-bold text-slate-500">Ardita Rizki Fauzi</span></div>
        </footer>
        <div class="w-full h-24 lg:hidden shrink-0"></div>
    </main>

    <nav class="fixed lg:hidden bottom-5 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-white/95 backdrop-blur-md rounded-3xl p-2 shadow-2xl z-50 border border-slate-100">
        <div class="flex justify-around items-center relative">
            <a href="index.html" class="flex flex-col items-center gap-1 p-2 text-emerald-500"><i data-lucide="home" class="w-5 h-5"></i></a>
            <a href="Kalkulator Cicilan.html" class="flex flex-col items-center gap-1 p-2 text-slate-400"><i data-lucide="calculator" class="w-5 h-5"></i></a>
            <button onclick="requestPin('zenith-pos-dinamis.html')" class="bg-emerald-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg -mt-10 border-[6px] border-[#f8fafc]"><i data-lucide="plus" class="w-6 h-6"></i></button>
            <a href="cek-tagihan-live.html" class="flex flex-col items-center gap-1 p-2 text-slate-400"><i data-lucide="search" class="w-5 h-5"></i></a>
            <button onclick="bukaSidebar()" class="flex flex-col items-center gap-1 p-2 text-slate-400"><i data-lucide="menu" class="w-5 h-5"></i></button>
        </div>
    </nav>

    <div id="sidebarOverlay" class="fixed inset-0 bg-slate-900/40 z-[90] opacity-0 pointer-events-none transition-opacity" onclick="tutupSidebar()"></div>
    <aside id="sidebarMenu" class="fixed top-0 right-0 h-full w-72 bg-white shadow-2xl z-[100] transform translate-x-full transition-transform flex flex-col">
        <div class="p-5 border-b flex justify-between items-center"><h3 class="font-black text-slate-800"><i data-lucide="compass" class="w-5 h-5 text-emerald-500 inline mr-2"></i> Menu Pintar</h3><button onclick="tutupSidebar()" class="text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-5 h-5"></i></button></div>
        <div class="p-5 space-y-4">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Otoritas Admin</p>
            <button onclick="requestPin('zenith-pos-dinamis.html')" class="w-full flex items-center gap-3 p-3 bg-emerald-500 text-white rounded-2xl"><div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center"><i data-lucide="smartphone" class="w-5 h-5"></i></div><div class="text-left"><h4 class="font-bold text-sm">Mesin Kasir</h4></div></button>
            <button onclick="requestPin('reminder-tagihan-dinamis.html')" class="w-full flex items-center gap-3 p-3 bg-slate-900 text-white rounded-2xl"><div class="w-10 h-10 bg-slate-800 rounded-xl flex items-center justify-center"><i data-lucide="shield" class="w-5 h-5"></i></div><div class="text-left"><h4 class="font-bold text-sm">Server Panel</h4></div></button>
        </div>
    </aside>

    <div id="pinModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] hidden items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-white rounded-[2rem] p-6 max-w-[300px] w-full text-center shadow-2xl" id="pinCard">
            <button onclick="closePin()" class="absolute top-4 right-4 p-1.5 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200"><i data-lucide="x" class="w-4 h-4"></i></button>
            <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center mx-auto mb-3"><i data-lucide="lock" class="w-5 h-5 text-emerald-600"></i></div>
            <h3 class="text-lg font-extrabold mb-1">Akses Admin</h3>
            <form id="pinForm">
                <input type="password" id="pinInput" placeholder="Sandi" class="w-full text-center py-3 bg-slate-50 border rounded-xl font-bold mt-4 focus:border-emerald-500 outline-none">
                <button type="submit" class="w-full bg-emerald-500 text-white font-bold py-3 rounded-xl mt-4">Masuk</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons(); let pendingUrl = "";
        function bukaSidebar() { document.getElementById('sidebarOverlay').classList.remove('opacity-0', 'pointer-events-none'); document.getElementById('sidebarMenu').classList.remove('translate-x-full'); }
        function tutupSidebar() { document.getElementById('sidebarOverlay').classList.add('opacity-0', 'pointer-events-none'); document.getElementById('sidebarMenu').classList.add('translate-x-full'); }
        function requestPin(url) { pendingUrl = url; document.getElementById('pinInput').value = ""; document.getElementById('pinModal').classList.replace('hidden', 'flex'); setTimeout(() => document.getElementById('pinModal').classList.remove('opacity-0'), 10); }
        function closePin() { document.getElementById('pinModal').classList.add('opacity-0'); setTimeout(() => document.getElementById('pinModal').classList.replace('flex', 'hidden'), 300); }
        document.getElementById('pinForm').addEventListener('submit', (e) => { e.preventDefault(); if (document.getElementById('pinInput').value === CONFIG.PIN_ADMIN) { window.location.href = pendingUrl; } else { alert("Sandi Salah!"); document.getElementById('pinInput').value=""; } });
    </script>
</body>
</html>
