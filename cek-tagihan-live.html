<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Tagihan - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        .shining-badge { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #fcd34d 100%); color: #78350f; animation: pulse-soft 2s infinite; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .spinner { border: 3px solid rgba(16, 185, 129, 0.3); border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 lg:p-8 min-h-screen flex selection:bg-emerald-200">

    <main class="m-auto w-full max-w-md lg:max-w-5xl bg-white/50 lg:bg-white lg:glass-card lg:rounded-[2.5rem] lg:p-8 lg:shadow-xl relative z-10 flex flex-col pb-24 lg:pb-0 pt-6 lg:pt-0">
        
        <header class="mb-6 flex items-center gap-4 bg-white p-4 rounded-[2rem] lg:rounded-2xl shadow-sm border relative mx-4 lg:mx-0">
            <a href="index.html" class="p-2.5 bg-slate-50 border border-slate-100 rounded-full text-slate-500 active:scale-95 transition-all hover:bg-slate-200"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div>
                <h1 class="font-black text-xl leading-none text-slate-900">Cek Tagihan</h1>
                <p class="text-[10px] font-bold text-emerald-600 uppercase mt-1 tracking-widest">Portal Nasabah</p>
            </div>
        </header>

        <div class="px-4 lg:px-0 max-w-md mx-auto w-full">
            <form id="formCek" class="space-y-4 mb-6">
                <div>
                    <label class="block text-[10px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">Masukkan Nomor WhatsApp</label>
                    <div class="relative flex items-center bg-white border border-slate-200 rounded-2xl shadow-sm focus-within:border-emerald-500 transition-all">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="phone" class="w-4 h-4 text-emerald-500"></i></div>
                        
                        <input type="tel" id="waInput" placeholder="Contoh: 08123456789" required class="w-full pl-11 pr-20 py-3.5 bg-transparent text-sm font-bold outline-none rounded-2xl">
                        
                        <div class="absolute inset-y-0 right-0 pr-2 flex items-center gap-0.5">
                            <button type="button" onclick="pasteWA()" class="p-2 text-slate-400 hover:text-emerald-500 transition-colors" title="Tempel / Paste"><i data-lucide="clipboard" class="w-4 h-4"></i></button>
                            <button type="button" onclick="clearWA()" class="p-2 text-slate-400 hover:text-red-500 transition-colors" title="Hapus"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                </div>
                <button type="submit" id="btnCari" class="w-full bg-slate-900 text-white font-extrabold py-3.5 rounded-2xl active:scale-95 transition-all shadow-lg flex justify-center items-center gap-2">
                    <i data-lucide="search" class="w-4 h-4 text-emerald-400"></i> Cek Status
                </button>
                <p id="errorMsg" class="text-xs text-red-500 font-bold text-center hidden"></p>
            </form>

            <div id="hasilCard" class="hidden flex-col gap-4 mt-2 border-t border-slate-100 pt-6">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Nasabah</p>
                        <h2 class="font-black text-xl text-slate-900 uppercase" id="resNama">Nama</h2>
                    </div>
                    <div id="badgeRapor" class="shining-badge px-2.5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-md flex items-center gap-1">
                        <i data-lucide="star" class="w-3 h-3"></i> VVIP Lancar
                    </div>
                </div>

                <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                    <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1">Barang Akad</p>
                    <p class="font-bold text-slate-800 text-sm" id="resBarang">iPhone</p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Angsuran Ke</p>
                        <p class="font-black text-lg text-slate-900" id="resCicilanKe">0</p>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Jatuh Tempo</p>
                        <p class="font-black text-lg text-slate-900">Tgl <span id="resTempo">0</span></p>
                    </div>
                </div>

                <div class="bg-slate-900 p-5 rounded-2xl shadow-xl text-white mt-2 relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-24 h-24 bg-emerald-500/20 blur-2xl rounded-full -mr-10 -mt-10"></div>
                    <p class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1 relative z-10">Sisa Tagihan Total</p>
                    <div class="flex items-start gap-1 relative z-10">
                        <span class="text-emerald-400 font-bold mt-1 text-sm">Rp</span>
                        <span class="text-3xl font-black tracking-tighter" id="resHutang">0</span>
                    </div>
                </div>

                <button onclick="tambahkanKalenderIcs()" id="btnKalender" class="w-full mt-4 bg-white border-2 border-emerald-500 text-emerald-600 font-extrabold py-3.5 rounded-2xl active:scale-95 transition-all flex justify-center items-center gap-2 shadow-sm hover:bg-emerald-50">
                    <i data-lucide="calendar-plus" class="w-5 h-5"></i> Tambahkan ke Kalender HP
                </button>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const formatRp = (n) => new Intl.NumberFormat('id-ID').format(n);
        let currentData = null;

        async function pasteWA() {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('waInput').value = text.replace(/[^0-9]/g, '');
            } catch (err) {
                alert("Browser memblokir paste otomatis. Silakan paste manual dengan tahan kolom input lalu pilih 'Tempel/Paste'.");
            }
        }
        
        function clearWA() { 
            const input = document.getElementById('waInput');
            input.value = ''; 
            input.focus(); 
        }

        document.getElementById('formCek').addEventListener('submit', async (e) => {
            e.preventDefault();
            const wa = document.getElementById('waInput').value.replace(/[^0-9]/g, '');
            if(!wa) return;
            
            const btn = document.getElementById('btnCari');
            const err = document.getElementById('errorMsg');
            btn.disabled = true; btn.innerHTML = `<div class="spinner border-emerald-300 border-top-emerald-500"></div> Mencari...`;
            err.classList.add('hidden'); document.getElementById('hasilCard').classList.replace('flex', 'hidden');

            try {
                const res = await fetch(`${CONFIG.API_URL}?wa=${wa}`);
                const result = await res.json();
                
                if (result.status === 'success') {
                    tampilkanHasil(result.data);
                } else if (result.status === 'pending') {
                    err.innerText = "Pengajuan Anda masih dalam tahap antrean/verifikasi admin."; err.classList.remove('hidden');
                } else {
                    err.innerText = "Data tidak ditemukan. Pastikan nomor WA benar."; err.classList.remove('hidden');
                }
            } catch(e) {
                err.innerText = "Terjadi kesalahan jaringan."; err.classList.remove('hidden');
            }
            btn.disabled = false; btn.innerHTML = `<i data-lucide="search" class="w-4 h-4 text-emerald-400"></i> Cek Status`; lucide.createIcons();
        });

        function tampilkanHasil(data) {
            currentData = data;
            document.getElementById('resNama').innerText = data.nama;
            document.getElementById('resBarang').innerText = data.barang;
            document.getElementById('resCicilanKe').innerText = data.cicilanKe;
            document.getElementById('resTempo').innerText = data.jatuhTempo;
            
            let sisaHutang = data.totalHutang - data.terbayar;
            document.getElementById('resHutang').innerText = sisaHutang <= 0 ? "LUNAS!" : formatRp(sisaHutang);

            const badge = document.getElementById('badgeRapor');
            const btnKal = document.getElementById('btnKalender');
            
            if (sisaHutang <= 0) {
                badge.className = "px-2.5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-md flex items-center gap-1 bg-emerald-500 text-white";
                badge.innerHTML = `<i data-lucide="award" class="w-3 h-3"></i> LUNAS SEMPURNA`;
                btnKal.style.display = 'none';
            } else {
                btnKal.style.display = 'flex';
                const tglSkrg = new Date().getDate();
                const blnSkrg = new Date().getMonth() + 1;
                
                if (data.bulanTerakhirBayar !== blnSkrg && tglSkrg > data.jatuhTempo) {
                    badge.className = "px-2.5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-md flex items-center gap-1 bg-red-100 text-red-600 animate-pulse border border-red-200";
                    badge.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3"></i> Telat ${tglSkrg - data.jatuhTempo} Hari`;
                } else {
                    badge.className = "shining-badge px-2.5 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-md flex items-center gap-1";
                    badge.innerHTML = `<i data-lucide="star" class="w-3 h-3"></i> VVIP Lancar`;
                }
            }

            document.getElementById('hasilCard').classList.replace('hidden', 'flex');
            lucide.createIcons();
        }

        // FUNGSI MEMBUAT FILE .ICS UNTUK APLIKASI KALENDER BAWAAN
        function tambahkanKalenderIcs() {
            if(!currentData) return;
            const d = new Date();
            let targetBulan = d.getMonth();
            if (d.getDate() > currentData.jatuhTempo) targetBulan++; 
            
            const eventDate = new Date(d.getFullYear(), targetBulan, currentData.jatuhTempo);
            const yyyy = eventDate.getFullYear();
            const mm = String(eventDate.getMonth() + 1).padStart(2, '0');
            const dd = String(eventDate.getDate()).padStart(2, '0');
            
            // Format waktu kalender mengambang (Floating time) agar menyesuaikan zona waktu HP pelanggan
            const tglMulai = `${yyyy}${mm}${dd}T080000`; // Mulai jam 08:00 Pagi
            const tglSelesai = `${yyyy}${mm}${dd}T090000`; // Selesai jam 09:00 Pagi
            
            const judul = `Bayar Angsuran ${currentData.barang}`;
            const detail = `Halo ${currentData.nama}, ini pengingat untuk membayar angsuran Zenith Cell bulan ini senilai Rp ${formatRp(currentData.cicilanPerBulan)} agar status Anda tetap "VVIP Lancar".`;
            
            // Menyusun format standar iCalendar (.ics)
            let icsContent = "BEGIN:VCALENDAR\n";
            icsContent += "VERSION:2.0\n";
            icsContent += "PRODID:-//Zenith Cell//ID\n";
            icsContent += "BEGIN:VEVENT\n";
            icsContent += `DTSTART:${tglMulai}\n`;
            icsContent += `DTEND:${tglSelesai}\n`;
            icsContent += `SUMMARY:${judul}\n`;
            icsContent += `DESCRIPTION:${detail}\n`;
            icsContent += "BEGIN:VALARM\n";
            icsContent += "TRIGGER:-PT15M\n"; // Alarm 15 menit sebelumnya
            icsContent += "ACTION:DISPLAY\n";
            icsContent += "DESCRIPTION:Pengingat Angsuran\n";
            icsContent += "END:VALARM\n";
            icsContent += "END:VEVENT\n";
            icsContent += "END:VCALENDAR";

            // Membuat file dan memicu download otomatis untuk dibuka kalender bawaan
            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Tagihan_Zenith_Cell_${currentData.nama.replace(/\s/g, '_')}.ics`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
