<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Tagihan - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: #ffffff; border: 1px solid #f1f5f9; box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
        .shining-badge { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #fcd34d 100%); color: #78350f; animation: pulse-soft 2s infinite; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }
        .spinner { border: 3px solid rgba(16, 185, 129, 0.3); border-top: 3px solid #10b981; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 lg:p-8 min-h-screen flex flex-col items-center selection:bg-emerald-200">

    <main class="w-full max-w-md lg:max-w-xl mx-auto lg:my-auto bg-white lg:glass-card lg:rounded-[2.5rem] lg:shadow-2xl relative z-10 flex flex-col min-h-screen lg:min-h-0">
        
        <header class="px-6 pt-8 pb-5 flex items-center justify-between border-b border-slate-100 bg-white lg:rounded-t-[2.5rem]">
            <a href="index.html" class="p-2.5 bg-slate-50 border border-slate-100 rounded-full text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 active:scale-95 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>
            <div class="text-right">
                <h1 class="font-black text-xl text-slate-900 leading-none">Cek Tagihan</h1>
                <p class="text-[10px] font-bold text-emerald-500 uppercase mt-1.5 tracking-widest flex items-center justify-end gap-1"><i data-lucide="shield-check" class="w-3 h-3"></i> Portal Nasabah</p>
            </div>
        </header>

        <div class="p-6 flex-grow flex flex-col">
            
            <form id="formCek" class="space-y-4 mb-2">
                <div>
                    <label class="block text-[10px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">Nomor WhatsApp Nasabah</label>
                    <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-[1.25rem] shadow-sm focus-within:border-emerald-500 focus-within:bg-white transition-all overflow-hidden group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="phone" class="w-4 h-4 text-emerald-500"></i>
                        </div>
                        
                        <input type="tel" id="waInput" placeholder="Contoh: 08123456789" required class="w-full pl-11 pr-24 py-4 bg-transparent text-sm font-bold outline-none text-slate-800 placeholder-slate-400">
                        
                        <div class="absolute inset-y-0 right-1 pr-1 flex items-center gap-1">
                            <button type="button" onclick="pasteWA()" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-emerald-600 shadow-sm active:scale-95 transition-all" title="Paste">
                                <i data-lucide="clipboard" class="w-4 h-4"></i>
                            </button>
                            <button type="button" onclick="clearWA()" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-400 hover:text-red-500 shadow-sm active:scale-95 transition-all hidden group-focus-within:block" title="Hapus">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <button type="submit" id="btnCari" class="w-full bg-slate-900 text-white font-extrabold py-4 rounded-[1.25rem] active:scale-95 transition-all shadow-lg shadow-slate-900/20 flex justify-center items-center gap-2 hover:bg-slate-800">
                    <i data-lucide="search" class="w-5 h-5 text-emerald-400"></i> Cek Status Pembayaran
                </button>
                <p id="errorMsg" class="text-[11px] text-red-500 font-bold text-center hidden bg-red-50 py-2 rounded-lg border border-red-100"></p>
            </form>

            <div id="hasilCard" class="hidden flex-col gap-4 mt-4 pt-4 animate-fade-in pb-20 lg:pb-4">
                
                <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Identitas Nasabah</p>
                        <h2 class="font-black text-lg text-slate-900 uppercase tracking-tight truncate max-w-[180px] sm:max-w-xs" id="resNama">Nama</h2>
                    </div>
                    <div id="badgeRapor" class="shining-badge px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 shrink-0">
                        <i data-lucide="star" class="w-3.5 h-3.5"></i> VVIP
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 sm:col-span-3">
                        <p class="text-[9px] font-bold text-emerald-600 uppercase tracking-widest mb-1">Barang / Objek Akad</p>
                        <p class="font-black text-slate-800 text-sm" id="resBarang">iPhone 14 Pro Max</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center items-center text-center">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Angsuran Ke</p>
                        <p class="font-black text-xl text-slate-900" id="resCicilanKe">0</p>
                    </div>
                    <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center items-center text-center sm:col-span-2">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Jatuh Tempo Bulanan</p>
                        <p class="font-black text-xl text-slate-900">Tgl <span id="resTempo" class="text-emerald-600">0</span></p>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white mt-2 relative overflow-hidden flex items-center justify-between">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/20 blur-3xl rounded-full -mr-10 -mt-10 pointer-events-none"></div>
                    <div class="relative z-10">
                        <p class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest mb-1.5">Sisa Tagihan Pokok</p>
                        <div class="flex items-start gap-1.5">
                            <span class="text-emerald-400 font-bold mt-1 text-base">Rp</span>
                            <span class="text-3xl sm:text-4xl font-black tracking-tighter" id="resHutang">0</span>
                        </div>
                    </div>
                    <div class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center relative z-10 shrink-0">
                        <i data-lucide="wallet" class="w-6 h-6 text-emerald-400"></i>
                    </div>
                </div>

                <button onclick="bukaKalenderNative()" id="btnKalender" class="w-full mt-2 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-700 font-extrabold py-4 rounded-[1.25rem] active:scale-95 transition-all flex justify-center items-center gap-2 shadow-sm">
                    <i data-lucide="calendar-plus" class="w-5 h-5"></i> Buat Pengingat Otomatis di HP
                </button>
            </div>
        </div>
    </main>

    <style>
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        lucide.createIcons();
        const formatRp = (n) => new Intl.NumberFormat('id-ID').format(n);
        let currentData = null;

        // FUNGSI PASTE & CLEAR PRESISI
        async function pasteWA() {
            try {
                const text = await navigator.clipboard.readText();
                const input = document.getElementById('waInput');
                input.value = text.replace(/[^0-9]/g, '');
                input.focus();
            } catch (err) {
                alert("Browser memblokir paste otomatis. Silakan tahan kolom input dan pilih 'Tempel/Paste'.");
            }
        }
        
        function clearWA() { 
            const input = document.getElementById('waInput');
            input.value = ''; 
            input.focus(); 
        }

        document.getElementById('formCek').addEventListener('submit', async (e) => {
            e.preventDefault();
            const wa = document.getElementById('waInput').value.replace(/[^0-9]/g, '');
            if(!wa) return;
            
            const btn = document.getElementById('btnCari');
            const err = document.getElementById('errorMsg');
            btn.disabled = true; btn.innerHTML = `<div class="spinner border-emerald-300 border-top-emerald-500"></div> Mencari...`;
            err.classList.add('hidden'); document.getElementById('hasilCard').classList.replace('flex', 'hidden');

            try {
                const res = await fetch(`${CONFIG.API_URL}?wa=${wa}`);
                const result = await res.json();
                
                if (result.status === 'success') {
                    tampilkanHasil(result.data);
                } else if (result.status === 'pending') {
                    err.innerHTML = `<i data-lucide="info" class="w-3.5 h-3.5 inline"></i> Pengajuan Anda masih dalam antrean admin.`; 
                    err.classList.remove('hidden');
                } else {
                    err.innerHTML = `<i data-lucide="x-circle" class="w-3.5 h-3.5 inline"></i> Data tidak ditemukan. Cek kembali nomor WA.`; 
                    err.classList.remove('hidden');
                }
            } catch(e) {
                err.innerHTML = `<i data-lucide="wifi-off" class="w-3.5 h-3.5 inline"></i> Gagal terhubung ke server.`; 
                err.classList.remove('hidden');
            }
            btn.disabled = false; btn.innerHTML = `<i data-lucide="search" class="w-5 h-5 text-emerald-400"></i> Cek Status Pembayaran`; lucide.createIcons();
        });

        function tampilkanHasil(data) {
            currentData = data;
            document.getElementById('resNama').innerText = data.nama;
            document.getElementById('resBarang').innerText = data.barang;
            document.getElementById('resCicilanKe').innerText = data.cicilanKe;
            document.getElementById('resTempo').innerText = data.jatuhTempo;
            
            let sisaHutang = data.totalHutang - data.terbayar;
            document.getElementById('resHutang').innerText = sisaHutang <= 0 ? "LUNAS!" : formatRp(sisaHutang);

            const badge = document.getElementById('badgeRapor');
            const btnKal = document.getElementById('btnKalender');
            
            if (sisaHutang <= 0) {
                badge.className = "px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 bg-emerald-500 text-white shrink-0";
                badge.innerHTML = `<i data-lucide="award" class="w-4 h-4"></i> LUNAS`;
                btnKal.style.display = 'none';
            } else {
                btnKal.style.display = 'flex';
                const tglSkrg = new Date().getDate();
                const blnSkrg = new Date().getMonth() + 1;
                
                if (data.bulanTerakhirBayar !== blnSkrg && tglSkrg > data.jatuhTempo) {
                    badge.className = "px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 bg-red-100 text-red-600 animate-pulse border border-red-200 shrink-0";
                    badge.innerHTML = `<i data-lucide="alert-circle" class="w-4 h-4"></i> Telat ${tglSkrg - data.jatuhTempo} Hr`;
                } else {
                    badge.className = "shining-badge px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 shrink-0";
                    badge.innerHTML = `<i data-lucide="star" class="w-4 h-4"></i> VVIP Lancar`;
                }
            }

            document.getElementById('hasilCard').classList.replace('hidden', 'flex');
            lucide.createIcons();
        }

        // FUNGSI NATIVE INTENT KALENDER (FIXED)
        function bukaKalenderNative() {
            if(!currentData) return;
            const d = new Date();
            let targetBulan = d.getMonth();
            if (d.getDate() > currentData.jatuhTempo) targetBulan++; // Geser ke bulan depan
            
            // Jam 08:00 pagi
            const eventDate = new Date(d.getFullYear(), targetBulan, currentData.jatuhTempo, 8, 0, 0);
            
            const judul = `Angsuran Zenith Cell (${currentData.barang})`;
            const detail = `Halo ${currentData.nama}, jangan lupa bayar angsuran Zenith Cell bulan ini Rp ${formatRp(currentData.cicilanPerBulan)} ya!`;

            const isAndroid = /Android/i.test(navigator.userAgent);

            if (isAndroid) {
                const startTime = eventDate.getTime();
                const endTime = startTime + (60 * 60 * 1000); // Durasi 1 Jam
                
                // Intent Android paling presisi yang dipakai aplikasi besar (vnd.android.cursor.dir/event)
                const intentUrl = `intent://com.android.calendar/events#Intent;action=android.intent.action.INSERT;type=vnd.android.cursor.dir/event;S.title=${encodeURIComponent(judul)};S.description=${encodeURIComponent(detail)};l.beginTime=${startTime};l.endTime=${endTime};scheme=content;end;`;
                
                // Memicu klik untuk melewati pemblokiran browser
                const a = document.createElement('a');
                a.href = intentUrl;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } else {
                // Fallback untuk iOS / PC via Web Google Calendar
                const yyyy = eventDate.getFullYear();
                const mm = String(eventDate.getMonth() + 1).padStart(2, '0');
                const dd = String(eventDate.getDate()).padStart(2, '0');
                const tglMulai = `${yyyy}${mm}${dd}T080000`; 
                const tglSelesai = `${yyyy}${mm}${dd}T090000`;
                
                const gCalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(judul)}&dates=${tglMulai}/${tglSelesai}&details=${encodeURIComponent(detail)}`;
                window.open(gCalUrl, '_blank');
            }
        }
    </script>
</body>
</html>
