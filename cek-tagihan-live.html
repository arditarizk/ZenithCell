<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>    
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">    
    <title>Portal Tagihan - Zenith Cell</title>    
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">    
    <script src="https://cdn.tailwindcss.com"></script>    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">    
    <script src="https://unpkg.com/lucide@latest"></script>    
    <script src="config.js?v=4"></script>    
    <style>        
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; -webkit-tap-highlight-color: transparent; }        
        .glass-card { background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1); }        
        .shining-badge { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #fcd34d 100%); color: #78350f; animation: pulse-soft 2s infinite; }        
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.8; } }        
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }        
        .progress-bar-animated { transition: width 1s cubic-bezier(0.4, 0, 0.2, 1); }        
    </style>
</head>
<body class="text-slate-800 lg:p-8 min-h-screen flex flex-col items-center justify-center selection:bg-emerald-200">        
    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4"></div>        
    <main class="w-full max-w-md lg:max-w-xl mx-auto bg-white lg:glass-card lg:rounded-[2.5rem] lg:shadow-2xl relative z-10 flex flex-col min-h-screen lg:min-h-0 pb-10 lg:pb-0">                        
        <header class="px-6 pt-8 pb-5 flex items-center justify-between border-b border-slate-100 bg-white lg:rounded-t-[2.5rem] shrink-0">                        
            <a href="index.html" class="p-2.5 bg-slate-50 border border-slate-100 rounded-full text-slate-500 hover:bg-emerald-50 hover:text-emerald-600 active:scale-95 transition-all">                                
                <i data-lucide="arrow-left" class="w-5 h-5"></i>                        
            </a>                        
            <div class="text-right">                                
                <h1 class="font-black text-xl text-slate-900 leading-none">Cek Tagihan</h1>                                
                <p class="text-[10px] font-bold text-emerald-500 uppercase mt-1.5 tracking-widest flex items-center justify-end gap-1"><i data-lucide="shield-check" class="w-3 h-3"></i> Portal Nasabah</p>                        
            </div>                
        </header>                
        
        <div class="p-6 flex-grow flex flex-col">                                    
            <form id="formCek" class="space-y-4 mb-2 shrink-0">                                
                <div>                                        
                    <label class="block text-[10px] font-extrabold text-slate-400 mb-2 uppercase tracking-widest px-1">Nomor WhatsApp Nasabah</label>                                        
                    <div class="relative flex items-center bg-slate-50 border border-slate-200 rounded-[1.25rem] shadow-sm focus-within:border-emerald-500 focus-within:bg-white transition-all overflow-hidden group">                                                
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">                                                        
                            <i data-lucide="phone" class="w-4 h-4 text-emerald-500"></i>                                                
                        </div>                                                
                        <input type="tel" id="waInput" placeholder="Contoh: 08123456789" required class="w-full pl-11 pr-24 py-4 bg-transparent text-sm font-bold outline-none text-slate-800 placeholder-slate-400">                                                
                        <div class="absolute inset-y-0 right-1 pr-1 flex items-center gap-1 z-20">                                                        
                            <button type="button" onclick="pasteWA()" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-500 hover:text-emerald-600 shadow-sm active:scale-95 transition-all" title="Paste">                                                        
                                <i data-lucide="clipboard" class="w-4 h-4"></i>                                                
                            </button>                                                
                            <button type="button" onclick="clearWA()" class="p-2 bg-white border border-slate-200 rounded-lg text-slate-400 hover:text-red-500 shadow-sm active:scale-95 transition-all hidden group-focus-within:block" title="Hapus">                                                        
                                <i data-lucide="x" class="w-4 h-4"></i>                                                
                            </button>                                        
                        </div>                                        
                    </div>                                
                </div>                                
                <button type="submit" id="btnCari" class="w-full bg-slate-900 text-white font-extrabold py-4 rounded-[1.25rem] active:scale-95 transition-all shadow-lg shadow-slate-900/20 flex justify-center items-center gap-2 hover:bg-slate-800">                                        
                    <i data-lucide="search" class="w-5 h-5 text-emerald-400"></i> Cek Status Pembayaran                                
                </button>                                
                <p id="errorMsg" class="text-[11px] text-red-500 font-bold text-center hidden bg-red-50 py-2 rounded-lg border border-red-100"></p>                        
            </form>                        
            
            <div id="hasilCard" class="hidden flex-col gap-5 mt-4 pt-4 animate-fade-in border-t border-slate-100">                                                
                
                <div class="flex justify-between items-center bg-emerald-50/50 p-4 rounded-2xl border border-emerald-100">                                        
                    <div>                                                
                        <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1" id="greetingText">Ahlan wa Sahlan,</p>                                                
                        <h2 class="font-black text-lg text-slate-900 uppercase tracking-tight truncate max-w-[180px] sm:max-w-xs" id="resNama">Nama</h2>                                        
                    </div>                                        
                    <div id="badgeRapor" class="shining-badge px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 shrink-0">                                                
                        <i data-lucide="star" class="w-3.5 h-3.5"></i> VVIP                                        
                    </div>                                
                </div>

                <div id="dynamicPending"></div>

                <div id="dynamicLoans"></div>

                <div id="dynamicHistory"></div>

                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm" id="rekeningCard">                                        
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1.5 px-1"><i data-lucide="credit-card" class="w-3.5 h-3.5 text-emerald-500"></i> Rekening Pembayaran</p>                                        
                    <div class="space-y-2">                                                
                        <div class="flex justify-between items-center bg-slate-50 p-3.5 rounded-2xl border border-slate-100">                                                        
                            <div class="flex items-center gap-3">                                                        
                                <div class="w-9 h-9 rounded-full bg-[#0052A3] text-white flex items-center justify-center font-black text-sm shrink-0">BCA</div>                                                        
                                <div>                                                                
                                    <p class="font-black text-slate-800 text-xs">BCA</p>                                                                
                                    <p class="text-[10px] text-slate-500 font-bold mt-0.5">a.n Ardita Rizki Fauzi</p>                                                        
                                </div>                                                
                            </div>                                                
                            <div class="flex items-center gap-3">                                                        
                                <p class="font-black text-sm text-slate-900 tracking-wide">8161292087</p>                                                        
                                <button type="button" onclick="salinTeks('8161292087')" class="p-2 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-emerald-600 hover:border-emerald-200 shadow-sm active:scale-95 transition-all" title="Salin Rekening"><i data-lucide="copy" class="w-4 h-4"></i></button>                                                
                            </div>                                        
                        </div>                                        
                        <div class="flex justify-between items-center bg-slate-50 p-3.5 rounded-2xl border border-slate-100">                                                        
                            <div class="flex items-center gap-3">                                                        
                                <div class="w-9 h-9 rounded-full bg-[#007AC1] text-white flex items-center justify-center font-black text-sm shrink-0">BRI</div>                                                        
                                <div>                                                                
                                    <p class="font-black text-slate-800 text-xs">BRI</p>                                                                
                                    <p class="text-[10px] text-slate-500 font-bold mt-0.5">a.n Vivi Nur Damayanti</p>                                                        
                                </div>                                                
                            </div>                                                
                            <div class="flex items-center gap-3">                                                        
                                <p class="font-black text-sm text-slate-900 tracking-wide">638501004971500</p>                                                        
                                <button type="button" onclick="salinTeks('638501004971500')" class="p-2 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-emerald-600 hover:border-emerald-200 shadow-sm active:scale-95 transition-all" title="Salin Rekening"><i data-lucide="copy" class="w-4 h-4"></i></button>                                                
                            </div>                                        
                        </div>                                        
                        <div class="flex justify-between items-center bg-slate-50 p-3.5 rounded-2xl border border-slate-100">                                                        
                            <div class="flex items-center gap-3">                                                        
                                <div class="w-9 h-9 rounded-full bg-[#FF6A00] text-white flex items-center justify-center font-black text-[11px] shrink-0">SEA</div>                                                        
                                <div>                                                                
                                    <p class="font-black text-slate-800 text-xs">SeaBank</p>                                                                
                                    <p class="text-[10px] text-slate-500 font-bold mt-0.5">a.n Ardita Rizki Fauzi</p>                                                        
                                </div>                                                
                            </div>                                                
                            <div class="flex items-center gap-3">                                                        
                                <p class="font-black text-sm text-slate-900 tracking-wide">901556541299</p>                                                        
                                <button type="button" onclick="salinTeks('901556541299')" class="p-2 bg-white border border-slate-200 rounded-xl text-slate-400 hover:text-emerald-600 hover:border-emerald-200 shadow-sm active:scale-95 transition-all" title="Salin Rekening"><i data-lucide="copy" class="w-4 h-4"></i></button>                                                
                            </div>                                        
                        </div>                                        
                    </div>                                
                </div>                                
                
                <div class="text-center px-4 mt-2 mb-2">                                        
                    <p class="text-xs font-bold text-slate-500 italic" id="motivationalText"></p>                                
                </div>                                
            </div>                
        </div>        
    </main>        
    
    <script>                
        lucide.createIcons();                
        const formatRp = (n) => new Intl.NumberFormat('id-ID').format(n);                
        let toastTimer;                        

        function showToast(msg, type = 'success') {                        
            const container = document.getElementById('toastContainer');                        
            container.innerHTML = '';                         
            if (toastTimer) clearTimeout(toastTimer);                                    
            const toast = document.createElement('div');                        
            toast.className = `${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'} text-white px-5 py-3.5 rounded-2xl shadow-xl font-bold text-sm text-center transition-all animate-fade-in`;                        
            toast.innerText = msg;                         
            container.appendChild(toast);                                    
            toastTimer = setTimeout(() => { toast.remove(); }, 3000);                 
        }                        
        
        async function salinTeks(teks) {                        
            try {                                
                await navigator.clipboard.writeText(teks);                                
                showToast("Nomor rekening berhasil disalin!", "success");                        
            } catch (err) {                                
                showToast("Gagal menyalin. Silakan salin manual.", "error");                        
            }                
        }                
        
        function formatNomorWA(nomor) {            
            let cleanNumber = nomor.replace(/[^0-9]/g, '');            
            if (cleanNumber.startsWith('62')) { cleanNumber = '0' + cleanNumber.substring(2); }            
            return cleanNumber;        
        }        
        
        async function pasteWA() {                        
            try {                                
                const text = await navigator.clipboard.readText();                                
                const input = document.getElementById('waInput');                                
                input.value = formatNomorWA(text);                                
                input.focus();                        
            } catch (err) {                                
                showToast("Tahan kolom input dan pilih 'Tempel'", "error");                        
            }                
        }                                
        
        function clearWA() {                         
            const input = document.getElementById('waInput');                        
            input.value = '';                         
            input.focus();                 
        }                
        
        document.getElementById('waInput').addEventListener('input', function(e) {            
            this.value = this.value.replace(/[^0-9+\-\s]/g, '');         
        });        

        document.getElementById('formCek').addEventListener('submit', async (e) => {                        
            e.preventDefault();                                    
            const inputElement = document.getElementById('waInput');            
            const wa = formatNomorWA(inputElement.value);                        
            inputElement.value = wa;            
            if(!wa) return;                                                
            
            const btn = document.getElementById('btnCari');                        
            const err = document.getElementById('errorMsg');                                                
            btn.disabled = true;                         
            btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Sedang Mencari Data...`;                        
            lucide.createIcons();                        
            err.classList.add('hidden');                         
            document.getElementById('hasilCard').classList.replace('flex', 'hidden');                        
                                        
            try {                                
                const res = await fetch(`${CONFIG.API_URL}?wa=${wa}`);                                
                const result = await res.json();                                                
                
                if (result.status === 'success') {                                        
                    tampilkanHasil(result.data);                                
                } else if (result.status === 'pending') {                                        
                    err.innerHTML = `<i data-lucide="info" class="w-3.5 h-3.5 inline"></i> Pengajuan Anda masih dalam antrean verifikasi admin.`;                                         
                    err.classList.remove('hidden');                                
                } else {                                        
                    err.innerHTML = `<i data-lucide="x-circle" class="w-3.5 h-3.5 inline"></i> Data tidak ditemukan. Cek kembali nomor WA.`;                                         
                    err.classList.remove('hidden');                                
                }                        
            } catch(e) {                                
                console.error("Error System:", e);                                
                err.innerHTML = `<i data-lucide="wifi-off" class="w-3.5 h-3.5 inline"></i> Sistem Error: Gagal terhubung ke server.`;                                 
                err.classList.remove('hidden');                        
            }                                              
            
            btn.disabled = false;                         
            btn.innerHTML = `<i data-lucide="search" class="w-5 h-5 text-emerald-400"></i> Cek Status Pembayaran`;                         
            lucide.createIcons();                
        });                        
        
        function tampilkanHasil(data) {                        
            document.getElementById('resNama').innerText = data.nama;                        
            
            const badge = document.getElementById('badgeRapor');
            let skorAbjad = data.skor ? data.skor.score : "A";
            let badgeTeks = data.skor ? data.skor.badge : "VVIP Lancar";
            
            if (skorAbjad.includes("A")) {
                badge.className = "shining-badge px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 shrink-0";
                badge.innerHTML = `<i data-lucide="star" class="w-3.5 h-3.5"></i> ${badgeTeks}`;
            } else if (skorAbjad.includes("B")) {
                badge.className = "bg-amber-100 text-amber-700 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 shrink-0 border border-amber-200";
                badge.innerHTML = `<i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> ${badgeTeks}`;
            } else {
                badge.className = "bg-red-100 text-red-600 px-3 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-md flex items-center gap-1.5 shrink-0 border border-red-200";
                badge.innerHTML = `<i data-lucide="x-circle" class="w-3.5 h-3.5"></i> ${badgeTeks}`;
            }

            const namaBulanArr = ["", "Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            
            let htmlAktif = '';
            let adaTelat = false;
            let maxPersen = 0;

            if (data.aktif && data.aktif.length > 0) {
                data.aktif.forEach(p => {
                    let totalHutang = parseInt(p.totalHutang) || 0;
                    let terbayar = parseInt(p.terbayar) || 0;
                    let sisaHutang = totalHutang - terbayar;
                    let cicilanPerBln = parseInt(p.cicilanPerBulan) || Math.round(totalHutang/6);
                    let totalTenor = Math.round(totalHutang / cicilanPerBln);
                    if(totalTenor < 1 || totalTenor === Infinity) totalTenor = 1;
                    
                    let tagihanBulanIni = cicilanPerBln;
                    if (sisaHutang < cicilanPerBln) {
                        tagihanBulanIni = sisaHutang; 
                    }

                    let persen = (terbayar / totalHutang) * 100;
                    if(persen > 100) persen = 100;
                    if(persen > maxPersen) maxPersen = persen; 

                    let tglLengkap = `${p.jatuhTempo} ${namaBulanArr[p.targetBulan]} ${p.targetTahun}`;
                    if (p.selisihHari > 0) adaTelat = true;

                    let dateJatuhTempoValid = new Date(p.targetTahun, p.targetBulan - 1, p.jatuhTempo);
                    let yyyy = dateJatuhTempoValid.getFullYear();
                    let mm = String(dateJatuhTempoValid.getMonth() + 1).padStart(2, '0');
                    let dd = String(dateJatuhTempoValid.getDate()).padStart(2, '0');
                    let tglMulai = `${yyyy}${mm}${dd}T080000`; 
                    let tglSelesai = `${yyyy}${mm}${dd}T090000`;
                    let judulEvent = encodeURIComponent(`Angsuran HP (${p.barang})`);
                    let descEvent = encodeURIComponent(`Halo ${data.nama}, waktunya bayar angsuran Zenith Cell bulan ini senilai Rp ${formatRp(tagihanBulanIni)} agar rapor VVIP Kakak aman. Semangat!`);
                    let linkKalender = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${judulEvent}&dates=${tglMulai}/${tglSelesai}&details=${descEvent}`;

                    htmlAktif += `
                    <div class="space-y-3 mb-6 relative">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center relative overflow-hidden">
                                ${p.selisihHari > 0 ? `<div class="absolute top-0 right-0 bg-red-500 text-white text-[8px] font-black px-2 py-1 rounded-bl-lg tracking-widest animate-pulse">TELAT ${p.selisihHari} HARI</div>` : ''}
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Objek Akad</p>
                                <p class="font-black text-slate-800 text-sm truncate">${p.barang}</p>
                            </div>
                            <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-center">
                                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 flex items-center gap-1"><i data-lucide="calendar" class="w-3 h-3 text-amber-500"></i> Jatuh Tempo</p>
                                <p class="font-black text-base ${p.selisihHari > 0 ? 'text-red-500' : 'text-slate-900'}">${sisaHutang <= 0 ? 'Sudah Lunas' : tglLengkap}</p>
                            </div>
                        </div>

                        ${sisaHutang > 0 ? `
                        <div class="${p.selisihHari > 0 ? 'bg-red-50 border-red-200' : 'bg-emerald-50 border-emerald-200'} p-4 rounded-2xl border shadow-inner flex justify-between items-center">
                            <div>
                                <p class="text-[10px] font-black ${p.selisihHari > 0 ? 'text-red-800' : 'text-emerald-800'} uppercase tracking-widest mb-0.5">Tagihan Bulan Ini</p>
                                <p class="font-black text-2xl ${p.selisihHari > 0 ? 'text-red-600' : 'text-emerald-600'}">Rp ${formatRp(tagihanBulanIni)}</p>
                            </div>
                            <div class="text-right">
                                <span class="${p.selisihHari > 0 ? 'bg-red-500' : 'bg-emerald-500'} text-white text-[9px] font-black px-2.5 py-1.5 rounded-lg shadow-sm uppercase tracking-wider">${p.selisihHari > 0 ? 'SEGERA BAYAR' : 'WAJIB BAYAR'}</span>
                            </div>
                        </div>
                        ` : ''}
                        
                        <div class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white relative overflow-hidden flex flex-col gap-4">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/20 blur-3xl rounded-full -mr-10 -mt-10 pointer-events-none"></div>
                            <div class="flex justify-between items-end relative z-10">
                                <div>
                                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">Sisa Keseluruhan Hutang</p>
                                    <div class="flex items-start gap-1">
                                        <span class="text-emerald-400 font-bold mt-1.5 text-sm">Rp</span>
                                        <span class="text-3xl sm:text-4xl font-black tracking-tighter">${sisaHutang <= 0 ? 'LUNAS' : formatRp(sisaHutang)}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Angsuran Ke</p>
                                    <p class="font-black text-xl text-white leading-none">${p.cicilanKe} <span class="text-sm text-slate-500 font-bold">/ ${totalTenor}</span></p>
                                </div>
                            </div>
                            <div class="relative z-10 w-full pt-2 border-t border-white/10 mt-2">
                                <div class="flex justify-between text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2">
                                    <span>Terkumpul: Rp ${formatRp(terbayar)}</span>
                                    <span>${Math.round(persen)}%</span>
                                </div>
                                <div class="w-full bg-slate-800 rounded-full h-2.5 border border-slate-700 overflow-hidden">
                                    <div class="bg-gradient-to-r from-emerald-500 to-teal-400 h-2.5 rounded-full progress-bar-animated shadow-[0_0_10px_rgba(16,185,129,0.5)]" style="width: 0%" data-width="${persen}%"></div>
                                </div>
                            </div>
                        </div>
                        
                        ${sisaHutang > 0 ? `
                        <a href="${linkKalender}" target="_blank" class="w-full bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 text-emerald-700 font-extrabold py-4 rounded-[1.25rem] active:scale-95 transition-all flex justify-center items-center gap-2 shadow-sm">
                            <i data-lucide="calendar-plus" class="w-5 h-5"></i> Ingatkan Saya via Google Calendar
                        </a>` : ''}
                    </div>
                    `;
                });
            }
            document.getElementById('dynamicLoans').innerHTML = htmlAktif;

            // RENDER RIWAYAT LUNAS DENGAN FIX TANGGAL
            let htmlRiwayat = '';
            if (data.riwayat && data.riwayat.length > 0) {
                htmlRiwayat = `<div class="mt-4 mb-4"><h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1.5 mb-3 px-1"><i data-lucide="check-circle-2" class="w-4 h-4"></i> Riwayat Lunas</h3><div class="space-y-2">`;
                data.riwayat.forEach(h => {
                    let tglSelesai = String(h.tanggalLunas || "-");
                    
                    // FIX FORMAT TANGGAL ROBOT (ISO) vs TANGGAL TEKS KOMA
                    if (tglSelesai.includes('T')) {
                        let d = new Date(tglSelesai);
                        if (!isNaN(d.getTime())) {
                            tglSelesai = String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
                        }
                    } else {
                        // Hilangkan koma dan jam jika ada
                        tglSelesai = tglSelesai.split(',')[0].split(' ')[0];
                    }

                    htmlRiwayat += `
                    <div class="bg-emerald-50/50 border border-emerald-100 rounded-xl p-3 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-black text-slate-800 uppercase line-through opacity-70">${h.barang}</p>
                            <p class="text-[9px] font-bold text-emerald-600 mt-0.5">Selesai: ${tglSelesai}</p>
                        </div>
                        <span class="bg-emerald-500 text-white px-2 py-1 rounded-lg text-[9px] font-black uppercase shadow-sm">LUNAS</span>
                    </div>`;
                });
                htmlRiwayat += `</div></div>`;
            }
            document.getElementById('dynamicHistory').innerHTML = htmlRiwayat;

            let htmlPending = '';
            if (data.pending && data.pending.length > 0) {
                htmlPending = `<div class="mt-4 mb-4"><h3 class="text-[11px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1.5 mb-3 px-1"><i data-lucide="clock" class="w-4 h-4"></i> Antrean Pengajuan</h3><div class="space-y-2">`;
                data.pending.forEach(p => {
                    htmlPending += `
                    <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-black text-slate-800 uppercase">${p.barang}</p>
                            <p class="text-[9px] font-bold text-slate-400 mt-0.5">Sedang diverifikasi</p>
                        </div>
                        <span class="bg-slate-200 text-slate-500 px-2 py-1 rounded-lg text-[9px] font-black uppercase shadow-sm">PENDING</span>
                    </div>`;
                });
                htmlPending += `</div></div>`;
            }
            document.getElementById('dynamicPending').innerHTML = htmlPending;

            const motTeks = document.getElementById('motivationalText');
            if (data.aktif.length === 0 && data.riwayat.length > 0) {
                motTeks.innerText = "✨ Alhamdulillah! Semua gadget impian resmi jadi milik Kakak 100%. Semoga berkah dan ditunggu pesanan selanjutnya! ✨";
                document.getElementById('rekeningCard').style.display = 'none';
            } else if (adaTelat) {
                motTeks.innerHTML = `<span class="text-red-500">Astaghfirullah, ada tagihan yang lewat jatuh tempo nih Kak. Yuk segera tunaikan kewajibannya agar rapor kredit tetap aman! 🤲</span>`;
                document.getElementById('rekeningCard').style.display = 'block';
            } else {
                document.getElementById('rekeningCard').style.display = 'block';
                if (maxPersen < 30) motTeks.innerText = "🚀 Bismillah! Perjalanan baru dimulai, semangat terus kerjanya ya Kak!";
                else if (maxPersen >= 30 && maxPersen < 70) motTeks.innerText = "🔥 Masya Allah, udah lumayan jauh nih perjalanannya. Keep going Kak!";
                else motTeks.innerText = "✨ Alhamdulillah, sikit lagi lunas Kak! Pertahankan skor VVIP-nya ya! 🚀";
            }

            document.getElementById('hasilCard').classList.replace('hidden', 'flex');
            lucide.createIcons();

            setTimeout(() => {
                document.querySelectorAll('.progress-bar-animated').forEach(el => {
                    el.style.width = el.getAttribute('data-width');
                });
            }, 100);
        }    
    </script>
</body>
</html>
