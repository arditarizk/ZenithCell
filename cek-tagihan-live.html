<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cek Tagihan - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
        input:focus-within { outline: 2px solid #10b981; outline-offset: 2px; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex selection:bg-emerald-200 lg:p-8">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4"></div>

    <main class="m-auto w-full max-w-5xl bg-transparent lg:bg-white lg:rounded-[3rem] lg:shadow-2xl overflow-hidden flex flex-col lg:flex-row relative z-10 min-h-screen lg:min-h-0">
        
        <section class="w-full lg:w-1/2 p-6 lg:p-12 flex flex-col justify-center border-r border-slate-100">
            <header class="mb-8 flex flex-col items-center lg:items-start text-center lg:text-left relative">
                <a href="index.html" class="absolute lg:static top-0 left-0 p-2 lg:mb-6 bg-white lg:bg-slate-50 rounded-full text-slate-500 shadow-sm border active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <div class="w-16 h-16 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-2xl shadow-lg flex items-center justify-center mb-4 mt-8 lg:mt-0"><i data-lucide="search" class="w-8 h-8 text-white"></i></div>
                <h1 class="font-extrabold text-slate-900 text-3xl tracking-tight leading-none">Cek Tagihan</h1>
                <p class="text-xs font-semibold text-emerald-600 mt-2 uppercase tracking-widest">Sistem Transparan</p>
            </header>

            <form id="searchForm" class="space-y-4 w-full">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide lg:text-left text-center">Nomor WhatsApp</label>
                    <div class="relative flex items-center">
                        <input type="tel" id="waInput" placeholder="0812345..." required class="w-full text-center lg:text-left pl-6 pr-[90px] py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-slate-900 font-bold text-lg outline-none focus:border-emerald-500 transition-all">
                        <div class="absolute right-2 flex items-center gap-1">
                            <button type="button" onclick="document.getElementById('waInput').value=''" class="p-2.5 text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-5 h-5"></i></button>
                            <button type="button" onclick="navigator.clipboard.readText().then(t=>document.getElementById('waInput').value=t)" class="p-2.5 bg-slate-200/70 rounded-xl"><i data-lucide="clipboard-paste" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>
                <button type="submit" id="btnSearch" class="w-full bg-slate-900 text-white font-extrabold py-4 rounded-2xl active:scale-95 flex justify-center gap-2"><i data-lucide="search" id="searchIcon" class="w-5 h-5"></i> <span id="searchText">Cari Data</span></button>
            </form>
        </section>

        <section class="w-full lg:w-1/2 bg-slate-50 p-6 lg:p-12 flex flex-col justify-center">
            <div id="emptyState" class="text-center opacity-50 flex flex-col items-center justify-center h-full">
                <i data-lucide="receipt" class="w-16 h-16 text-slate-300 mb-4"></i>
                <p class="font-bold text-slate-400">Hasil tagihan akan muncul di sini</p>
            </div>

            <div id="resultContainer" class="hidden flex-col gap-5 opacity-0 translate-y-4 transition-all duration-500 w-full h-full justify-center">
                <div class="glass-panel bg-white p-6 rounded-[2rem] relative overflow-hidden shadow-lg border-emerald-100">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-2xl"></div>
                    <div class="flex items-center gap-3 mb-5 border-b pb-4"><div class="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600"><i data-lucide="user" class="w-6 h-6"></i></div><div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pelanggan Aktif</p><h2 class="font-black text-xl" id="resNama">...</h2></div></div>
                    <div class="text-center mb-6"><p class="text-xs font-bold text-slate-500 mb-1">Sisa Tagihan Pokok</p><div class="flex justify-center gap-1"><span class="text-emerald-500 font-bold mt-2">Rp</span><span class="text-4xl font-black text-slate-900" id="resSisa">0</span></div><div class="mt-3"><span class="text-[10px] font-bold text-slate-400 uppercase">Tempo:</span><p class="text-sm font-black text-amber-600 bg-amber-50 inline-block px-4 py-1.5 rounded-full border border-amber-200 mt-1" id="resNextDue">...</p></div></div>
                    <div><div class="flex justify-between mb-1.5"><span class="text-[10px] font-bold text-slate-400 uppercase">Progress Lunas</span><span class="text-xs font-black text-emerald-600" id="resPersen">0%</span></div><div class="w-full bg-slate-100 h-3 rounded-full overflow-hidden"><div id="resBar" class="bg-emerald-400 h-full w-0 transition-all duration-1000"></div></div></div>
                </div>
                <a id="btnWA" href="#" target="_blank" class="w-full bg-[#25D366] text-white font-extrabold py-4 rounded-2xl active:scale-95 flex justify-center gap-2 shadow-lg"><i data-lucide="message-circle" class="w-5 h-5"></i> Konfirmasi Pelunasan WA</a>
            </div>
            <div id="pendingContainer" class="hidden glass-panel bg-amber-50 p-6 rounded-[2rem] text-center border border-amber-200"><div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="clock-4" class="w-8 h-8 text-amber-500"></i></div><h3 class="font-black text-amber-900 text-lg mb-2">Sedang Diproses</h3><p class="text-xs font-medium text-amber-800">Pengajuan atas nama <b id="pendNama">...</b> masih dalam antrean verifikasi.</p></div>
        </section>
    </main>

    <script>
        lucide.createIcons(); const fr = (n) => new Intl.NumberFormat('id-ID').format(n);
        function showToast(m) { const t=document.createElement('div'); t.className="bg-slate-900 text-white px-5 py-3 rounded-xl fixed top-5 left-1/2 -translate-x-1/2 z-[1000] font-bold text-sm shadow-xl"; t.innerText=m; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000); }
        
        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault(); const w = document.getElementById('waInput').value; if(!w)return;
            document.getElementById('btnSearch').disabled=true; document.getElementById('searchIcon').outerHTML=`<div class="spinner" id="searchIcon"></div>`;
            document.getElementById('emptyState').classList.add('hidden'); document.getElementById('resultContainer').classList.add('hidden'); document.getElementById('pendingContainer').classList.add('hidden');

            try {
                const res = await fetch(`${CONFIG.API_URL}?wa=${w}&nocache=${Date.now()}`); const r = await res.json();
                document.getElementById('btnSearch').disabled=false; document.getElementById('searchIcon').outerHTML=`<i data-lucide="search" id="searchIcon" class="w-5 h-5"></i>`; lucide.createIcons();
                
                if(r.status==="success"){
                    let sisa = r.data.totalHutang - r.data.terbayar; sisa = sisa<0?0:sisa; let persen = r.data.totalHutang>0 ? Math.round((r.data.terbayar/r.data.totalHutang)*100):0;
                    document.getElementById('resNama').innerText = r.data.nama; document.getElementById('resSisa').innerText = fr(sisa); document.getElementById('resPersen').innerText = persen+"%";
                    document.getElementById('resNextDue').innerText = `Tgl ${r.data.jatuhTempo} (Ke-${r.data.cicilanKe})`;
                    document.getElementById('btnWA').href = `https://api.whatsapp.com/send?phone=${CONFIG.WA_ADMIN}&text=Halo,%20saya%20mau%20bayar%20tagihan`;
                    const c = document.getElementById('resultContainer'); c.classList.remove('hidden'); setTimeout(()=>{ c.classList.remove('opacity-0','translate-y-4'); document.getElementById('resBar').style.width = persen+"%"; },50);
                } else if(r.status==="pending"){ document.getElementById('pendNama').innerText=r.data.nama; document.getElementById('pendingContainer').classList.remove('hidden'); }
                else { showToast("Data tidak ditemukan."); document.getElementById('emptyState').classList.remove('hidden'); }
            } catch(er){ showToast("Koneksi Gagal"); document.getElementById('btnSearch').disabled=false; document.getElementById('emptyState').classList.remove('hidden'); }
        });
    </script>
</body>
</html>
