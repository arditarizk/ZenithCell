<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cek Tagihan - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); }
        input:focus-within { outline: 2px solid #10b981; outline-offset: 2px; transition: all 0.2s ease; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 pb-20 pt-4 px-4 flex justify-center selection:bg-emerald-200">

    <main class="w-full max-w-md relative z-10 flex flex-col min-h-[90vh]">
        <header class="mb-6 flex flex-col items-center text-center mt-4 relative">
            <a href="index.html" class="absolute top-0 left-0 p-2 bg-white rounded-full text-slate-500 hover:bg-slate-100 shadow-sm border border-slate-100 z-20"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="w-16 h-16 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-2xl shadow-lg flex items-center justify-center mb-4"><i data-lucide="search" class="w-8 h-8 text-white"></i></div>
            <h1 class="font-extrabold text-slate-900 text-2xl tracking-tight leading-none">Cek Tagihan</h1>
            <p class="text-xs font-semibold text-emerald-600 mt-1 uppercase tracking-widest">Sistem Transparan</p>
        </header>

        <section class="glass-panel p-5 sm:p-6 rounded-[2rem] mb-6 relative z-20">
            <form id="searchForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase tracking-wide text-center">Masukkan Nomor WhatsApp Anda</label>
                    <input type="tel" id="waInput" placeholder="Contoh: 081234567890" required class="w-full text-center py-4 bg-slate-50 border-2 border-slate-100 rounded-2xl text-slate-900 font-bold text-lg outline-none focus:border-emerald-500">
                </div>
                <button type="submit" id="btnSearch" class="w-full bg-slate-900 text-white font-extrabold py-4 rounded-2xl active:scale-95 transition-all flex justify-center gap-2"><i data-lucide="search" id="searchIcon" class="w-5 h-5"></i> <span id="searchText">Cari Data Saya</span></button>
            </form>
        </section>

        <section id="resultContainer" class="hidden flex-col gap-5 opacity-0 translate-y-4 transition-all duration-500">
            <div class="glass-panel p-6 rounded-[2rem] relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/10 rounded-full blur-2xl"></div>
                <div class="flex items-center gap-3 mb-5 border-b pb-4">
                    <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center text-emerald-600 shrink-0"><i data-lucide="user" class="w-5 h-5"></i></div>
                    <div><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Pelanggan Aktif</p><h2 class="font-black text-lg" id="resNama">...</h2></div>
                </div>
                <div class="text-center mb-6">
                    <p class="text-xs font-bold text-slate-500 mb-1">Sisa Tagihan Berjalan</p>
                    <div class="flex items-start justify-center gap-1"><span class="text-emerald-500 font-bold mt-1.5">Rp</span><span class="text-4xl font-black text-slate-900 transition-colors duration-300" id="resSisa">0</span></div>
                    <div id="statusLunas" class="hidden mt-2 gap-1 px-3 py-1 bg-emerald-100 text-emerald-700 text-[10px] font-bold rounded-full uppercase tracking-wider"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> Lunas</div>
                </div>
                <div>
                    <div class="flex justify-between items-end mb-1.5"><span class="text-[10px] font-bold text-slate-400 uppercase">Progress</span><span class="text-xs font-black text-emerald-600" id="resPersen">0%</span></div>
                    <div class="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden"><div id="resBar" class="bg-emerald-400 h-full w-0 transition-all duration-1000"></div></div>
                </div>
            </div>
            <a id="btnWA" href="#" target="_blank" class="w-full bg-[#25D366] text-white font-extrabold py-4 rounded-2xl active:scale-95 flex justify-center gap-2"><i data-lucide="message-circle" class="w-5 h-5"></i> Konfirmasi Via WA</a>
        </section>

        <section id="pendingContainer" class="hidden flex-col gap-5 opacity-0 translate-y-4 transition-all duration-500">
            <div class="glass-panel p-6 rounded-[2rem] bg-amber-50 border border-amber-200 text-center">
                <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="clock-4" class="w-8 h-8 text-amber-500"></i></div>
                <h3 class="font-black text-amber-900 text-lg mb-2">Pengajuan Sedang Diproses</h3>
                <p class="text-xs font-medium text-amber-800 leading-relaxed mb-4">Halo <b id="pendNama" class="text-amber-900">...</b>, pengajuan kredit <b class="text-amber-900"><span id="pendBarang"></span></b> milik Anda masih dalam antrean verifikasi Admin. Mohon tunggu informasinya.</p>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
        const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num);

        // PEMBERSIH NOMOR WA CERDAS (+62 / 62 OTOMATIS JADI 0)
        document.getElementById('waInput').addEventListener('input', function() {
            let val = this.value.replace(/[^0-9]/g, '');
            if (val.startsWith('62')) val = '0' + val.substring(2);
            this.value = val;
        });

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            let inputStr = document.getElementById('waInput').value;
            if(inputStr === "") return;
            
            const btn = document.getElementById('btnSearch');
            btn.disabled = true; 
            document.getElementById('searchText').innerText = "Mencari..."; 
            document.getElementById('searchIcon').outerHTML = `<div class="spinner" id="searchIcon"></div>`;
            
            document.getElementById('resultContainer').classList.add('hidden', 'opacity-0', 'translate-y-4'); 
            document.getElementById('pendingContainer').classList.add('hidden', 'opacity-0', 'translate-y-4');

            try {
                const response = await fetch(`${CONFIG.API_URL}?wa=${inputStr}&nocache=${Date.now()}`);
                const result = await response.json();

                btn.disabled = false; 
                document.getElementById('searchText').innerText = "Cari Data Saya"; 
                document.getElementById('searchIcon').outerHTML = `<i data-lucide="search" id="searchIcon" class="w-5 h-5"></i>`; 
                lucide.createIcons();

                if (result.status === "success") {
                    tampilkanHasil(result.data);
                } else if (result.status === "pending") {
                    document.getElementById('pendNama').innerText = result.data.nama; 
                    document.getElementById('pendBarang').innerText = result.data.barang;
                    const c = document.getElementById('pendingContainer'); 
                    c.classList.remove('hidden'); void c.offsetWidth;
                    c.classList.remove('opacity-0', 'translate-y-4');
                } else {
                    alert(result.message || "Nomor Anda tidak terdaftar di sistem kami.");
                }
            } catch (error) {
                btn.disabled = false; 
                document.getElementById('searchText').innerText = "Cari Data Saya"; 
                document.getElementById('searchIcon').outerHTML = `<i data-lucide="search" id="searchIcon" class="w-5 h-5"></i>`; 
                lucide.createIcons();
                alert("Error Sistem: " + error.message);
            }
        });

        function tampilkanHasil(data) {
            let hutangVal = parseInt(data.totalHutang) || 0; 
            let bayarVal = parseInt(data.terbayar) || 0;
            let sisa = hutangVal - bayarVal; if (sisa < 0) sisa = 0;
            let persenLunas = hutangVal > 0 ? Math.round((bayarVal / hutangVal) * 100) : 0; 
            if (persenLunas > 100) persenLunas = 100;

            document.getElementById('resNama').innerText = data.nama; 
            document.getElementById('resSisa').innerText = formatRupiah(sisa); 
            document.getElementById('resPersen').innerText = `${persenLunas}%`;
            
            document.getElementById('btnWA').href = `https://api.whatsapp.com/send?phone=${CONFIG.WA_ADMIN}&text=${encodeURIComponent(`Halo Admin Zenith Cell, saya ${data.nama} mau konfirmasi pembayaran cicilan. Sisa tagihan saya di web Rp ${formatRupiah(sisa)}.`)}`;

            const bar = document.getElementById('resBar'); bar.style.width = '0%';
            const container = document.getElementById('resultContainer'); 
            container.classList.remove('hidden');
            
            if (sisa === 0 && hutangVal > 0) { 
                document.getElementById('statusLunas').classList.replace('hidden', 'inline-flex'); 
                document.getElementById('resSisa').classList.replace('text-slate-900', 'text-emerald-500'); 
            } else { 
                document.getElementById('statusLunas').classList.replace('inline-flex', 'hidden'); 
                document.getElementById('resSisa').classList.replace('text-emerald-500', 'text-slate-900'); 
            }

            void container.offsetWidth;
            container.classList.remove('opacity-0', 'translate-y-4'); 
            setTimeout(() => { bar.style.width = `${persenLunas}%`; }, 300);
        }
    </script>
</body>
</html>
