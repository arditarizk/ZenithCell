<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Admin - Reminder Zenith</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="p-5 lg:p-10 flex flex-col items-center">
    <main class="w-full max-w-md bg-white rounded-3xl p-6 shadow-xl border border-slate-100">
        
        <header class="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
            <a href="index.html" class="p-2 bg-slate-50 rounded-full text-slate-500"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="text-right">
                <h1 class="font-black text-xl text-slate-900">Reminder Tagihan</h1>
                <p class="text-[10px] font-bold text-red-500 uppercase tracking-widest">Otomatisasi WA</p>
            </div>
        </header>

        <div class="flex gap-2 mb-6">
            <button onclick="setFilter('TELAT')" id="btnFilterTelat" class="flex-1 py-3 rounded-xl font-bold text-xs bg-red-500 text-white transition-all">Tunggakan</button>
            <button onclick="setFilter('WARNING')" id="btnFilterWarning" class="flex-1 py-3 rounded-xl font-bold text-xs bg-slate-100 text-slate-500 transition-all">H-3 Tempo</button>
        </div>

        <div id="loadingState" class="text-center py-10 font-bold text-slate-400 text-sm">Menarik data dari Google Sheets...</div>

        <div id="listContainer" class="space-y-3"></div>

    </main>

    <script>
        lucide.createIcons();
        const formatRp = (n) => new Intl.NumberFormat('id-ID').format(n);
        let allCustomers = [];
        let activeFilter = 'TELAT'; 

        async function fetchDataTagihan() {
            document.getElementById('loadingState').classList.remove('hidden');
            document.getElementById('listContainer').innerHTML = '';

            try {
                const res = await fetch(CONFIG.API_URL + "?action=getAll&nocache=" + Date.now());
                const result = await res.json();
                
                // Ambil data pelanggan yang belum lunas
                allCustomers = (result.data || []).filter(c => c.nama && (c.hutang - c.terbayar) > 0);
                renderList();
            } catch(e) {
                document.getElementById('loadingState').innerText = "Gagal terhubung ke Server.";
            }
        }

        function setFilter(tipe) {
            activeFilter = tipe;
            document.getElementById('btnFilterTelat').className = tipe === 'TELAT' ? "flex-1 py-3 rounded-xl font-bold text-xs bg-red-500 text-white transition-all" : "flex-1 py-3 rounded-xl font-bold text-xs bg-slate-100 text-slate-500 transition-all";
            document.getElementById('btnFilterWarning').className = tipe === 'WARNING' ? "flex-1 py-3 rounded-xl font-bold text-xs bg-amber-500 text-white transition-all" : "flex-1 py-3 rounded-xl font-bold text-xs bg-slate-100 text-slate-500 transition-all";
            renderList();
        }

        function renderList() {
            document.getElementById('loadingState').classList.add('hidden');
            const listContainer = document.getElementById('listContainer');
            listContainer.innerHTML = '';

            // Filter MURNI dari data Backend (Code.gs)
            const filteredData = allCustomers.filter(c => c.kategoriStatus === activeFilter);

            if (filteredData.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-10 font-bold text-slate-400 text-xs">Alhamdulillah, tidak ada data di kategori ini.</div>`;
                return;
            }

            filteredData.forEach(c => {
                let badgeClass = activeFilter === 'TELAT' ? 'bg-red-100 text-red-600' : 'bg-amber-100 text-amber-600';
                let nominal = parseInt(c.cicilanPerBulan) || Math.round(parseInt(c.hutang)/6);

                listContainer.innerHTML += `
                    <div class="bg-slate-50 border border-slate-200 rounded-2xl p-4 flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-black text-slate-800 uppercase">${c.nama}</h3>
                                <p class="text-[10px] font-bold text-slate-500">Angsuran Ke-${c.cicilanKe}</p>
                            </div>
                            <span class="px-2 py-1 rounded text-[9px] font-black uppercase tracking-widest ${badgeClass}">${c.keteranganStatus}</span>
                        </div>
                        <button onclick="kirimWA('${c.wa}', '${c.nama}', '${c.keteranganStatus}', ${nominal}, '${c.barang}')" class="w-full bg-[#25D366] text-white py-3 rounded-xl font-bold text-xs flex items-center justify-center gap-2 active:scale-95">
                            <i data-lucide="send" class="w-4 h-4"></i> Kirim WA Peringatan
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function kirimWA(waRaw, nama, status, nominal, barang) {
            let wa = waRaw.toString().replace(/[^0-9]/g, '');
            if (wa.startsWith('0')) wa = '62' + wa.substring(1);
            
            let pesan = activeFilter === 'TELAT' 
                ? `Assalamu'alaikum Kak *${nama}*,\n\nIni admin Zenith Cell. Kami ingin mengingatkan tagihan untuk *${barang}* senilai *Rp ${formatRp(nominal)}* sudah melewati jatuh tempo (${status}).\n\nMohon segera diproses agar tidak terkena denda amal ya Kak.` 
                : `Assalamu'alaikum Kak *${nama}*,\n\nIni admin Zenith Cell. Tagihan untuk *${barang}* senilai *Rp ${formatRp(nominal)}* akan segera jatuh tempo (${status}).\n\nYuk pertahankan status VVIP-nya!`;

            window.open(`https://api.whatsapp.com/send?phone=${wa}&text=${encodeURIComponent(pesan)}`, '_blank');
        }

        fetchDataTagihan();
    </script>
</body>
</html>
