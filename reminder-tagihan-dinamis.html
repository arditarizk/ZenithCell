<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Server Admin - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { background-color: #0f172a; color: white; font-weight: 800; }
        .tab-inactive { background-color: transparent; color: #64748b; font-weight: 600; }
        .spinner { border: 3px solid rgba(245, 158, 11, 0.3); border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 lg:p-8 min-h-screen flex selection:bg-amber-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <main class="m-auto w-full max-w-7xl bg-transparent lg:bg-white/50 lg:rounded-[2.5rem] lg:p-8 lg:shadow-xl relative z-10 flex flex-col min-h-screen lg:min-h-[85vh]">
        <header class="mb-5 flex items-center justify-between bg-white p-3.5 lg:p-5 rounded-2xl shadow-sm border mx-4 mt-4 lg:m-0">
            <a href="index.html" class="p-2.5 bg-slate-50 rounded-xl text-slate-500 mr-3 hover:bg-slate-100 transition-colors"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="flex items-center gap-3 flex-grow">
                <div class="w-12 h-12 bg-slate-900 rounded-xl flex items-center justify-center"><i data-lucide="layout-dashboard" class="w-6 h-6 text-amber-400"></i></div>
                <div><h1 class="font-black text-lg lg:text-xl leading-none">Server Admin</h1><p class="text-[10px] font-bold text-amber-600 uppercase mt-1 tracking-wider">Monitoring Panel</p></div>
            </div>
            <button onclick="refreshData()" class="p-3 bg-amber-50 rounded-xl text-amber-700 hover:bg-amber-100 transition-colors"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </header>

        <div class="px-4 lg:px-0 flex flex-col flex-grow">
            <div class="flex gap-2 mb-6 bg-white p-1.5 rounded-xl shadow-sm border border-slate-200 max-w-md mx-auto lg:mx-0 w-full">
                <button onclick="switchTab('antrean')" id="tab-antrean" class="flex-1 py-2.5 rounded-lg text-xs tab-active transition-all">Antrean ACC</button>
                <button onclick="switchTab('tagihan')" id="tab-tagihan" class="flex-1 py-2.5 rounded-lg text-xs tab-inactive transition-all">Tagihan Aktif</button>
            </div>

            <div id="viewAntrean" class="flex flex-col flex-grow">
                <div id="pendingList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-10"></div>
            </div>

            <div id="viewTagihan" class="hidden flex flex-col flex-grow">
                <div class="relative mb-6 max-w-md">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i data-lucide="search" class="w-4 h-4 text-slate-400"></i></div>
                    <input type="text" id="searchInput" oninput="filterTagihan()" placeholder="Cari nama pelanggan..." class="w-full pl-12 pr-4 py-3.5 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-amber-400 shadow-sm">
                </div>
                <div id="customerList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pb-10"></div>
            </div>
        </div>
    </main>

    <div id="accModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-center items-center px-4 opacity-0 transition-opacity">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl transform scale-95 transition-transform" id="accModalContent">
            <div class="flex justify-between items-center mb-5 pb-3 border-b"><h2 class="font-black text-base text-slate-900">Finalisasi Akad</h2><button onclick="closeModalAcc()" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button></div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl border"><p class="text-[9px] text-slate-400 font-black uppercase mb-1" id="accIdKontrak">...</p><p class="font-black text-slate-800 text-base" id="accNama">...</p><p class="text-[11px] font-semibold text-slate-500" id="accBarang">...</p></div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Tgl Tempo</label><input type="number" id="accJatuhTempo" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                    <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Tenor (Bln)</label><input type="number" id="accTenor" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none" disabled></div>
                </div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Total Harga Jual</label><input type="text" id="accTotalHutang" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Cicilan Per Bulan</label><input type="text" id="accCicilan" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
            </div>
            <button id="btnKonfirmasiAcc" class="w-full mt-6 bg-emerald-500 text-white font-extrabold py-4 rounded-xl shadow-lg">ACC & NOTIFIKASI WA</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num), parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, ''))||0;
        let currentTab = 'antrean', allTagihanData = [], currentActiveData = null;

        function showToast(msg) { const t = document.createElement('div'); t.className = "bg-emerald-500 text-white px-5 py-3.5 rounded-2xl shadow-xl fixed top-5 left-1/2 -translate-x-1/2 z-[1000] font-bold text-sm"; t.innerText = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000); }
        function switchTab(t) { currentTab=t; document.getElementById('tab-antrean').className = t==='antrean'?'flex-1 py-2.5 rounded-lg text-xs tab-active':'flex-1 py-2.5 rounded-lg text-xs tab-inactive'; document.getElementById('tab-tagihan').className = t==='tagihan'?'flex-1 py-2.5 rounded-lg text-xs tab-active':'flex-1 py-2.5 rounded-lg text-xs tab-inactive'; document.getElementById('viewAntrean').style.display = t==='antrean'?'flex':'none'; document.getElementById('viewTagihan').style.display = t==='tagihan'?'flex':'none'; refreshData(); }
        function refreshData() { currentTab==='antrean'?fetchAntrean():fetchTagihan(); }

        async function fetchAntrean() {
            const c = document.getElementById('pendingList'); c.innerHTML = `<div class="col-span-full text-center py-10"><div class="spinner mx-auto mb-2"></div></div>`;
            try {
                const res = await fetch(`${CONFIG.API_URL}?action=getPending&nocache=${Date.now()}`); const data = (await res.json()).data || [];
                c.innerHTML = data.length===0 ? `<div class="col-span-full text-center py-10 bg-white rounded-2xl border text-slate-400 font-bold text-xs">Kosong</div>` : '';
                data.forEach(p => {
                    let m=p.margin||25, rT=(p.harga-p.dp)+(p.harga-p.dp)*(m/100), rB=Math.round(rT/p.tenor);
                    c.innerHTML += `<div class="bg-white p-5 rounded-2xl border shadow-sm flex flex-col justify-between hover:shadow-md transition-shadow"><div><div class="flex justify-between"><h3 class="font-black text-sm">${p.nama}</h3><span class="text-[10px] bg-slate-100 px-2 py-1 rounded font-bold">${p.tenor} Bln</span></div><p class="text-xs text-slate-500 mt-1">${p.barang}</p></div><div class="mt-4 pt-4 border-t border-slate-50 flex gap-2"><button onclick="tolak('${p.idKontrak}')" class="flex-1 bg-red-50 text-red-600 py-2.5 rounded-xl text-[10px] font-black">TOLAK</button><button onclick="bukaModalAcc('${encodeURIComponent(JSON.stringify({...p,rT,rB}))}')" class="flex-1 bg-emerald-50 text-emerald-600 py-2.5 rounded-xl text-[10px] font-black">ACC</button></div></div>`;
                });
            } catch(e) { c.innerHTML = `<div class="col-span-full text-red-500 text-center">Gagal Muat</div>`; }
        }

        async function fetchTagihan() {
            const c = document.getElementById('customerList'); c.innerHTML = `<div class="col-span-full text-center py-10"><div class="spinner mx-auto mb-2"></div></div>`;
            try {
                const res = await fetch(`${CONFIG.API_URL}?action=getAll&nocache=${Date.now()}`); allTagihanData = (await res.json()).data.filter(x=>(x.hutang-x.terbayar)>0); filterTagihan();
            } catch(e) { c.innerHTML = `<div class="col-span-full text-red-500 text-center">Gagal Muat</div>`; }
        }

        function filterTagihan() {
            const c = document.getElementById('customerList'), k = document.getElementById('searchInput').value.toLowerCase();
            const f = allTagihanData.filter(x=>x.nama.toLowerCase().includes(k)); c.innerHTML = f.length===0?`<div class="col-span-full text-center py-10 bg-white border rounded-2xl">Kosong</div>`:'';
            f.forEach(p => {
                let badge = (p.statusPembayaran||"LANCAR").includes("TELAT") ? `<span class="bg-red-100 text-red-600 px-1.5 py-0.5 rounded text-[9px] font-black animate-pulse">TELAT</span>` : `<span class="bg-emerald-100 text-emerald-600 px-1.5 py-0.5 rounded text-[9px] font-black">LANCAR</span>`;
                c.innerHTML += `<div class="bg-white p-5 rounded-2xl border shadow-sm hover:shadow-md flex flex-col justify-between"><div class="flex justify-between items-start"><div><h3 class="font-black text-sm flex items-center gap-2">${p.nama} ${badge}</h3><p class="text-[10px] text-slate-400 mt-1">ID: ${p.idKontrak} • Ke-${p.cicilanKe}</p></div><div class="text-right"><p class="font-black text-sm">Rp ${formatRupiah(p.cicilanPerBulan)}</p><p class="text-[9px] font-bold text-slate-400 mt-0.5">Tgl ${p.jatuhTempo}</p></div></div><button onclick="window.open('https://api.whatsapp.com/send?phone=${p.wa.startsWith('0')?'62'+p.wa.slice(1):p.wa}&text=Halo', '_blank')" class="w-full mt-4 py-3 bg-amber-50 text-amber-700 rounded-xl text-[10px] font-black flex items-center justify-center gap-1.5 hover:bg-amber-100"><i data-lucide="bell" class="w-4 h-4"></i> WA TAGIHAN</button></div>`;
            }); lucide.createIcons();
        }

        window.bukaModalAcc=function(e){ const d=JSON.parse(decodeURIComponent(e)); currentActiveData=d; document.getElementById('accIdKontrak').innerText=d.idKontrak; document.getElementById('accNama').innerText=d.nama; document.getElementById('accBarang').innerText=d.barang; document.getElementById('accJatuhTempo').value=d.jatuhTempo; document.getElementById('accTenor').value=d.tenor; document.getElementById('accTotalHutang').value=formatRupiah(d.rT); document.getElementById('accCicilan').value=formatRupiah(d.rB); document.getElementById('accModal').classList.replace('hidden','flex'); setTimeout(()=>{document.getElementById('accModal').classList.remove('opacity-0');document.getElementById('accModalContent').classList.remove('scale-95')},10); }
        window.closeModalAcc=function(){ document.getElementById('accModal').classList.add('opacity-0'); document.getElementById('accModalContent').classList.add('scale-95'); setTimeout(()=>document.getElementById('accModal').classList.replace('flex','hidden'),300); }
        window.tolak=function(id){ fetch(CONFIG.API_URL, {method:'POST',mode:'no-cors',body:JSON.stringify({tipe:"TOLAK_PENGAJUAN",idKontrak:id})}); showToast("Ditolak"); setTimeout(fetchAntrean, 1000); }
        
        document.getElementById('btnKonfirmasiAcc').onclick=()=> { fetch(CONFIG.API_URL, {method:'POST',mode:'no-cors',body:JSON.stringify({tipe:"ACC_PENGAJUAN",idKontrak:currentActiveData.idKontrak,nama:currentActiveData.nama,wa:currentActiveData.wa,barang:currentActiveData.barang,jatuhTempo:document.getElementById('accJatuhTempo').value,totalHutang:parseRupiah(document.getElementById('accTotalHutang').value),cicilanBulan:parseRupiah(document.getElementById('accCicilan').value)})}); closeModalAcc(); showToast("Sukses ACC!"); setTimeout(fetchAntrean,1500); }
        refreshData();
    </script>
</body>
</html>
