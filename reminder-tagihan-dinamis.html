<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Server Admin - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { background-color: #0f172a; color: white; font-weight: 800; }
        .tab-inactive { background-color: transparent; color: #64748b; font-weight: 600; }
        .spinner { border: 3px solid rgba(245, 158, 11, 0.3); border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 pb-24 pt-4 px-4 flex justify-center selection:bg-amber-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <main class="w-full max-w-md relative z-10 flex flex-col min-h-[90vh]">
        <header class="mb-5 flex items-center justify-between bg-white p-3.5 rounded-2xl shadow-sm border relative">
            <a href="index.html" class="p-2 bg-slate-50 rounded-xl text-slate-500 mr-2 active:scale-90 transition-transform"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="flex items-center gap-3 flex-grow">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center"><i data-lucide="layout-dashboard" class="w-5 h-5 text-amber-400"></i></div>
                <div><h1 class="font-black text-base leading-none">Server Admin</h1><p class="text-[9px] font-bold text-amber-600 uppercase mt-0.5 tracking-wider">Monitoring Panel</p></div>
            </div>
            <button onclick="refreshData()" class="p-2 bg-amber-50 rounded-xl text-amber-600 active:rotate-180 transition-all duration-500"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </header>

        <div class="flex gap-2 mb-4 bg-white p-1 rounded-xl shadow-sm border border-slate-100">
            <button onclick="switchTab('antrean')" id="tab-antrean" class="flex-1 py-2 rounded-lg text-[11px] tab-active transition-all">Antrean ACC</button>
            <button onclick="switchTab('tagihan')" id="tab-tagihan" class="flex-1 py-2 rounded-lg text-[11px] tab-inactive transition-all">Tagihan Aktif</button>
        </div>

        <div id="viewAntrean" class="flex flex-col flex-grow">
            <div id="pendingList" class="space-y-3 pb-10"></div>
        </div>

        <div id="viewTagihan" class="hidden flex flex-col flex-grow">
            <div class="relative mb-4">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="search" class="w-4 h-4 text-slate-400"></i></div>
                <input type="text" id="searchInput" oninput="filterTagihan()" placeholder="Cari nama pelanggan..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold outline-none focus:border-amber-400 transition-all shadow-sm">
            </div>
            <div id="customerList" class="space-y-3 pb-10"></div>
        </div>
    </main>

    <!-- Modal ACC -->
    <div id="accModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-end px-2 pb-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md mx-auto rounded-[2rem] p-6 shadow-2xl transform translate-y-full transition-transform" id="accModalContent">
            <div class="flex justify-between items-center mb-5 pb-3 border-b">
                <h2 class="font-black text-base text-slate-900">Finalisasi Akad</h2>
                <button onclick="closeModalAcc()" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl border">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[9px] text-slate-400 font-black uppercase" id="accIdKontrak">...</p>
                        <span id="badgeMarginFinal" class="text-[8px] font-black px-1.5 py-0.5 rounded bg-amber-100 text-amber-700 border border-amber-200">MARGIN: --%</span>
                    </div>
                    <p class="font-black text-slate-800 text-base" id="accNama">...</p>
                    <p class="text-[11px] font-semibold text-slate-500" id="accBarang">...</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Tgl Tempo</label><input type="number" id="accJatuhTempo" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                    <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Tenor (Bln)</label><input type="number" id="accTenor" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                </div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Total Harga Jual</label><input type="text" id="accTotalHutang" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1">Cicilan Per Bulan</label><input type="text" id="accCicilan" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
            </div>
            <button id="btnKonfirmasiAcc" class="w-full mt-6 bg-emerald-500 text-white font-extrabold py-4 rounded-xl active:scale-95 transition-all shadow-lg shadow-emerald-500/20">ACC & NOTIFIKASI WA</button>
        </div>
    </div>

    <!-- MODAL WA REMINDER -->
    <div id="waModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-end transition-opacity duration-300 opacity-0 px-2 sm:px-0">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8 shadow-2xl transform translate-y-full transition-transform">
            <div class="flex justify-between items-center mb-4 pb-2 border-b">
                <h2 class="font-black text-base text-slate-900 flex items-center gap-2"><i data-lucide="send" class="w-4 h-4 text-emerald-500"></i> Pesan Tagihan</h2>
                <button onclick="closeWaModal()" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
            </div>
            <textarea id="pesanWA" rows="8" class="w-full p-3 bg-emerald-50/50 border border-emerald-100 rounded-xl text-xs font-medium outline-none resize-none"></textarea>
            <button id="btnKirimWA" class="w-full mt-4 bg-[#25D366] text-white font-bold py-3 rounded-xl active:scale-95 flex justify-center gap-2 shadow-lg shadow-green-500/20"><i data-lucide="message-circle" class="w-4 h-4"></i> Kirim ke WhatsApp</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;
        let currentTab = 'antrean', allTagihanData = [], currentActiveData = null;

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            toast.className = `${bgColor} text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 transform -translate-y-10 opacity-0 transition-all duration-300 w-full pointer-events-auto`;
            toast.innerHTML = `<span class="text-sm font-bold">${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => { toast.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        const formatNomorWA = (wa) => {
            let n = (wa || "").toString().replace(/[^0-9]/g, '');
            if (n.startsWith('0')) return '62' + n.substring(1);
            if (n.startsWith('8')) return '62' + n;
            return n;
        };

        function refreshData() { currentTab === 'antrean' ? fetchAntrean() : fetchTagihan(); }
        
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-antrean').className = tab === 'antrean' ? 'flex-1 py-2 rounded-lg text-[11px] tab-active' : 'flex-1 py-2 rounded-lg text-[11px] tab-inactive';
            document.getElementById('tab-tagihan').className = tab === 'tagihan' ? 'flex-1 py-2 rounded-lg text-[11px] tab-active' : 'flex-1 py-2 rounded-lg text-[11px] tab-inactive';
            if (tab === 'antrean') { 
                document.getElementById('viewAntrean').classList.remove('hidden'); 
                document.getElementById('viewTagihan').classList.add('hidden'); 
                fetchAntrean(); 
            } else { 
                document.getElementById('viewTagihan').classList.remove('hidden'); 
                document.getElementById('viewAntrean').classList.add('hidden'); 
                fetchTagihan(); 
            }
        }

        async function fetchAntrean() {
            const container = document.getElementById('pendingList');
            container.innerHTML = `<div class="text-center py-10"><div class="spinner mx-auto mb-2"></div><p class="text-[10px] font-bold text-slate-400">Loading Antrean...</p></div>`;
            try {
                const res = await fetch(`${CONFIG.API_URL}?action=getPending&nocache=${Date.now()}`);
                const result = await res.json();
                const data = result.data || [];
                container.innerHTML = data.length === 0 ? `<div class="text-center py-10 bg-white rounded-2xl border border-dashed text-slate-400 font-bold text-xs uppercase">Antrean Kosong</div>` : '';
                
                data.forEach((p) => {
                    let hClean = parseRupiah(p.harga) - parseRupiah(p.dp);
                    let marginVal = parseInt(p.margin); 
                    if (!marginVal || isNaN(marginVal)) {
                        let j = (p.jaminan || "").toLowerCase();
                        marginVal = j.includes("tanpa") ? 25 : 15;
                    }

                    let rekTotal = hClean + (hClean * (marginVal / 100)); 
                    let rekBulan = Math.round(rekTotal / (parseInt(p.tenor) || 5));
                    let dataJson = encodeURIComponent(JSON.stringify({ ...p, rekTotal, rekBulan, marginAktif: marginVal }));

                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border shadow-sm mb-3">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <h3 class="font-black text-slate-900 text-sm leading-tight">${p.nama || "No Name"}</h3>
                                    <p class="text-[10px] font-bold text-slate-500 mt-0.5">${p.barang || "-"}</p>
                                    <span class="text-[8px] font-black px-1.5 py-0.5 rounded mt-2 inline-block bg-amber-100 text-amber-700 border border-amber-200">MARGIN: ${marginVal}%</span>
                                </div>
                                <div class="text-right"><span class="text-[8px] font-black px-1.5 py-0.5 rounded bg-slate-100 text-slate-600">${p.tenor || 0} BLN</span></div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="tolakPengajuan('${p.idKontrak}', '${p.nama}', '${p.wa}', '${p.barang}')" class="py-2.5 bg-red-50 text-red-600 rounded-xl text-[10px] font-black active:scale-95 transition-all">TOLAK</button>
                                <button onclick="bukaModalAcc('${dataJson}')" class="py-2.5 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-xl text-[10px] font-black active:scale-95 transition-all">HITUNG ACC</button>
                            </div>
                        </div>`;
                });
                lucide.createIcons();
            } catch(e) { container.innerHTML = `<div class="text-center py-10 text-red-500 font-black text-xs">Gagal memuat API Pengajuan.</div>`; }
        }

        async function fetchTagihan() {
            const container = document.getElementById('customerList');
            container.innerHTML = `<div class="text-center py-10"><div class="spinner mx-auto mb-2"></div><p class="text-[10px] font-bold text-slate-400 uppercase">Syncing Tagihan...</p></div>`;
            try {
                const res = await fetch(`${CONFIG.API_URL}?action=getAll&nocache=${Date.now()}`);
                const result = await res.json();
                allTagihanData = (result.data || []).filter(c => (parseRupiah(c.hutang) - parseRupiah(c.terbayar)) > 0);
                renderTagihan(allTagihanData);
            } catch(e) { container.innerHTML = `<div class="text-center py-10 text-red-500 font-black text-xs uppercase">Gagal memuat API Pelanggan.</div>`; }
        }

        function renderTagihan(data) {
            const container = document.getElementById('customerList'); container.innerHTML = '';
            if(data.length === 0) container.innerHTML = `<div class="text-center py-10 bg-white rounded-2xl border border-dashed text-slate-400 font-bold text-xs uppercase">Tidak Ada Tagihan Aktif</div>`;
            data.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <div><h3 class="font-black text-xs text-slate-800 uppercase leading-none">${p.nama || "Guest"}</h3><p class="text-[9px] font-bold text-slate-400 mt-2">ID: ${p.idKontrak || "-"} • Ke-${p.cicilanKe || 1}</p></div>
                            <div class="text-right"><p class="font-black text-slate-900 text-xs">Rp ${formatRupiah(p.cicilanPerBulan)}</p></div>
                        </div>
                        <button onclick="bukaPesanWA('${p.nama}', '${p.wa}', '${p.cicilanKe}', '${p.cicilanPerBulan}')" class="w-full py-3 bg-amber-50 text-amber-700 rounded-xl text-[10px] font-black flex items-center justify-center gap-1.5 active:scale-95 transition-all"><i data-lucide="bell" class="w-3.5 h-3.5"></i> KIRIM PENGINGAT WA</button>
                    </div>`;
            });
            lucide.createIcons();
        }

        function filterTagihan() {
            const k = (document.getElementById('searchInput').value || "").toLowerCase();
            renderTagihan(allTagihanData.filter(p => (p.nama || "").toLowerCase().includes(k)));
        }

        // --- MODAL ACC ---
        window.bukaModalAcc = function(encoded) {
            const data = JSON.parse(decodeURIComponent(encoded)); currentActiveData = data;
            document.getElementById('accIdKontrak').innerText = data.idKontrak; 
            document.getElementById('accNama').innerText = data.nama; 
            document.getElementById('accBarang').innerText = data.barang;
            document.getElementById('badgeMarginFinal').innerText = `MARGIN: ${data.marginAktif}%`;
            document.getElementById('accJatuhTempo').value = data.jatuhTempo || 25; 
            document.getElementById('accTenor').value = data.tenor;
            document.getElementById('accTotalHutang').value = formatRupiah(data.rekTotal); 
            document.getElementById('accCicilan').value = formatRupiah(data.rekBulan);
            document.getElementById('accModal').classList.replace('hidden', 'flex'); 
            setTimeout(() => { document.getElementById('accModal').classList.remove('opacity-0'); document.getElementById('accModalContent').classList.remove('translate-y-full'); }, 10);
        };

        window.closeModalAcc = function() { document.getElementById('accModal').classList.add('opacity-0'); document.getElementById('accModalContent').classList.add('translate-y-full'); setTimeout(() => document.getElementById('accModal').classList.replace('flex', 'hidden'), 300); };

        document.getElementById('btnKonfirmasiAcc').addEventListener('click', () => {
            const payload = { tipe: "ACC_PENGAJUAN", idKontrak: currentActiveData.idKontrak, wa: currentActiveData.wa, nama: currentActiveData.nama, barang: currentActiveData.barang, jatuhTempo: document.getElementById('accJatuhTempo').value, totalHutang: parseRupiah(document.getElementById('accTotalHutang').value), cicilanBulan: parseRupiah(document.getElementById('accCicilan').value) };
            fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            window.open(`https://api.whatsapp.com/send?phone=${formatNomorWA(payload.wa)}&text=${encodeURIComponent("Alhamdulillah pengajuan di-ACC! ✨")}`, '_blank');
            closeModalAcc(); showToast("Berhasil di-ACC!");
            setTimeout(fetchAntrean, 1500);
        });

        window.tolakPengajuan = function(id, nama, wa, barang) {
            if(!confirm(`Tolak pengajuan ${nama}?`)) return;
            fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ tipe: "TOLAK_PENGAJUAN", idKontrak: id }) });
            window.open(`https://api.whatsapp.com/send?phone=${formatNomorWA(wa)}&text=${encodeURIComponent("Maaf pengajuan " + barang + " kamu ditolak. ✨")}`, '_blank');
            setTimeout(fetchAntrean, 1500);
        }

        window.bukaPesanWA = function(nama, wa, ke, nominal) {
            const m = `Halo Kak ${nama} 🙏 Mengingatkan cicilan ke-${ke} senilai *Rp ${formatRupiah(nominal)}* hampir jatuh tempo. Terima kasih! ✨`;
            document.getElementById('pesanWA').value = m;
            targetWaLink = `https://api.whatsapp.com/send?phone=${formatNomorWA(wa)}`;
            document.getElementById('waModal').classList.replace('hidden', 'flex');
            setTimeout(() => { document.getElementById('waModal').classList.remove('opacity-0'); document.querySelector('#waModal > div').classList.remove('translate-y-full'); }, 10);
        }
        window.closeWaModal = function() { document.getElementById('waModal').classList.add('opacity-0'); document.querySelector('#waModal > div').classList.add('translate-y-full'); setTimeout(() => document.getElementById('waModal').classList.replace('flex', 'hidden'), 300); };

        document.getElementById('btnKirimWA').addEventListener('click', () => {
            window.open(`${targetWaLink}&text=${encodeURIComponent(document.getElementById('pesanWA').value)}`, '_blank');
            closeWaModal();
        });

        refreshData();
    </script>
</body>
</html>
