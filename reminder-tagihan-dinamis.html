<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Server Admin - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { background-color: #0f172a; color: white; font-weight: 800; }
        .tab-inactive { background-color: transparent; color: #64748b; font-weight: 600; }
        .spinner { border: 3px solid rgba(245, 158, 11, 0.3); border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 pb-24 pt-4 px-4 flex justify-center">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 w-full max-w-sm px-4"></div>

    <main class="w-full max-w-md relative z-10 flex flex-col min-h-[90vh]">
        <header class="mb-5 flex items-center justify-between bg-white p-3.5 rounded-2xl shadow-sm border">
            <a href="index.html" class="p-2 bg-slate-50 rounded-xl text-slate-500"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center"><i data-lucide="layout-dashboard" class="w-5 h-5 text-amber-400"></i></div>
                <div><h1 class="font-black text-base">Server Admin</h1><p class="text-[9px] font-bold text-amber-600 uppercase">Live Sync</p></div>
            </div>
            <button onclick="refreshData()" id="btnRefresh" class="p-2 bg-amber-50 rounded-xl text-amber-600"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </header>

        <div class="flex gap-2 mb-4 bg-white p-1 rounded-xl shadow-sm border border-slate-100">
            <button onclick="switchTab('antrean')" id="tab-antrean" class="flex-1 py-2 rounded-lg text-[11px] tab-active">Antrean ACC</button>
            <button onclick="switchTab('tagihan')" id="tab-tagihan" class="flex-1 py-2 rounded-lg text-[11px] tab-inactive">Tagihan Aktif</button>
        </div>

        <div id="viewAntrean" class="flex flex-col flex-grow">
            <div id="pendingList" class="space-y-3"></div>
        </div>

        <div id="viewTagihan" class="hidden flex flex-col flex-grow">
            <div id="customerList" class="space-y-3"></div>
        </div>
    </main>

    <div id="accModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-end px-2 pb-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md mx-auto rounded-[2rem] p-6 shadow-2xl transform translate-y-full transition-transform" id="accModalContent">
            <div class="flex justify-between items-center mb-5 pb-3 border-b">
                <h2 class="font-black text-base text-slate-900">Finalisasi Akad</h2>
                <button onclick="closeModalAcc()" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl border">
                    <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest" id="accIdKontrak">...</p>
                    <p class="font-black text-slate-800 text-base" id="accNama">...</p>
                    <p class="text-[11px] font-semibold text-slate-500" id="accBarang">...</p>
                </div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1.5 uppercase">Tgl Jatuh Tempo</label><input type="number" id="accJatuhTempo" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1.5 uppercase">Total Harga Jual</label><input type="text" id="accTotalHutang" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1.5 uppercase">Cicilan Per Bulan</label><input type="text" id="accCicilan" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
            </div>
            <button id="btnKonfirmasiAcc" class="w-full mt-6 bg-emerald-500 text-white font-extrabold py-4 rounded-xl shadow-md"><i data-lucide="user-check" class="w-4 h-4 inline mr-2"></i> ACC & Pindah ke Kasir</button>
        </div>
    </div>

    <div id="waModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-end transition-opacity duration-300 opacity-0 px-2 sm:px-0">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8 shadow-2xl transform translate-y-full transition-transform">
            <div class="flex justify-between items-center mb-4 pb-2 border-b">
                <h2 class="font-black text-base text-slate-900 flex items-center gap-2"><i data-lucide="send" class="w-4 h-4 text-emerald-500"></i> Pesan Tagihan</h2>
                <button onclick="closeWaModal()" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <textarea id="pesanWA" rows="8" class="w-full p-3 bg-emerald-50/50 border border-emerald-100 rounded-xl text-xs font-medium outline-none resize-none"></textarea>
            <button id="btnKirimWA" class="w-full mt-4 bg-[#25D366] text-white font-bold py-3 rounded-xl active:scale-95 flex justify-center gap-2 shadow-lg shadow-green-500/20"><i data-lucide="message-circle" class="w-4 h-4"></i> Kirim ke WhatsApp</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;
        const tglSekarang = new Date().getDate();
        const bulanSekarang = new Date().getMonth() + 1; 

        let currentTab = 'antrean', currentActiveData = null;

        function refreshData() { if(currentTab === 'antrean') fetchAntrean(); else fetchTagihan(); }
        
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-antrean').className = tab === 'antrean' ? 'flex-1 py-2 rounded-lg text-[11px] tab-active' : 'flex-1 py-2 rounded-lg text-[11px] tab-inactive';
            document.getElementById('tab-tagihan').className = tab === 'tagihan' ? 'flex-1 py-2 rounded-lg text-[11px] tab-active' : 'flex-1 py-2 rounded-lg text-[11px] tab-inactive';
            if (tab === 'antrean') { document.getElementById('viewAntrean').classList.remove('hidden'); document.getElementById('viewTagihan').classList.add('hidden'); fetchAntrean(); } 
            else { document.getElementById('viewTagihan').classList.remove('hidden'); document.getElementById('viewAntrean').classList.add('hidden'); fetchTagihan(); }
        }

        // --- 1. TAB ANTREAN ---
        async function fetchAntrean() {
            const container = document.getElementById('pendingList');
            container.innerHTML = `<div class="text-center py-6"><div class="spinner mx-auto mb-2"></div></div>`;
            try {
                const res = await fetch(CONFIG.API_URL + "?action=getPending&nocache=" + Date.now());
                const result = await res.json();
                const data = result.data || [];
                container.innerHTML = '';
                data.forEach((p) => {
                    let hargaBersih = parseRupiah(p.harga) - parseRupiah(p.dp);
        // LOGIKA MARGIN SUPER AMAN (Deteksi Voucher)
        let marginAktif = 15; // Default VIP
        let teksBadge = "🌟 VIP (15%)";

        // Cek apakah ada info voucher di kolom jaminan (Contoh: "VIP - BPKB (Promo Voucher 20%)")
        if (p.jaminan && p.jaminan.includes("%")) {
            let match = p.jaminan.match(/(\d+)%/);
            if (match) {
                marginAktif = parseInt(match[1]);
                teksBadge = `🎉 PROMO (${marginAktif}%)`;
            }
        } else if (p.jaminan && p.jaminan.includes("Tanpa Jaminan")) {
            marginAktif = 25;
            teksBadge = "REGULER (25%)";
        }

        let rekTotal = hargaBersih + (hargaBersih * (marginAktif / 100)); 
        let rekBulan = Math.round(rekTotal / (parseInt(p.tenor) || 6));
                    let dataJson = encodeURIComponent(JSON.stringify({ ...p, rekTotal, rekBulan }));
                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border shadow-sm mb-3">
                            <div class="flex justify-between">
                                <div><h3 class="font-bold text-xs">${p.nama}</h3><p class="text-[9px] text-slate-500">${p.barang}</p></div>
                                <span class="text-[8px] font-black px-2 py-1 rounded bg-amber-50 text-amber-700">${teksBadge}</span>
                            </div>
                            <button onclick="bukaModalAcc('${dataJson}')" class="w-full mt-3 py-2 bg-emerald-50 text-emerald-600 rounded-lg text-[10px] font-bold border border-emerald-100">Hitung ACC</button>
                        </div>`;
                });
            } catch(e) { container.innerHTML = `<p class="text-center text-red-500 text-[10px]">Gagal memuat API.</p>`; }
            lucide.createIcons();
        }

        // --- 2. TAB TAGIHAN (DENGAN TOMBOL WA) ---
        async function fetchTagihan() {
            const container = document.getElementById('customerList');
            container.innerHTML = `<div class="text-center py-6"><div class="spinner mx-auto mb-2"></div></div>`;
            try {
                const res = await fetch(CONFIG.API_URL + "?action=getAll&nocache=" + Date.now());
                const result = await res.json();
                const data = (result.data || []).filter(c => (c.hutang - c.terbayar) > 0);
                container.innerHTML = '';
                data.forEach(p => {
                    let sisaBulanIni = p.cicilanPerBulan > 0 ? p.cicilanPerBulan : Math.round(p.hutang / 6);
                    let angkaTanggal = parseInt(p.jatuhTempo) || 1;
                    let bulanTerakhir = parseInt(p.bulanTerakhirBayar) || 0;
                    let targetBulan = bulanTerakhir === 0 ? bulanSekarang : bulanTerakhir + 1;
                    
                    if (p.cicilanKe == 1 && bulanTerakhir === 0 && (angkaTanggal - tglSekarang < 20)) { targetBulan = bulanSekarang + 1; }
                    
                    let targetTahun = new Date().getFullYear(); if (targetBulan > 12) { targetBulan -= 12; targetTahun++; }
                    const namaBulan = ["", "Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
                    let tglLengkap = `${angkaTanggal} ${namaBulan[targetBulan]} ${targetTahun}`;

                    const isAman = (bulanTerakhir === bulanSekarang);
                    let badgeColor = isAman ? "bg-emerald-100 text-emerald-700" : "bg-slate-100 text-slate-600";
                    let badgeLabel = isAman ? "✔ AMAN (Next)" : "⏳ TEMPO";

                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col gap-3">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-bold text-xs">${p.nama}</h3>
                                    <div class="flex items-center gap-1 mt-1">
                                        <span class="text-[9px] font-bold text-slate-400">Bulan Ke-${p.cicilanKe}</span>
                                        <span class="text-[8px] font-bold ${badgeColor} px-2 py-0.5 rounded">${badgeLabel}: ${tglLengkap}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-bold text-slate-400">Tagihan</p>
                                    <p class="font-black text-slate-900 text-xs">Rp ${formatRupiah(sisaBulanIni)}</p>
                                </div>
                            </div>
                            <button onclick="bukaPesanWA('${p.nama}', '${p.wa}', '${p.cicilanKe}', '${sisaBulanIni}', '${tglLengkap}', '${namaBulan[targetBulan]}')" class="w-full py-2 bg-amber-50 text-amber-700 border border-amber-100 rounded-lg text-[10px] font-bold flex justify-center items-center gap-2 active:scale-95">
                                <i data-lucide="message-circle" class="w-3 h-3"></i> Kirim Pengingat WA
                            </button>
                        </div>`;
                });
            } catch(e) { container.innerHTML = `<p class="text-center text-red-500 text-[10px]">Gagal memuat API.</p>`; }
            lucide.createIcons();
        }

        // --- 3. MODAL LOGIC ---
        window.bukaModalAcc = function(encodedData) {
            const data = JSON.parse(decodeURIComponent(encodedData)); currentActiveData = data;
            document.getElementById('accIdKontrak').innerText = data.idKontrak; document.getElementById('accNama').innerText = data.nama; document.getElementById('accBarang').innerText = data.barang;
            document.getElementById('accJatuhTempo').value = data.jatuhTempo; document.getElementById('accTotalHutang').value = formatRupiah(data.rekTotal); document.getElementById('accCicilan').value = formatRupiah(data.rekBulan);
            document.getElementById('accModal').classList.replace('hidden', 'flex'); setTimeout(() => { document.getElementById('accModal').classList.remove('opacity-0'); document.getElementById('accModalContent').classList.remove('translate-y-full'); }, 10);
        };
        window.closeModalAcc = function() { document.getElementById('accModal').classList.add('opacity-0'); document.getElementById('accModalContent').classList.add('translate-y-full'); setTimeout(() => document.getElementById('accModal').classList.replace('flex', 'hidden'), 300); };

        window.bukaPesanWA = function(nama, wa, ke, nominal, tgl, bulan) {
            const rek = `💳 *BCA* - 8161292087\n👤 Ardita Rizki Fauzi\n\n💳 *BRI* - 638501004971500\n👤 Vivi Nur Damayanti`;
            document.getElementById('pesanWA').value = `Assalamu'alaikum Kak ${nama} 🙏\n\nSekadar mengingatkan dari *Zenith Cell*, untuk cicilan gadget (Bulan Ke-${ke}) senilai *Rp ${formatRupiah(nominal)}* untuk tagihan bulan *${bulan}* jatuh tempo pada *${tgl}*.\n\nSilakan transfer ke rekening resmi kami:\n\n${rek}\n\nTerima kasih banyak! ✨`;
            document.getElementById('waModal').classList.replace('hidden', 'flex');
            setTimeout(() => { document.getElementById('waModal').classList.remove('opacity-0'); document.querySelector('#waModal > div').classList.remove('translate-y-full'); }, 10);
            document.getElementById('btnKirimWA').onclick = () => { window.open(`https://api.whatsapp.com/send?phone=62${wa.substring(1)}&text=${encodeURIComponent(document.getElementById('pesanWA').value)}`, '_blank'); closeWaModal(); };
        };
        window.closeWaModal = function() { document.getElementById('waModal').classList.add('opacity-0'); document.querySelector('#waModal > div').classList.add('translate-y-full'); setTimeout(() => document.getElementById('waModal').classList.replace('flex', 'hidden'), 300); };

        fetchAntrean();
    </script>
</body>
</html>
