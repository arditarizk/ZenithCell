<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reminder Tagihan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .spinner { border: 3px solid rgba(245, 158, 11, 0.3); border-top: 3px solid #f59e0b; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 pb-24 pt-4 px-4 flex justify-center selection:bg-amber-200">

    <main class="w-full max-w-md relative z-10 flex flex-col min-h-[90vh]">
        <header class="mb-5 flex items-center justify-between bg-white p-4 rounded-[2rem] shadow-sm border relative">
            <a href="index.html" class="p-2 bg-slate-50 rounded-full text-slate-500 mr-2"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="flex items-center gap-3 flex-grow">
                <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center"><i data-lucide="bell-ring" class="w-6 h-6 text-amber-400"></i></div>
                <div><h1 class="font-black text-xl leading-none">Reminder</h1><p class="text-[10px] font-bold text-amber-600 uppercase">Cloud Sync</p></div>
            </div>
            <button onclick="fetchData()" id="btnRefresh" class="p-2.5 bg-amber-50 rounded-xl text-amber-600"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </header>

        <!-- Daftar Pelanggan -->
        <div class="flex justify-between items-end mb-2 px-2">
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Daftar Tagihan Aktif</span>
            <span class="text-[10px] font-bold bg-white px-2 py-1 rounded-md text-slate-400 shadow-sm" id="bulanIni">Bulan Ini</span>
        </div>
        <div id="customerList" class="space-y-3 flex-grow overflow-y-auto no-scrollbar pb-10"></div>
    </main>

    <!-- Modal WA -->
    <div id="waModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-end transition-opacity duration-300 opacity-0">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-6 pb-8 shadow-2xl transform translate-y-full transition-transform" id="waModalContent">
            <div class="flex justify-between items-center mb-5 border-b pb-3">
                <h2 class="font-black text-lg text-slate-900"><i data-lucide="send" class="w-5 h-5 text-emerald-500 inline"></i> Pesan WA</h2>
                <button onclick="closeWaModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <textarea id="pesanWA" rows="8" class="w-full p-4 bg-emerald-50/50 rounded-2xl text-[13px] font-medium outline-none resize-none"></textarea>
            <button id="btnKirimWA" class="w-full mt-5 bg-[#25D366] text-white font-extrabold py-4 px-6 rounded-xl active:scale-[0.98] flex justify-center items-center gap-2"><i data-lucide="message-circle" class="w-5 h-5"></i> Buka & Kirim WA</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbzuM2qfXalz8Z8tYPHYXPd0SuB-FAxGOo39CjB_LgLysp2IAvAsprUc8kTDdcFPTx1M/exec";
        
        const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num);
        const tglSekarang = new Date().getDate();
        document.getElementById('bulanIni').innerText = `Tanggal ${tglSekarang}`;

        let targetWaLink = "";

        async function fetchData() {
            const container = document.getElementById('customerList');
            const icon = document.querySelector('#btnRefresh i');
            icon.classList.add('animate-spin');
            container.innerHTML = `<div class="text-center py-10"><div class="spinner mx-auto mb-3"></div><p class="text-xs font-bold text-slate-500">Membaca Google Sheets...</p></div>`;

            if(GOOGLE_API_URL === "https://script.google.com/macros/s/AKfycbzuM2qfXalz8Z8tYPHYXPd0SuB-FAxGOo39CjB_LgLysp2IAvAsprUc8kTDdcFPTx1M/exec") { container.innerHTML = `<p class="text-center text-red-500 text-xs">Error: URL API Belum Diisi!</p>`; return; }

            try {
                const res = await fetch(GOOGLE_API_URL + "?action=getAll");
                const result = await res.json();
                
                // Hanya memunculkan pelanggan yang hutangnya > 0
                let aktifCustomers = result.data.filter(c => (c.hutang - c.terbayar) > 0);
                
                // Urutkan berdasarkan tanggal jatuh tempo terdekat
                aktifCustomers.sort((a, b) => parseInt(a.jatuhTempo) - parseInt(b.jatuhTempo));

                container.innerHTML = '';
                if(aktifCustomers.length === 0) { container.innerHTML = `<div class="text-center py-10 bg-white rounded-3xl border border-dashed"><p class="text-sm font-bold text-emerald-500">Wow, semua pelanggan sudah Lunas!</p></div>`; return; }

                aktifCustomers.forEach(p => {
                    const tglJatuhTempo = parseInt(p.jatuhTempo) || 1;
                    const isTelat = tglSekarang >= tglJatuhTempo;
                    let badgeColor = isTelat ? "bg-red-100 text-red-600 border border-red-200" : "bg-slate-100 text-slate-600";
                    let sisaBulanIni = p.cicilanPerBulan > 0 ? p.cicilanPerBulan : (p.hutang / 6); // Asumsi fallback

                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-3xl shadow-sm border flex flex-col gap-3 relative hover:border-amber-200">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="font-extrabold text-slate-800 text-sm">${p.nama}</h3>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-[10px] font-bold text-slate-500">Cicilan Ke-${p.cicilanKe}</span>
                                        <span class="text-[9px] font-bold ${badgeColor} px-1.5 py-0.5 rounded uppercase">Jatuh Tempo: Tgl ${p.jatuhTempo}</span>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] font-bold text-slate-400">Tagihan Bulanan</p>
                                    <p class="font-black text-slate-900">Rp ${formatRupiah(sisaBulanIni)}</p>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 mt-1">
                                <button onclick="bukaPesanWA('${p.nama}', '${p.wa}', '${p.cicilanKe}', '${sisaBulanIni}', '${p.jatuhTempo}')" class="py-2.5 bg-amber-50 text-amber-700 rounded-xl text-[11px] font-bold flex justify-center items-center gap-1.5 border border-amber-100">
                                    <i data-lucide="message-circle" class="w-3.5 h-3.5"></i> ${isTelat ? 'Tegur Keterlambatan (WA)' : 'Kirim WA Pengingat'}
                                </button>
                            </div>
                        </div>`;
                });
                lucide.createIcons();
            } catch(e) { container.innerHTML = `<p class="text-center text-red-500 text-xs">Gagal internet / Server error.</p>`; }
            icon.classList.remove('animate-spin');
        }

        const modalWa = document.getElementById('waModal'), modalWaContent = document.getElementById('waModalContent');

        window.bukaPesanWA = function(nama, wa, cicilanKe, nominal, tgl) {
            document.getElementById('pesanWA').value = `Assalamu'alaikum Kak ${nama} 🙏\n\nSekadar mengingatkan dari *Zenith Cell*, untuk cicilan gadget (Bulan Ke-${cicilanKe}) senilai *Rp ${formatRupiah(nominal)}* sudah memasuki jadwal pembayaran (Tgl ${tgl}).\n\nKarena kami menggunakan sistem syariah (Tanpa Denda), mohon kerja sama dan amanahnya. 😊\n\nJika sudah ditransfer, mohon fotokan buktinya ke chat ini ya Kak. Terima kasih banyak! ✨`;
            targetWaLink = `https://api.whatsapp.com/send?phone=${wa}`;
            modalWa.classList.replace('hidden', 'flex'); setTimeout(() => { modalWa.classList.remove('opacity-0'); modalWaContent.classList.remove('translate-y-full'); }, 10);
        };

        window.closeWaModal = function() { modalWa.classList.add('opacity-0'); modalWaContent.classList.add('translate-y-full'); setTimeout(() => modalWa.classList.replace('flex', 'hidden'), 300); };
        document.getElementById('btnKirimWA').addEventListener('click', () => { window.open(`${targetWaLink}&text=${encodeURIComponent(document.getElementById('pesanWA').value)}`, '_blank'); closeWaModal(); });

        fetchData(); // Run
    </script>
</body>
</html>
