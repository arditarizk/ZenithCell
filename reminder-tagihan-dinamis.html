<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Server Admin - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
        .tab-active { background-color: #0f172a; color: white; font-weight: 800; }
        .tab-inactive { background-color: transparent; color: #64748b; font-weight: 600; }
        .spinner { border: 3px solid rgba(245, 158, 11, 0.3); border-top: 3px solid #f59e0b; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass-blur { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="text-slate-800 pb-24 pt-4 px-4 flex justify-center selection:bg-amber-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 w-full max-w-sm px-4 pointer-events-none"></div>

    <main class="w-full max-w-md relative z-10 flex flex-col min-h-[90vh]">
        <header class="mb-5 flex items-center justify-between bg-white p-3.5 rounded-2xl shadow-sm border relative">
            <a href="index.html" class="p-2 bg-slate-50 rounded-xl text-slate-500 mr-2"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="flex items-center gap-3 flex-grow">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center"><i data-lucide="layout-dashboard" class="w-5 h-5 text-amber-400"></i></div>
                <div><h1 class="font-black text-base leading-none">Server Admin</h1><p class="text-[9px] font-bold text-amber-600 uppercase mt-0.5 tracking-wider">Early Settlement Ready</p></div>
            </div>
            <button onclick="refreshData()" class="p-2 bg-amber-50 rounded-xl text-amber-600"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
        </header>

        <div class="flex gap-2 mb-4 bg-white p-1 rounded-xl shadow-sm border border-slate-100">
            <button onclick="switchTab('antrean')" id="tab-antrean" class="flex-1 py-2 rounded-lg text-[11px] tab-active">Antrean ACC</button>
            <button onclick="switchTab('tagihan')" id="tab-tagihan" class="flex-1 py-2 rounded-lg text-[11px] tab-inactive">Tagihan Aktif</button>
        </div>

        <div id="viewAntrean" class="flex flex-col flex-grow">
            <div id="pendingList" class="space-y-3 pb-10"></div>
        </div>

        <div id="viewTagihan" class="hidden flex flex-col flex-grow">
            <div class="relative mb-4">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><i data-lucide="search" class="w-4 h-4 text-slate-400"></i></div>
                <input type="text" id="searchInput" oninput="filterTagihan()" placeholder="Cari nama pelanggan..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold outline-none focus:border-amber-400 shadow-sm">
            </div>
            <div id="customerList" class="space-y-3 pb-10"></div>
        </div>
    </main>

    <!-- MODAL ACC -->
    <div id="accModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-end px-2 pb-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md mx-auto rounded-[2rem] p-6 shadow-2xl transform translate-y-full transition-transform" id="accModalContent">
            <div class="flex justify-between items-center mb-5 pb-3 border-b">
                <h2 class="font-black text-base text-slate-900">Finalisasi Akad</h2>
                <button onclick="closeModalAcc()" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
            </div>
            <div class="space-y-4">
                <div class="bg-slate-50 p-4 rounded-2xl border">
                    <div class="flex justify-between items-center mb-1">
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest" id="accIdKontrak">...</p>
                        <span id="badgeMarginFinal" class="text-[8px] font-black px-1.5 py-0.5 rounded bg-emerald-100 text-emerald-700">MARGIN: --%</span>
                    </div>
                    <p class="font-black text-slate-800 text-base" id="accNama">...</p>
                    <p class="text-[11px] font-semibold text-slate-500" id="accBarang">...</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1 uppercase">Tgl Tempo</label><input type="number" id="accJatuhTempo" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                    <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1 uppercase">Tenor (Bln)</label><input type="number" id="accTenor" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                </div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1 uppercase">Total Harga Jual</label><input type="text" id="accTotalHutang" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
                <div><label class="block text-[10px] font-extrabold text-slate-500 mb-1 uppercase">Cicilan Per Bulan</label><input type="text" id="accCicilan" class="w-full p-3 bg-white border rounded-xl font-bold text-sm outline-none"></div>
            </div>
            <button id="btnKonfirmasiAcc" class="w-full mt-6 bg-emerald-500 text-white font-extrabold py-4 rounded-xl active:scale-95 transition-all">ACC & NOTIFIKASI WA</button>
        </div>
    </div>

    <!-- MODAL PELUNASAN (FITUR BARU) -->
    <div id="pelunasanModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[120] hidden flex-col justify-center px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-sm mx-auto rounded-[2rem] p-6 shadow-2xl transform scale-95 transition-transform" id="pelunasanContent">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-amber-50 rounded-full flex items-center justify-center mx-auto mb-3"><i data-lucide="hand-coins" class="w-8 h-8 text-amber-500"></i></div>
                <h2 class="font-black text-lg text-slate-900">Muqassah (Diskon Pelunasan)</h2>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-1">Estimasi Pelunasan Dipercepat</p>
            </div>
            
            <div class="space-y-3 bg-slate-50 p-5 rounded-2xl border mb-6">
                <div class="flex justify-between text-xs font-bold text-slate-500"><span>Sisa Hutang Normal</span><span id="pSisaNormal" class="text-slate-800">Rp 0</span></div>
                <div class="flex justify-between text-xs font-bold text-emerald-600"><span>Potongan Ibra' (Diskon)</span><span id="pDiskon">- Rp 0</span></div>
                <div class="pt-3 border-t border-slate-200 flex justify-between items-center">
                    <span class="text-xs font-black text-slate-900">Total Pelunasan</span>
                    <span id="pTotalAkhir" class="text-lg font-black text-amber-600">Rp 0</span>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <button id="btnKirimPelunasan" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i data-lucide="send" class="w-4 h-4 text-amber-400"></i> Kirim Penawaran WA
                </button>
                <button onclick="closePelunasan()" class="w-full py-3 text-slate-400 text-xs font-bold">Batal</button>
            </div>
        </div>
    </div>

    <!-- MODAL WA REMINDER -->
    <div id="waModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden flex-col justify-end transition-opacity duration-300 opacity-0 px-2 sm:px-0">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8 shadow-2xl transform translate-y-full transition-transform">
            <div class="flex justify-between items-center mb-4 pb-2 border-b">
                <h2 class="font-black text-base text-slate-900 flex items-center gap-2"><i data-lucide="send" class="w-4 h-4 text-emerald-500"></i> Pesan Tagihan</h2>
                <button onclick="closeWaModal()" class="p-2 bg-slate-50 rounded-full"><i data-lucide="x" class="w-4 h-4 text-slate-400"></i></button>
            </div>
            <textarea id="pesanWA" rows="8" class="w-full p-3 bg-emerald-50/50 border border-emerald-100 rounded-xl text-xs font-medium outline-none resize-none"></textarea>
            <button id="btnKirimWA" class="w-full mt-4 bg-[#25D366] text-white font-bold py-3 rounded-xl active:scale-95 flex justify-center gap-2 shadow-lg shadow-green-500/20"><i data-lucide="message-circle" class="w-4 h-4"></i> Kirim ke WhatsApp</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const formatRupiah = (num) => new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;
        let currentTab = 'antrean', currentActiveData = null, allTagihanData = [], targetWaLink = "";

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            toast.className = `${bgColor} text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 transform -translate-y-10 opacity-0 transition-all duration-300 w-full pointer-events-auto`;
            toast.innerHTML = `<span class="text-sm font-bold">${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => { toast.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        const formatNomorWA = (wa) => {
            let n = wa.toString().replace(/[^0-9]/g, '');
            return n.startsWith('0') ? '62' + n.substring(1) : (n.startsWith('8') ? '62' + n : n);
        };

        function refreshData() { currentTab === 'antrean' ? fetchAntrean() : fetchTagihan(); }
        
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-antrean').className = tab === 'antrean' ? 'flex-1 py-2 rounded-lg text-[11px] tab-active' : 'flex-1 py-2 rounded-lg text-[11px] tab-inactive';
            document.getElementById('tab-tagihan').className = tab === 'tagihan' ? 'flex-1 py-2 rounded-lg text-[11px] tab-active' : 'flex-1 py-2 rounded-lg text-[11px] tab-inactive';
            if (tab === 'antrean') { document.getElementById('viewAntrean').classList.remove('hidden'); document.getElementById('viewTagihan').classList.add('hidden'); fetchAntrean(); } 
            else { document.getElementById('viewTagihan').classList.remove('hidden'); document.getElementById('viewAntrean').classList.add('hidden'); fetchTagihan(); }
        }

        async function fetchAntrean() {
            const container = document.getElementById('pendingList');
            container.innerHTML = `<div class="text-center py-10"><div class="spinner mx-auto mb-2"></div></div>`;
            try {
                const res = await fetch(CONFIG.API_URL + "?action=getPending&nocache=" + Date.now());
                const result = await res.json();
                const data = result.data || [];
                container.innerHTML = data.length === 0 ? `<div class="text-center py-10 bg-white rounded-2xl border border-dashed text-slate-400 font-bold text-xs">Antrean kosong.</div>` : '';
                
                data.forEach((p) => {
                    let hClean = parseRupiah(p.harga) - parseRupiah(p.dp);
                    let mMatch = (p.jaminan || "").match(/(\d+)%/);
                    let marginVal = mMatch ? parseInt(mMatch[1]) : (p.jaminan.toLowerCase().includes("tanpa") ? 25 : 15);
                    let rekTotal = hClean + (hClean * (marginVal / 100)); 
                    let rekBulan = Math.round(rekTotal / (parseInt(p.tenor) || 5));
                    let dataJson = encodeURIComponent(JSON.stringify({ ...p, rekTotal, rekBulan, marginAktif: marginVal }));

                    container.innerHTML += `
                        <div class="bg-white p-4 rounded-2xl border shadow-sm mb-3">
                            <div class="flex justify-between items-start mb-3">
                                <div><h3 class="font-black text-slate-900 text-sm">${p.nama}</h3><p class="text-[10px] font-bold text-slate-500">${p.barang}</p></div>
                                <div class="text-right"><span class="text-[8px] font-black px-1.5 py-0.5 rounded bg-slate-100 text-slate-600">${p.tenor} BLN</span></div>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button class="py-2.5 bg-red-50 text-red-600 rounded-xl text-[10px] font-black opacity-50">TOLAK</button>
                                <button onclick="bukaModalAcc('${dataJson}')" class="py-2.5 bg-emerald-50 text-emerald-600 border border-emerald-100 rounded-xl text-[10px] font-black">HITUNG ACC</button>
                            </div>
                        </div>`;
                });
                lucide.createIcons();
            } catch(e) { container.innerHTML = `<p class="text-center py-10 font-bold text-red-500">API Error.</p>`; }
        }

        async function fetchTagihan() {
            const container = document.getElementById('customerList');
            container.innerHTML = `<div class="text-center py-10"><div class="spinner mx-auto"></div></div>`;
            try {
                const res = await fetch(CONFIG.API_URL + "?action=getAll&nocache=" + Date.now());
                const result = await res.json();
                allTagihanData = (result.data || []).filter(c => (c.hutang - c.terbayar) > 0);
                renderTagihan(allTagihanData);
            } catch(e) { container.innerHTML = `<p class="text-center py-10 text-xs">Gagal memuat data.</p>`; }
        }

        function renderTagihan(data) {
            const container = document.getElementById('customerList'); container.innerHTML = '';
            data.forEach(p => {
                let dataJson = encodeURIComponent(JSON.stringify(p));
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm flex flex-col gap-3">
                        <div class="flex justify-between items-start">
                            <div><h3 class="font-black text-xs text-slate-800 uppercase">${p.nama}</h3><p class="text-[9px] font-bold text-slate-400 mt-1">ID: ${p.idKontrak} • Bulan Ke-${p.cicilanKe}</p></div>
                            <div class="text-right"><p class="font-black text-slate-900 text-xs">Rp ${formatRupiah(p.cicilanPerBulan)}</p></div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="bukaPesanWA('${p.nama}', '${p.wa}', '${p.cicilanKe}', '${p.cicilanPerBulan}')" class="py-2.5 bg-amber-50 text-amber-700 rounded-xl text-[10px] font-black flex items-center justify-center gap-1"><i data-lucide="message-circle" class="w-3 h-3"></i> PENGINGAT</button>
                            <button onclick="bukaModalPelunasan('${dataJson}')" class="py-2.5 bg-slate-900 text-amber-400 rounded-xl text-[10px] font-black flex items-center justify-center gap-1"><i data-lucide="zap" class="w-3 h-3"></i> PELUNASAN</button>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        }

        // LOGIKA PELUNASAN (FITUR BARU)
        window.bukaModalPelunasan = function(encoded) {
            const data = JSON.parse(decodeURIComponent(encoded)); currentActiveData = data;
            const sisaHutang = data.hutang - data.terbayar;
            
            // Logika Muqassah: Diskon 50% dari sisa margin (margin diasumsikan rata-rata 20% dari hutang)
            // Estimasi sisa margin = (sisaHutang / sisaBulan) * sisaBulan * (0.2)
            const estimasiSisaMargin = sisaHutang * 0.1; // Contoh: Kita kasih diskon 10% dari sisa total hutang
            const totalPelunasan = sisaHutang - estimasiSisaMargin;

            document.getElementById('pSisaNormal').innerText = `Rp ${formatRupiah(sisaHutang)}`;
            document.getElementById('pDiskon').innerText = `- Rp ${formatRupiah(estimasiSisaMargin)}`;
            document.getElementById('pTotalAkhir').innerText = `Rp ${formatRupiah(totalPelunasan)}`;

            document.getElementById('pelunasanModal').classList.replace('hidden', 'flex');
            setTimeout(() => { 
                document.getElementById('pelunasanModal').classList.remove('opacity-0'); 
                document.getElementById('pelunasanContent').classList.remove('scale-95');
            }, 10);

            document.getElementById('btnKirimPelunasan').onclick = () => {
                const pesan = `Assalamu'alaikum Kak *${data.nama}* 🙏\n\nSebagai apresiasi atas itikad baik Kakak, Zenith Cell memberikan program *Muqassah (Diskon Pelunasan)* khusus untuk ID: ${data.idKontrak}.\n\nJika dilunasi hari ini, Kakak mendapatkan potongan sebesar *Rp ${formatRupiah(estimasiSisaMargin)}*.\n\nTotal Pelunasan: *Rp ${formatRupiah(totalPelunasan)}*\n\nOpsi ini bersifat sukarela dan ditujukan untuk memudahkan Kakak. Terima kasih! ✨`;
                window.open(`https://api.whatsapp.com/send?phone=${formatNomorWA(data.wa)}&text=${encodeURIComponent(pesan)}`, '_blank');
                closePelunasan();
            };
        };

        window.closePelunasan = function() { 
            document.getElementById('pelunasanModal').classList.add('opacity-0'); 
            document.getElementById('pelunasanContent').classList.add('scale-95');
            setTimeout(() => document.getElementById('pelunasanModal').classList.replace('flex', 'hidden'), 300); 
        };

        window.bukaModalAcc = function(encoded) {
            const data = JSON.parse(decodeURIComponent(encoded)); currentActiveData = data;
            document.getElementById('accIdKontrak').innerText = data.idKontrak; 
            document.getElementById('accNama').innerText = data.nama; 
            document.getElementById('accBarang').innerText = data.barang;
            document.getElementById('badgeMarginFinal').innerText = `MARGIN: ${data.marginAktif}%`;
            document.getElementById('accJatuhTempo').value = data.jatuhTempo; 
            document.getElementById('accTenor').value = data.tenor;
            document.getElementById('accTotalHutang').value = formatRupiah(data.rekTotal); 
            document.getElementById('accCicilan').value = formatRupiah(data.rekBulan);
            document.getElementById('accModal').classList.replace('hidden', 'flex'); 
            setTimeout(() => { document.getElementById('accModal').classList.remove('opacity-0'); document.getElementById('accModalContent').classList.remove('translate-y-full'); }, 10);
        };

        window.closeModalAcc = function() { document.getElementById('accModal').classList.add('opacity-0'); document.getElementById('accModalContent').classList.add('translate-y-full'); setTimeout(() => document.getElementById('accModal').classList.replace('flex', 'hidden'), 300); };

        document.getElementById('btnKonfirmasiAcc').addEventListener('click', () => {
            const payload = { tipe: "ACC_PENGAJUAN", idKontrak: currentActiveData.idKontrak, wa: currentActiveData.wa, nama: currentActiveData.nama, barang: currentActiveData.barang, jatuhTempo: document.getElementById('accJatuhTempo').value, totalHutang: parseRupiah(document.getElementById('accTotalHutang').value), cicilanBulan: parseRupiah(document.getElementById('accCicilan').value) };
            fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            const pesan = `Alhamdulillah Kak *${payload.nama}*, pengajuan *${payload.barang}* di *Zenith Cell* telah di-ACC!✨`;
            window.open(`https://api.whatsapp.com/send?phone=${formatNomorWA(payload.wa)}&text=${encodeURIComponent(pesan)}`, '_blank');
            closeModalAcc(); showToast("Berhasil di-ACC!");
            setTimeout(fetchAntrean, 1500);
        });

        window.bukaPesanWA = function(nama, wa, ke, nominal) {
            document.getElementById('pesanWA').value = `Assalamu'alaikum Kak ${nama} 🙏\nMengingatkan dari *Zenith Cell*, cicilan gadget (Bulan Ke-${ke}) senilai *Rp ${formatRupiah(nominal)}* hampir jatuh tempo.\n\nTerima kasih! ✨`;
            targetWaLink = `https://api.whatsapp.com/send?phone=${formatNomorWA(wa)}`;
            document.getElementById('waModal').classList.replace('hidden', 'flex');
            setTimeout(() => { document.getElementById('waModal').classList.remove('opacity-0'); document.querySelector('#waModal > div').classList.remove('translate-y-full'); }, 10);
        };

        window.closeWaModal = function() { document.getElementById('waModal').classList.add('opacity-0'); document.querySelector('#waModal > div').classList.add('translate-y-full'); setTimeout(() => document.getElementById('waModal').classList.replace('flex', 'hidden'), 300); };
        document.getElementById('btnKirimWA').addEventListener('click', () => { window.open(`${targetWaLink}&text=${encodeURIComponent(document.getElementById('pesanWA').value)}`, '_blank'); closeWaModal(); });

        fetchAntrean();
    </script>
</body>
</html>
