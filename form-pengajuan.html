<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Form Pengajuan - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 24px 24px;
            -webkit-tap-highlight-color: transparent;
        }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05);
        }

        input:focus-within, select:focus-within, textarea:focus-within {
            outline: 2px solid #10b981;
            outline-offset: 2px;
            transition: all 0.2s ease;
        }

        /* Validasi CSS bawaan */
        input:user-invalid:not(:placeholder-shown) {
            border-color: #ef4444;
            background-color: #fef2f2;
        }

        input[type="date"]::-webkit-calendar-picker-indicator {
            background-color: transparent; cursor: pointer; opacity: 0.6; transition: opacity 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

        .radio-peer-tenor:checked + div {
            transform: scale(0.95); background-color: #0f172a; color: white; border-color: #0f172a; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-slate-800 pb-32 pt-4 sm:pt-8 px-4 sm:px-8 flex justify-center selection:bg-emerald-200">

    <main class="w-full max-w-5xl relative z-10 flex flex-col">
        
        <header class="mb-8 flex flex-col items-center text-center bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-48 h-48 bg-emerald-500/10 rounded-full blur-[60px] pointer-events-none"></div>
            <div class="absolute -bottom-10 -left-10 w-48 h-48 bg-teal-500/10 rounded-full blur-[60px] pointer-events-none"></div>
            
            <a href="index.html" class="absolute top-6 left-6 p-2.5 bg-slate-50 border border-slate-200 rounded-full text-slate-500 hover:bg-slate-100 transition-colors z-20">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
            </a>

            <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg mb-4 relative z-10">
                <i data-lucide="file-check-2" class="w-8 h-8 text-emerald-400"></i>
            </div>
            <h1 class="font-black text-slate-900 text-3xl sm:text-4xl tracking-tight leading-none relative z-10">Form Pengajuan</h1>
            <p class="text-sm font-bold text-slate-500 mt-2 relative z-10">Pembiayaan Syariah Zenith Cell</p>
        </header>

        <form id="kycForm">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 mb-8">
                
                <!-- KOLOM KIRI: DATA DIRI & FINANSIAL -->
                <div class="space-y-6 lg:space-y-8">
                    
                    <!-- KARTU 1 -->
                    <section class="glass-panel p-6 sm:p-8 rounded-[2rem]">
                        <h2 class="text-base font-extrabold text-slate-800 mb-5 flex items-center gap-2 border-b border-slate-100 pb-3">
                            <span class="bg-emerald-100 text-emerald-600 w-7 h-7 rounded-full flex items-center justify-center text-xs">1</span> 
                            Identitas Pribadi
                        </h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Nama Lengkap (Sesuai KTP)</label>
                                <!-- Pattern minimal 3 huruf, ga boleh angka -->
                                <input type="text" id="nama" pattern="^[a-zA-Z\s.,']{3,50}$" title="Masukkan nama yang valid (min. 3 huruf, tanpa angka)" placeholder="Misal: Budi Santoso" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">NIK KTP (16 Digit)</label>
                                    <!-- Pattern persis 16 angka -->
                                    <input type="text" inputmode="numeric" id="nik" pattern="^\d{16}$" maxlength="16" minlength="16" title="NIK wajib 16 digit angka" placeholder="3201..." required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">No. WhatsApp</label>
                                    <!-- Pattern nomor hp indonesia (10-13 digit) -->
                                    <input type="tel" id="wa" pattern="^(08|628)\d{8,11}$" maxlength="14" title="Gunakan format 08... atau 628... (10-13 digit)" placeholder="0812..." required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Alamat Domisili Sekarang</label>
                                <!-- Alamat minimal 10 karakter agar tidak ngasal -->
                                <textarea id="alamat" rows="2" minlength="10" placeholder="Jl. Merdeka No 10, RT/RW..." required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-medium outline-none resize-none"></textarea>
                            </div>
                        </div>
                    </section>

                    <!-- KARTU 2 -->
                    <section class="glass-panel p-6 sm:p-8 rounded-[2rem]">
                        <h2 class="text-base font-extrabold text-slate-800 mb-5 flex items-center gap-2 border-b border-slate-100 pb-3">
                            <span class="bg-emerald-100 text-emerald-600 w-7 h-7 rounded-full flex items-center justify-center text-xs">2</span> 
                            Pekerjaan & Kontak
                        </h2>
                        <div class="space-y-4">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Profesi Saat Ini</label>
                                    <select id="pekerjaan" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none cursor-pointer appearance-none">
                                        <option value="" disabled selected>-- Pilih Profesi --</option>
                                        <option value="Karyawan Swasta">Karyawan Swasta</option>
                                        <option value="PNS / BUMN">PNS / BUMN</option>
                                        <option value="Wirausaha / Pedagang">Wirausaha / Pedagang</option>
                                        <option value="Pekerja Lepas">Pekerja Lepas</option>
                                        <option value="Mahasiswa">Mahasiswa</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Range Penghasilan /Bulan</label>
                                    <!-- Diubah menjadi Dropdown Range Gaji -->
                                    <select id="gaji" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none cursor-pointer appearance-none">
                                        <option value="" disabled selected>-- Pilih Range --</option>
                                        <option value="< Rp 3.000.000">Kurang dari Rp 3 Juta</option>
                                        <option value="Rp 3.000.000 - Rp 5.000.000">Rp 3 Juta - Rp 5 Juta</option>
                                        <option value="Rp 5.000.000 - Rp 10.000.000">Rp 5 Juta - Rp 10 Juta</option>
                                        <option value="> Rp 10.000.000">Lebih dari Rp 10 Juta</option>
                                    </select>
                                </div>
                            </div>
                            
                            <!-- Kontak Darurat dengan Contact Picker -->
                            <div class="p-4 bg-slate-50/50 rounded-xl border border-slate-200">
                                <div class="flex justify-between items-center mb-3">
                                    <label class="block text-[10px] font-extrabold text-slate-400 uppercase tracking-widest">Kontak Kerabat (Darurat)</label>
                                    <button type="button" onclick="pickContact()" class="text-[10px] font-bold bg-indigo-100 text-indigo-600 px-2 py-1 rounded flex items-center gap-1 hover:bg-indigo-200 transition-colors">
                                        <i data-lucide="book-user" class="w-3 h-3"></i> Pilih Kontak
                                    </button>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="text" id="daruratNama" minlength="3" placeholder="Nama Kerabat" required class="w-full p-3 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                    <input type="tel" id="daruratWa" pattern="^(08|628|\+628)\d{8,11}$" placeholder="No. HP" required class="w-full p-3 bg-white border border-slate-200 rounded-lg text-sm font-bold outline-none">
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <!-- KOLOM KANAN: BARANG & JADWAL -->
                <div class="space-y-6 lg:space-y-8">
                    <section class="glass-panel p-6 sm:p-8 rounded-[2rem] h-full">
                        <h2 class="text-base font-extrabold text-slate-800 mb-5 flex items-center gap-2 border-b border-slate-100 pb-3">
                            <span class="bg-emerald-100 text-emerald-600 w-7 h-7 rounded-full flex items-center justify-center text-xs">3</span> 
                            Barang & Akad
                        </h2>
                        
                        <div class="space-y-5">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Gadget yang Diinginkan</label>
                                <input type="text" id="barang" minlength="5" placeholder="Misal: iPhone 13 Pro 128GB" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                            </div>
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">Estimasi Harga Barang</label>
                                    <div class="relative flex items-center">
                                        <span class="absolute left-4 text-slate-400 font-bold">Rp</span>
                                        <input type="text" id="hargaBarang" inputmode="numeric" placeholder="10.000.000" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-500 mb-1.5">DP / Uang Muka</label>
                                    <div class="relative flex items-center">
                                        <span class="absolute left-4 text-slate-400 font-bold">Rp</span>
                                        <input type="text" id="dpBarang" inputmode="numeric" placeholder="0 (Opsional)" class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">
                                    </div>
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Jadwal Gajian / Jatuh Tempo Cicilan</label>
                                <div class="relative flex items-center">
                                    <span class="absolute left-4 text-slate-400"><i data-lucide="calendar-days" class="w-5 h-5"></i></span>
                                    <input type="date" id="jatuhTempo" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold cursor-pointer outline-none">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Durasi Tenor (Geser)</label>
                                <div class="flex overflow-x-auto no-scrollbar gap-2.5 pb-2 pt-1 snap-x snap-mandatory px-1 -mx-1">
                                    <script>
                                        for(let i=1; i<=12; i++) {
                                            let isChecked = i === 6 ? 'checked' : '';
                                            document.write(`
                                            <label class="cursor-pointer relative shrink-0 snap-center">
                                                <input type="radio" name="tenor" value="${i} Bulan" class="radio-peer-tenor sr-only" ${isChecked}>
                                                <div class="w-16 h-[4.5rem] rounded-xl bg-slate-50 border-2 border-slate-200 text-slate-600 font-black text-xl transition-all flex flex-col items-center justify-center shadow-sm">
                                                    <span class="leading-none">${i}</span>
                                                    <span class="text-[9px] uppercase font-bold mt-1 opacity-80">Bulan</span>
                                                </div>
                                            </label>`);
                                        }
                                    </script>
                                </div>
                            </div>

                            <!-- Diubah menjadi Dropdown Jaminan -->
                            <div class="pt-2 border-t border-slate-100">
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Jaminan Fisik yang Dimiliki</label>
                                <select id="jaminan" required class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none cursor-pointer appearance-none">
                                    <option value="" disabled selected>-- Pilih Jenis Jaminan --</option>
                                    <option value="BPKB Motor">BPKB Motor</option>
                                    <option value="BPKB Mobil">BPKB Mobil</option>
                                    <option value="Ijazah Asli Terakhir">Ijazah Asli Terakhir</option>
                                    <option value="Sertifikat Rumah/Tanah">Sertifikat Rumah / Tanah</option>
                                    <option value="Logam Mulia Antam">Logam Mulia / Emas</option>
                                    <option value="Lainnya">Lainnya (Bicarakan di WA)</option>
                                </select>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <!-- Tombol Submit -->
            <div class="fixed bottom-6 left-0 right-0 px-4 sm:px-8 z-50 flex justify-center pointer-events-none">
                <button type="submit" id="btnSubmitForm" class="pointer-events-auto w-full max-w-lg bg-slate-900 hover:bg-black text-white font-extrabold py-4 px-6 rounded-[1.25rem] shadow-2xl shadow-slate-900/30 active:scale-[0.97] transition-all flex justify-center items-center gap-2.5 border border-slate-700">
                    <i data-lucide="send-to-back" class="w-5 h-5 text-emerald-400"></i>
                    <span class="tracking-wide" id="txtBtnSubmit">Ajukan Pembiayaan Sekarang</span>
                </button>
            </div>
            <div class="h-10"></div> 
        </form>
    </main>

    <!-- Modal Instruksi WA -->
    <div id="instruksiModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-[340px] w-full text-center shadow-2xl transform scale-95 transition-transform duration-300 border border-slate-100" id="instruksiCard">
            <div class="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center mx-auto mb-5 border border-emerald-100 shadow-inner">
                <i data-lucide="smartphone" class="w-10 h-10 text-emerald-500"></i>
            </div>
            <h3 class="text-xl font-extrabold text-slate-900 mb-2">Terhubung ke WhatsApp</h3>
            <p class="text-slate-500 text-sm font-medium mb-6 leading-relaxed">Form tercatat! Mohon siapkan <b class="text-slate-700">Foto KTP</b> dan <b class="text-slate-700">Foto Jaminan</b> untuk dilampirkan langsung di obrolan WhatsApp Admin.</p>
            <button id="btnLanjutWA" class="w-full bg-[#25D366] hover:bg-[#1ebd5a] text-white font-extrabold py-4 px-6 rounded-2xl shadow-lg shadow-[#25D366]/30 active:scale-[0.98] transition-all flex justify-center items-center gap-2">
                <i data-lucide="message-circle" class="w-5 h-5"></i> Lanjut Buka WA
            </button>
            <button type="button" onclick="closeModal()" class="mt-4 text-[11px] font-bold text-slate-400 hover:text-slate-600 uppercase tracking-widest">Tutup</button>
        </div>
    </div>

    <!-- Toast Error Dinamis -->
    <div id="toastError" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-2xl shadow-xl shadow-slate-900/20 text-sm font-bold transition-all duration-300 opacity-0 -translate-y-4 pointer-events-none z-[100] flex items-center gap-3 border border-slate-700">
        <i data-lucide="info" class="w-5 h-5 text-amber-400 shrink-0"></i>
        <span id="errorMsg">Isian tidak valid!</span>
    </div>

    <script>
        lucide.createIcons();

        // =========================================================
        // WAJIB GANTI: MASUKKAN URL GOOGLE APP SCRIPT ANDA
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycbzuM2qfXalz8Z8tYPHYXPd0SuB-FAxGOo39CjB_LgLysp2IAvAsprUc8kTDdcFPTx1M/exec";
        const NOMOR_WA_ADMIN = "62895410571547"; 
        // =========================================================

        // --- SISTEM PILIH KONTAK OTOMATIS (CONTACT PICKER API) ---
        async function pickContact() {
            const supported = ('contacts' in navigator && 'ContactsManager' in window);
            if (!supported) {
                showError("Browser / HP Anda tidak mendukung fitur ini. Silakan ketik manual.");
                return;
            }
            try {
                const props = ['name', 'tel'];
                const contacts = await navigator.contacts.select(props, { multiple: false });
                if (contacts.length > 0) {
                    document.getElementById('daruratNama').value = contacts[0].name[0] || '';
                    
                    // Bersihkan format nomor dari buku telepon (buang spasi/strip)
                    let phone = contacts[0].tel[0].replace(/[^0-9+]/g, '');
                    if(phone.startsWith('+62')) phone = '0' + phone.slice(3);
                    if(phone.startsWith('62')) phone = '0' + phone.slice(2);
                    
                    document.getElementById('daruratWa').value = phone;
                }
            } catch (ex) {
                console.log(ex);
            }
        }
        // --------------------------------------------------------

        const dateInput = document.getElementById('jatuhTempo');
        const today = new Date();
        const formattedDate = today.toISOString().split('T')[0];
        dateInput.setAttribute('min', formattedDate);
        dateInput.value = formattedDate; 

        const formatRupiah = (num) => (num === 0 || isNaN(num)) ? "" : new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;

        ['hargaBarang', 'dpBarang'].forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.addEventListener('input', (e) => {
                    let val = parseRupiah(e.target.value);
                    e.target.value = val === 0 ? '' : formatRupiah(val);
                });
            }
        });

        const modal = document.getElementById('instruksiModal');
        const card = document.getElementById('instruksiCard');
        const toastError = document.getElementById('toastError');
        let pendingWaLink = "";

        const closeModal = () => {
            modal.classList.add('opacity-0'); card.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        };

        const showError = (msg) => {
            document.getElementById('errorMsg').innerText = msg;
            toastError.classList.remove('opacity-0', '-translate-y-4');
            setTimeout(() => { toastError.classList.add('opacity-0', '-translate-y-4'); }, 4000);
        };

        // CUSTOM JS VALIDATION SEBELUM SUBMIT
        function validateForm() {
            const nik = document.getElementById('nik').value;
            const wa = document.getElementById('wa').value;
            const nama = document.getElementById('nama').value;
            
            if (nama.length < 3 || /\d/.test(nama)) {
                showError("Nama tidak valid! Pastikan tanpa angka dan minimal 3 huruf.");
                document.getElementById('nama').focus();
                return false;
            }
            if (nik.length !== 16) {
                showError("NIK KTP harus pas 16 digit angka!");
                document.getElementById('nik').focus();
                return false;
            }
            if (wa.length < 10 || wa.length > 14 || !(wa.startsWith('08') || wa.startsWith('628'))) {
                showError("No WA tidak valid! Gunakan format 08... (10-14 digit).");
                document.getElementById('wa').focus();
                return false;
            }
            return true;
        }

        document.getElementById('kycForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) return;

            const btnSubmit = document.getElementById('btnSubmitForm');
            const txtBtn = document.getElementById('txtBtnSubmit');
            
            const rawDate = document.getElementById('jatuhTempo').value;
            let prettyDate = rawDate;
            if (rawDate) {
                const parts = rawDate.split('-'); 
                prettyDate = `${parts[2]}-${parts[1]}-${parts[0]}`; 
            }

            const data = {
                nama: document.getElementById('nama').value.trim(),
                nik: document.getElementById('nik').value.trim(),
                wa: document.getElementById('wa').value.trim(),
                alamat: document.getElementById('alamat').value.trim(),
                pekerjaan: document.getElementById('pekerjaan').value,
                gaji: document.getElementById('gaji').value, // Karena skrg dropdown, nilainya range string
                daruratNama: document.getElementById('daruratNama').value.trim(),
                daruratWa: document.getElementById('daruratWa').value.trim(),
                barang: document.getElementById('barang').value.trim(),
                harga: document.getElementById('hargaBarang').value,
                dp: document.getElementById('dpBarang').value || "0",
                tenor: document.querySelector('input[name="tenor"]:checked').value,
                jaminan: document.getElementById('jaminan').value, // Skrg dropdown
                jatuhTempo: prettyDate 
            };

            if (GOOGLE_API_URL === "TARUH_URL_GOOGLE_SCRIPT_ANDA_DISINI") {
                showError("Sistem belum dihubungkan dengan API Database. Hubungi Tim IT."); return;
            }

            const payloadSheet = { tipe: "PENGAJUAN_BARU", timestamp: new Date().toLocaleString('id-ID'), ...data };

            btnSubmit.disabled = true; btnSubmit.classList.add('opacity-80', 'cursor-not-allowed');
            txtBtn.innerText = "Mengirim Data...";

            try {
                await fetch(GOOGLE_API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadSheet) });

                const teksPesan = `*FORM PENGAJUAN PEMBIAYAAN SYARIAH* 📝\n*ZENITH CELL*\n----------------------------------------\n*1. IDENTITAS PRIBADI*\nNama : ${data.nama}\nNIK KTP : ${data.nik}\nNo. WA : ${data.wa}\nAlamat : ${data.alamat}\n\n*2. FINANSIAL & KONTAK*\nPekerjaan : ${data.pekerjaan}\nRange Gaji: ${data.gaji}\nKontak Darurat: ${data.daruratNama} (${data.daruratWa})\n\n*3. DETAIL PENGAJUAN*\nBarang : *${data.barang}*\nHarga  : Rp ${data.harga}\nDP     : Rp ${data.dp}\nTenor  : ${data.tenor}\nJatuh Tempo: *Tgl ${data.jatuhTempo}*\nJaminan: *${data.jaminan}*\n----------------------------------------\n_Mohon dicek form pengajuan saya Min. Di bawah pesan ini saya lampirkan Foto KTP & Jaminan fisiknya._`;
                pendingWaLink = `https://api.whatsapp.com/send?phone=${NOMOR_WA_ADMIN}&text=${encodeURIComponent(teksPesan)}`;

                btnSubmit.disabled = false; btnSubmit.classList.remove('opacity-80', 'cursor-not-allowed'); txtBtn.innerText = "Ajukan Pembiayaan Sekarang";

                modal.classList.remove('hidden'); modal.classList.add('flex');
                setTimeout(() => { modal.classList.remove('opacity-0'); card.classList.remove('scale-95'); }, 10);

            } catch (err) {
                btnSubmit.disabled = false; btnSubmit.classList.remove('opacity-80', 'cursor-not-allowed'); txtBtn.innerText = "Ajukan Pembiayaan Sekarang";
                showError("Koneksi internet gagal. Mohon ulangi.");
            }
        });

        document.getElementById('btnLanjutWA').addEventListener('click', () => {
            document.getElementById('btnLanjutWA').classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('btnLanjutWA').classList.remove('scale-95');
                window.open(pendingWaLink, '_blank');
                closeModal();
                document.getElementById('kycForm').reset(); 
                document.getElementById('jatuhTempo').value = formattedDate;
            }, 150);
        });
    </script>
</body>
</html>
