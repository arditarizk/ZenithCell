<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Form Pengajuan - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; padding-bottom: 20px; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        input:focus-within, select:focus-within, textarea:focus-within { outline: 2px solid #10b981; outline-offset: 2px; transition: all 0.2s ease; }
        .radio-peer-tenor:checked + div { transform: scale(0.95); background-color: #0f172a; color: white; border-color: #0f172a; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 px-4 pt-6 flex justify-center selection:bg-emerald-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4"></div>

    <main class="w-full max-w-md relative z-10 flex flex-col">
        <header class="mb-6 flex items-center gap-4 bg-white p-4 rounded-[2rem] shadow-sm border relative">
            <a href="index.html" class="p-2.5 bg-slate-50 border border-slate-100 rounded-full text-slate-500 active:scale-95"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div>
                <h1 class="font-black text-xl leading-none text-slate-900">Form Pengajuan</h1>
                <p class="text-[10px] font-bold text-emerald-600 uppercase mt-1 tracking-widest">Kredit Syariah</p>
            </div>
        </header>

        <form id="pengajuanForm" class="space-y-5">
            <section class="glass-panel p-5 rounded-3xl">
                <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="user" class="w-4 h-4 text-emerald-500"></i> Identitas Diri</h2>
                <div class="space-y-3">
                    <input type="text" id="nama" name="nama" pattern="^[a-zA-Z\s.,']{3,50}$" placeholder="Nama Lengkap KTP" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm">
                    <input type="text" inputmode="numeric" id="nik" name="nik" maxlength="20" placeholder="NIK KTP (16 Digit)" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none tracking-wide text-sm">
                    <input type="tel" id="wa" name="wa" maxlength="15" placeholder="Nomor WhatsApp Aktif" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm">
                    <textarea id="alamat" name="alamat" rows="2" placeholder="Alamat Domisili Sekarang" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-medium outline-none resize-none text-sm"></textarea>
                </div>
            </section>

            <section class="glass-panel p-5 rounded-3xl">
                <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="briefcase" class="w-4 h-4 text-emerald-500"></i> Pekerjaan & Kontak</h2>
                <div class="space-y-3">
                    <select id="pekerjaan" name="pekerjaan" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm">
                        <option value="" disabled selected>-- Pilih Profesi --</option>
                        <option value="Karyawan Swasta">Karyawan Swasta</option><option value="Wirausaha">Wirausaha</option><option value="Lainnya">Lainnya</option>
                    </select>
                    <select id="gaji" name="gaji" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm">
                        <option value="" disabled selected>-- Estimasi Penghasilan --</option>
                        <option value="< Rp 3 Juta">< Rp 3 Juta</option><option value="Rp 3 - 5 Juta">Rp 3 - 5 Juta</option><option value="> Rp 5 Juta">> Rp 5 Juta</option>
                    </select>
                    <div class="p-3 bg-slate-50 border rounded-xl">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[10px] font-extrabold text-slate-400 uppercase">Kontak Darurat</label>
                            <button type="button" onclick="pickContact()" class="text-[9px] font-bold bg-indigo-100 text-indigo-600 px-2 py-1 rounded hover:bg-indigo-200">Pilih Kontak</button>
                        </div>
                        <input type="text" id="daruratNama" name="daruratNama" placeholder="Nama Kerabat" required class="w-full p-2.5 bg-white border rounded-lg text-sm font-bold outline-none mb-2">
                        <input type="tel" id="daruratWa" name="daruratWa" placeholder="No. HP Kerabat" required class="w-full p-2.5 bg-white border rounded-lg text-sm font-bold outline-none">
                    </div>
                </div>
            </section>

            <section class="glass-panel p-5 rounded-3xl">
                <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="shopping-bag" class="w-4 h-4 text-emerald-500"></i> Barang & Akad</h2>
                <div class="space-y-4">
                    <input type="text" id="barang" name="barang" placeholder="Gadget yang Diinginkan" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div class="relative flex items-center"><span class="absolute left-3 text-slate-400 font-bold text-xs">Rp</span><input type="text" id="hargaBarang" name="hargaBarang" inputmode="numeric" placeholder="Harga Cash" required class="w-full pl-9 pr-3 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm"></div>
                        <div class="relative flex items-center"><span class="absolute left-3 text-slate-400 font-bold text-xs">Rp</span><input type="text" id="dpBarang" name="dpBarang" inputmode="numeric" placeholder="DP Muka" class="w-full pl-9 pr-3 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm"></div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1">Tanggal Jatuh Tempo (Tiap Bulan)</label>
                        <div class="relative flex items-center"><span class="absolute left-3 text-slate-400 font-bold text-xs">Tgl</span><input type="number" id="jatuhTempo" name="jatuhTempo" min="1" max="31" placeholder="Misal: 25" required class="w-full pl-10 pr-3 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm"></div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1">Durasi Tenor (Maksimal 10 Bulan)</label>
                        <div class="flex overflow-x-auto no-scrollbar gap-2 pb-1" id="tenorContainer">
                            <script>
                                for(let i=1; i<=10; i++) {
                                    let isChecked = i === 5 ? 'checked' : '';
                                    document.write(`<label class="cursor-pointer relative shrink-0"><input type="radio" name="tenor" value="${i} Bulan" class="radio-peer-tenor sr-only" ${isChecked}><div class="w-14 h-14 rounded-xl bg-slate-50 border-2 text-slate-600 font-black text-lg flex items-center justify-center shadow-sm transition-colors">${i}</div></label>`);
                                }
                            </script>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1">Pilih Jalur Transaksi</label>
                        <select id="pilihJalur" required onchange="toggleJalur()" class="w-full px-4 py-3 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl font-bold outline-none text-sm">
                            <option value="" disabled selected>-- Pilih Jalur --</option>
                            <option value="VIP">🌟 JALUR VIP (Margin 15%) - Titip Jaminan</option>
                            <option value="REGULER">REGULER (Margin 25%) - Tanpa Jaminan</option>
                        </select>
                    </div>

                    <div id="boxJaminan" class="hidden space-y-2 mt-2 p-4 bg-emerald-50/50 border border-emerald-100 rounded-xl">
                        <label class="block text-[10px] font-bold text-emerald-700 mb-1">Jenis Jaminan Fisik (Wajib untuk VIP)</label>
                        <select id="jenisJaminan" onchange="toggleJaminanLainnya()" class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl font-bold outline-none text-sm">
                            <option value="" disabled selected>-- Pilih Jaminan --</option>
                            <option value="BPKB Motor">BPKB Motor</option>
                            <option value="Ijazah Asli">Ijazah Asli</option>
                            <option value="Logam Mulia">Logam Mulia</option>
                            <option value="Lainnya">Lainnya...</option>
                        </select>
                        <input type="text" id="jaminanLainnya" placeholder="Ketik jaminan di sini..." class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl font-bold outline-none mt-2 text-sm hidden">
                    </div>
                    </div>
            </section>

            <div class="w-full h-32 shrink-0 pointer-events-none"></div>

            <div class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-50">
                <button type="submit" id="btnSubmitForm" class="w-full bg-slate-900 text-white font-extrabold py-4 px-6 rounded-2xl active:scale-95 transition-transform flex justify-center items-center gap-2 shadow-2xl border border-slate-700">
                    <i data-lucide="send" class="w-5 h-5 text-emerald-400"></i><span id="txtBtnSubmit">Kirim Pengajuan</span>
                </button>
            </div>
        </form>
    </main>

    <div id="instruksiModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-white rounded-[2rem] p-6 max-w-[320px] w-full text-center shadow-2xl transform scale-95 transition-transform" id="instruksiCard">
            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check-circle-2" class="w-8 h-8 text-emerald-500"></i></div>
            <h3 class="text-lg font-extrabold text-slate-900 mb-1">Berhasil Dikirim!</h3>
            <p class="text-slate-500 text-xs mb-6 leading-relaxed">Mohon kembali ke WhatsApp Admin untuk melampirkan Foto KTP & Fisik Jaminan.</p>
            <button onclick="tutupModal()" class="w-full bg-slate-100 font-bold py-3 rounded-xl text-sm">Tutup Formulir</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : 'bg-red-500';
            const icon = type === 'success' ? 'check-circle' : 'alert-circle';
            toast.className = `${bgColor} text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 transform -translate-y-10 opacity-0 transition-all duration-300 w-full`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 shrink-0"></i><span class="text-sm font-bold">${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        const formatRupiah = (num) => (num === 0 || isNaN(num)) ? "" : new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;

        document.getElementById('nik').addEventListener('input', function(e) {
            let val = this.value.replace(/[^0-9]/g, ''); let formatted = '';
            if (val.length > 0) formatted += val.substring(0, 3);
            if (val.length > 3) formatted += '-' + val.substring(3, 6);
            if (val.length > 6) formatted += '-' + val.substring(6, 12);
            if (val.length > 12) formatted += '-' + val.substring(12, 15);
            if (val.length > 15) formatted += '-' + val.substring(15, 16);
            this.value = formatted;
        });

        function bersihkanNomorWA(inputElement) {
            inputElement.addEventListener('input', function() {
                let val = this.value.replace(/[^0-9]/g, ''); 
                if (val.startsWith('62')) val = '0' + val.substring(2); 
                if (val.length > 15) val = val.substring(0, 15);
                this.value = val;
            });
        }
        bersihkanNomorWA(document.getElementById('wa'));
        bersihkanNomorWA(document.getElementById('daruratWa'));

        // FUNGSI JAMINAN 2 TAHAP
        function toggleJalur() {
            const jalur = document.getElementById('pilihJalur').value;
            const boxJaminan = document.getElementById('boxJaminan');
            const jenisJaminan = document.getElementById('jenisJaminan');
            
            if(jalur === 'VIP') {
                boxJaminan.classList.remove('hidden');
                jenisJaminan.required = true;
            } else {
                boxJaminan.classList.add('hidden');
                jenisJaminan.required = false;
                jenisJaminan.value = "";
                document.getElementById('jaminanLainnya').classList.add('hidden');
                document.getElementById('jaminanLainnya').value = "";
            }
        }

        function toggleJaminanLainnya() {
            const select = document.getElementById('jenisJaminan'); 
            const inputLain = document.getElementById('jaminanLainnya');
            if (select.value === 'Lainnya') { 
                inputLain.classList.remove('hidden'); inputLain.required = true; 
            } else { 
                inputLain.classList.add('hidden'); inputLain.required = false; inputLain.value = ''; 
            }
        }

        const formInputs = document.querySelectorAll('#pengajuanForm input, #pengajuanForm select, #pengajuanForm textarea');
        function saveDraft() {
            let draft = {};
            formInputs.forEach(input => {
                if(input.type === 'radio' && !input.checked) return;
                draft[input.name || input.id] = input.value;
            });
            localStorage.setItem('zenith_draft', JSON.stringify(draft));
        }
        
        function loadDraft() {
            const draft = JSON.parse(localStorage.getItem('zenith_draft'));
            if(draft && Object.keys(draft).length > 2) {
                formInputs.forEach(input => {
                    const savedVal = draft[input.name || input.id];
                    if(savedVal !== undefined) {
                        if(input.type === 'radio') { if(input.value === savedVal) input.checked = true; } 
                        else { input.value = savedVal; }
                    }
                });
                toggleJalur(); // Refresh tampilan UI
            }
        }
        formInputs.forEach(input => input.addEventListener('input', saveDraft));

        // Tangkap Data dari URL Kalkulator
        window.addEventListener('DOMContentLoaded', () => {
            loadDraft();
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('harga')) document.getElementById('hargaBarang').value = formatRupiah(parseInt(urlParams.get('harga')));
            if(urlParams.has('dp')) { let dpVal = parseInt(urlParams.get('dp')); if(dpVal > 0) document.getElementById('dpBarang').value = formatRupiah(dpVal); }
            if(urlParams.has('tenor')) {
                let t = urlParams.get('tenor'); let radio = document.querySelector(`input[name="tenor"][value="${t} Bulan"]`);
                if(radio) { radio.checked = true; }
            }
            if(urlParams.has('jalur')) {
                const j = urlParams.get('jalur');
                if(j === "Tanpa") { 
                    document.getElementById('pilihJalur').value = "REGULER"; 
                } else if(j === "Jaminan") { 
                    document.getElementById('pilihJalur').value = "VIP"; 
                }
                toggleJalur();
            }
        });

        async function pickContact() {
            if (!('contacts' in navigator && 'ContactsManager' in window)) return showToast("HP Anda tidak mendukung pilih kontak otomatis.");
            try {
                const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false });
                if (contacts.length > 0) {
                    document.getElementById('daruratNama').value = contacts[0].name[0] || '';
                    let phone = contacts[0].tel[0].replace(/[^0-9]/g, '');
                    if (phone.startsWith('62')) phone = '0' + phone.substring(2);
                    document.getElementById('daruratWa').value = phone;
                    saveDraft();
                }
            } catch (ex) { console.log(ex); }
        }

        ['hargaBarang', 'dpBarang'].forEach(id => { document.getElementById(id).addEventListener('input', (e) => { e.target.value = formatRupiah(parseRupiah(e.target.value)); }); });

        const modal = document.getElementById('instruksiModal');

        document.getElementById('pengajuanForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nama = document.getElementById('nama').value;
            const nikClean = document.getElementById('nik').value.replace(/[^0-9]/g, '');
            if (nikClean.length !== 16) { showToast("NIK harus 16 digit!"); return; }

            // PENGGABUNGAN DATA JAMINAN AGAR SESUAI DENGAN FORMAT LAMA DI GOOGLE SHEETS
            const jalur = document.getElementById('pilihJalur').value;
            let jaminanFinal = "Tanpa Jaminan"; 
            
            if (jalur === "VIP") {
                let jenis = document.getElementById('jenisJaminan').value;
                if (jenis === 'Lainnya') jenis = document.getElementById('jaminanLainnya').value;
                jaminanFinal = `VIP - ${jenis}`; 
            }

            const btnSubmit = document.getElementById('btnSubmitForm'), txtBtn = document.getElementById('txtBtnSubmit');
            const data = {
                nama: nama, nik: nikClean, wa: document.getElementById('wa').value, alamat: document.getElementById('alamat').value, 
                pekerjaan: document.getElementById('pekerjaan').value, gaji: document.getElementById('gaji').value,
                daruratNama: document.getElementById('daruratNama').value, daruratWa: document.getElementById('daruratWa').value,
                barang: document.getElementById('barang').value, harga: document.getElementById('hargaBarang').value, dp: document.getElementById('dpBarang').value || "0",
                tenor: document.querySelector('input[name="tenor"]:checked').value, jaminan: jaminanFinal, jatuhTempo: document.getElementById('jatuhTempo').value 
            };

            btnSubmit.disabled = true; txtBtn.innerText = "Memverifikasi...";

            try {
                const checkRes = await fetch(`${CONFIG.API_URL}?action=checkDuplicate&wa=${data.wa}&nik=${data.nik}&nocache=${Date.now()}`);
                const checkResult = await checkRes.json();

                if (checkResult.isDuplicate) { showToast(checkResult.message); btnSubmit.disabled = false; txtBtn.innerText = "Kirim Pengajuan"; return; }

                txtBtn.innerText = "Mengirim...";
                const idKontrakBaru = "ZN-" + Math.floor(100000 + Math.random() * 900000);
                
                const payloadSheet = { tipe: "PENGAJUAN_BARU", idKontrak: idKontrakBaru, timestamp: new Date().toLocaleString('id-ID'), ...data };
                fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadSheet) });
                
                localStorage.removeItem('zenith_draft');

                const teksPesan = `*PENGAJUAN KREDIT BARU* 📝\nID: ${idKontrakBaru}\nNama: ${data.nama}\nBarang: *${data.barang}*\nHarga: Rp ${data.harga}\nDP: Rp ${data.dp}\nTenor: ${data.tenor}\nJaminan: *${data.jaminan}*\nJatuh Tempo: Tgl ${data.jatuhTempo}\n\n_Mohon dilanjut Min. Berikut saya lampirkan KTP & Jaminan:_`;
                window.open(`https://api.whatsapp.com/send?phone=${CONFIG.WA_ADMIN}&text=${encodeURIComponent(teksPesan)}`, '_blank');

                btnSubmit.disabled = false; txtBtn.innerText = "Kirim Pengajuan";
                modal.classList.remove('hidden'); modal.classList.add('flex');
                setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);

            } catch(e) { showToast("Gagal terhubung ke server."); btnSubmit.disabled = false; txtBtn.innerText = "Kirim Pengajuan"; }
        });

        function tutupModal() { modal.classList.add('opacity-0'); setTimeout(() => modal.classList.replace('flex','hidden'), 300); document.getElementById('pengajuanForm').reset(); toggleJalur(); }
    </script>
</body>
</html>
