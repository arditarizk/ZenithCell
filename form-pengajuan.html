<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Form Pengajuan - Zenith Cell</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); }
        input:focus-within, select:focus-within, textarea:focus-within { outline: 2px solid #10b981; outline-offset: 2px; transition: all 0.2s ease; }
        input:user-invalid:not(:placeholder-shown) { border-color: #ef4444; background-color: #fef2f2; }
        .radio-peer-tenor:checked + div { transform: scale(0.95); background-color: #0f172a; color: white; border-color: #0f172a; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800 pb-32 pt-4 sm:pt-8 px-4 sm:px-8 flex justify-center selection:bg-emerald-200">

    <main class="w-full max-w-5xl relative z-10 flex flex-col">
        <header class="mb-8 flex flex-col items-center text-center bg-white p-8 rounded-[2.5rem] shadow-sm border relative overflow-hidden">
            <a href="index.html" class="absolute top-6 left-6 p-2.5 bg-slate-50 border rounded-full text-slate-500 hover:bg-slate-100 z-20"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div class="w-16 h-16 bg-slate-900 rounded-2xl flex items-center justify-center shadow-lg mb-4 z-10"><i data-lucide="file-check-2" class="w-8 h-8 text-emerald-400"></i></div>
            <h1 class="font-black text-3xl sm:text-4xl z-10">Form Pengajuan</h1>
        </header>

        <form id="pengajuanForm">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8 mb-8">
                
                <div class="space-y-6 lg:space-y-8">
                    <!-- KARTU 1 -->
                    <section class="glass-panel p-6 sm:p-8 rounded-[2rem]">
                        <h2 class="text-base font-extrabold mb-5 border-b pb-3">1. Identitas Pribadi</h2>
                        <div class="space-y-4">
                            <input type="text" id="nama" pattern="^[a-zA-Z\s.,']{3,50}$" placeholder="Nama Lengkap KTP" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <input type="text" inputmode="numeric" id="nik" pattern="^\d{16}$" maxlength="16" placeholder="NIK KTP (16 Digit)" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none">
                                <input type="tel" id="wa" pattern="^(08|628|\+628)\d{8,11}$" maxlength="14" placeholder="No. WA Aktif" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none">
                            </div>
                            <textarea id="alamat" rows="2" minlength="10" placeholder="Alamat Domisili Sekarang" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-medium outline-none resize-none"></textarea>
                        </div>
                    </section>

                    <!-- KARTU 2 -->
                    <section class="glass-panel p-6 sm:p-8 rounded-[2rem]">
                        <h2 class="text-base font-extrabold mb-5 border-b pb-3">2. Pekerjaan & Kontak</h2>
                        <div class="space-y-4">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <select id="pekerjaan" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none cursor-pointer">
                                    <option value="" disabled selected>-- Pilih Profesi --</option>
                                    <option value="Karyawan Swasta">Karyawan Swasta</option><option value="Wirausaha">Wirausaha</option><option value="Lainnya">Lainnya</option>
                                </select>
                                <select id="gaji" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none cursor-pointer">
                                    <option value="" disabled selected>-- Penghasilan --</option>
                                    <option value="< Rp 3 Juta">< Rp 3 Juta</option><option value="Rp 3 - 5 Juta">Rp 3 - 5 Juta</option><option value="> Rp 5 Juta">> Rp 5 Juta</option>
                                </select>
                            </div>
                            <div class="p-4 bg-slate-50/50 rounded-xl border">
                                <div class="flex justify-between items-center mb-3">
                                    <label class="text-[10px] font-extrabold text-slate-400 uppercase">Kontak Kerabat</label>
                                    <button type="button" onclick="pickContact()" class="text-[10px] font-bold bg-indigo-100 text-indigo-600 px-2 py-1 rounded flex items-center gap-1 hover:bg-indigo-200"><i data-lucide="book-user" class="w-3 h-3"></i> Pilih Kontak</button>
                                </div>
                                <div class="grid grid-cols-2 gap-3">
                                    <input type="text" id="daruratNama" minlength="3" placeholder="Nama Kerabat" required class="w-full p-3 bg-white border rounded-lg text-sm font-bold outline-none">
                                    <input type="tel" id="daruratWa" placeholder="No. HP" required class="w-full p-3 bg-white border rounded-lg text-sm font-bold outline-none">
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="space-y-6 lg:space-y-8">
                    <!-- KARTU 3 -->
                    <section class="glass-panel p-6 sm:p-8 rounded-[2rem] h-full">
                        <h2 class="text-base font-extrabold mb-5 border-b pb-3">3. Barang & Akad</h2>
                        <div class="space-y-5">
                            <input type="text" id="barang" minlength="5" placeholder="Gadget yang Diinginkan (Cth: iPhone 13)" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none">
                            
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="relative flex items-center"><span class="absolute left-4 text-slate-400 font-bold">Rp</span><input type="text" id="hargaBarang" inputmode="numeric" placeholder="Harga Barang" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none"></div>
                                <div class="relative flex items-center"><span class="absolute left-4 text-slate-400 font-bold">Rp</span><input type="text" id="dpBarang" inputmode="numeric" placeholder="DP (Opsional)" class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none"></div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Tanggal Gajian / Jatuh Tempo Tiap Bulan</label>
                                <div class="relative flex items-center">
                                    <span class="absolute left-4 text-slate-400 font-bold">Tgl</span>
                                    <input type="number" id="jatuhTempo" min="1" max="31" placeholder="Misal: 25" required class="w-full pl-12 pr-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none">
                                </div>
                            </div>

                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-1.5">Durasi Tenor</label>
                                <div class="flex overflow-x-auto no-scrollbar gap-2.5 pb-2 pt-1 snap-x snap-mandatory px-1 -mx-1" id="tenorContainer">
                                    <script>
                                        for(let i=1; i<=12; i++) {
                                            let isChecked = i === 6 ? 'checked' : '';
                                            document.write(`<label class="cursor-pointer relative shrink-0 snap-center"><input type="radio" name="tenor" value="${i} Bulan" class="radio-peer-tenor sr-only" ${isChecked}><div class="w-16 h-[4.5rem] rounded-xl bg-slate-50 border-2 text-slate-600 font-black text-xl flex flex-col items-center justify-center shadow-sm"><span class="leading-none">${i}</span><span class="text-[9px] uppercase mt-1">Bulan</span></div></label>`);
                                        }
                                    </script>
                                </div>
                            </div>

                            <select id="jaminan" required class="w-full px-4 py-3.5 bg-slate-50 border rounded-xl font-bold outline-none cursor-pointer">
                                <option value="" disabled selected>-- Jaminan Fisik --</option>
                                <option value="BPKB Motor">BPKB Motor</option><option value="Ijazah Asli">Ijazah Asli</option><option value="Logam Mulia">Logam Mulia</option>
                            </select>
                        </div>
                    </section>
                </div>
            </div>

            <div class="fixed bottom-6 left-0 right-0 px-4 sm:px-8 z-50 flex justify-center pointer-events-none">
                <button type="submit" id="btnSubmitForm" class="pointer-events-auto w-full max-w-lg bg-slate-900 text-white font-extrabold py-4 px-6 rounded-[1.25rem] active:scale-95 transition-all border flex justify-center gap-2">
                    <i data-lucide="send-to-back" class="w-5 h-5 text-emerald-400"></i><span id="txtBtnSubmit">Ajukan Pembiayaan Sekarang</span>
                </button>
            </div>
        </form>
    </main>

    <!-- Modal Sukses WA -->
    <div id="instruksiModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-[340px] w-full text-center shadow-2xl transform scale-95 transition-transform" id="instruksiCard">
            <div class="w-20 h-20 bg-emerald-50 rounded-3xl flex items-center justify-center mx-auto mb-5"><i data-lucide="check-circle" class="w-10 h-10 text-emerald-500"></i></div>
            <h3 class="text-xl font-extrabold text-slate-900 mb-2">Pendaftaran Sukses!</h3>
            <p class="text-slate-500 text-sm mb-6">Mohon kembali ke WhatsApp Admin untuk melampirkan Foto KTP & Jaminan.</p>
            <button onclick="tutupModal()" class="w-full bg-slate-100 text-slate-600 font-bold py-3 rounded-xl">Tutup Formulir</button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const formatRupiah = (num) => (num === 0 || isNaN(num)) ? "" : new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;

        // TANGKAP DATA DARI URL (VIA NETLIFY)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if(urlParams.has('harga')) document.getElementById('hargaBarang').value = formatRupiah(parseInt(urlParams.get('harga')));
            if(urlParams.has('dp')) { let dpVal = parseInt(urlParams.get('dp')); if(dpVal > 0) document.getElementById('dpBarang').value = formatRupiah(dpVal); }
            if(urlParams.has('tenor')) {
                let t = urlParams.get('tenor');
                let radio = document.querySelector(`input[name="tenor"][value="${t} Bulan"]`);
                if(radio) { radio.checked = true; radio.scrollIntoView({inline: "center", behavior: "smooth"}); }
            }
        });

        async function pickContact() {
            if (!('contacts' in navigator && 'ContactsManager' in window)) return alert("Browser Anda tidak mendukung pilih kontak.");
            try {
                const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false });
                if (contacts.length > 0) {
                    document.getElementById('daruratNama').value = contacts[0].name[0] || '';
                    let phone = contacts[0].tel[0].replace(/[^0-9+]/g, '');
                    if(phone.startsWith('+62')) phone = '0' + phone.slice(3);
                    if(phone.startsWith('62')) phone = '0' + phone.slice(2);
                    document.getElementById('daruratWa').value = phone;
                }
            } catch (ex) { console.log(ex); }
        }

        ['hargaBarang', 'dpBarang'].forEach(id => { document.getElementById(id).addEventListener('input', (e) => { e.target.value = formatRupiah(parseRupiah(e.target.value)); }); });

        const modal = document.getElementById('instruksiModal');

        document.getElementById('pengajuanForm').addEventListener('submit', (e) => {
            e.preventDefault();

            const nama = document.getElementById('nama').value;
            if (nama.length < 3 || /\d/.test(nama)) { alert("Nama tidak valid!"); return; }

            const btnSubmit = document.getElementById('btnSubmitForm'), txtBtn = document.getElementById('txtBtnSubmit');
            const data = {
                nama: nama, nik: document.getElementById('nik').value, wa: document.getElementById('wa').value,
                alamat: document.getElementById('alamat').value, pekerjaan: document.getElementById('pekerjaan').value, gaji: document.getElementById('gaji').value,
                daruratNama: document.getElementById('daruratNama').value, daruratWa: document.getElementById('daruratWa').value,
                barang: document.getElementById('barang').value, harga: document.getElementById('hargaBarang').value, dp: document.getElementById('dpBarang').value || "0",
                tenor: document.querySelector('input[name="tenor"]:checked').value, jaminan: document.getElementById('jaminan').value, 
                jatuhTempo: document.getElementById('jatuhTempo').value 
            };

            const payloadSheet = { tipe: "PENGAJUAN_BARU", timestamp: new Date().toLocaleString('id-ID'), ...data };

            btnSubmit.disabled = true; txtBtn.innerText = "Mengirim Data...";

            // TEMBAK DATA KE GOOGLE SHEET
            fetch(CONFIG.API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadSheet) });
                
            // BUKA WHATSAPP LANGSUNG (ANTI-BLOCKER)
            const teksPesan = `*PENGAJUAN SYARIAH ZENITH CELL* 📝\nNama: ${data.nama}\nNIK: ${data.nik}\nBarang: *${data.barang}*\nHarga: Rp ${data.harga}\nDP: Rp ${data.dp}\nTenor: ${data.tenor}\nJatuh Tempo: *Tgl ${data.jatuhTempo} Tiap Bulan*\n\n_Mohon dilanjut Min. Berikut saya lampirkan KTP & Jaminan:_`;
            const waLink = `https://api.whatsapp.com/send?phone=${CONFIG.WA_ADMIN}&text=${encodeURIComponent(teksPesan)}`;
            window.open(waLink, '_blank');

            // Tampilkan Sukses
            btnSubmit.disabled = false; txtBtn.innerText = "Ajukan Pembiayaan";
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
        });

        function tutupModal() {
            modal.classList.add('opacity-0'); setTimeout(() => modal.classList.replace('flex','hidden'), 300);
            document.getElementById('pengajuanForm').reset(); 
        }
    </script>
</body>
</html>
