<!DOCTYPE html>
<html lang="id" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Form Pengajuan - Zenith Cell</title>
    <link rel="icon" type="image/png" href="https://i.supaimg.com/74ab27fb-fcc0-4c79-86c8-843a9b5299c2/6f184ccb-599f-4527-b31f-f416b7dc6b8d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="config.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; padding-bottom: 20px; -webkit-tap-highlight-color: transparent; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .glass-panel { background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
        input:focus-within, select:focus-within, textarea:focus-within { outline: 2px solid #10b981; outline-offset: 2px; transition: all 0.2s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="text-slate-800 px-4 pt-6 flex justify-center selection:bg-emerald-200">

    <div id="toastContainer" class="fixed top-5 left-1/2 -translate-x-1/2 z-[999] flex flex-col gap-2 pointer-events-none w-full max-w-sm px-4"></div>

    <main class="w-full max-w-md relative z-10 flex flex-col">
        <header class="mb-6 flex items-center gap-4 bg-white p-4 rounded-[2rem] shadow-sm border relative">
            <a href="index.html" class="p-2.5 bg-slate-50 border border-slate-100 rounded-full text-slate-500 active:scale-95 transition-all"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
            <div>
                <h1 class="font-black text-xl leading-none text-slate-900">Form Pengajuan</h1>
                <p class="text-[10px] font-bold text-emerald-600 uppercase mt-1 tracking-widest">Sesuai Prinsip Murabahah</p>
            </div>
        </header>

        <form id="pengajuanForm" class="space-y-5">
            <section class="glass-panel p-5 rounded-3xl">
                <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="user" class="w-4 h-4 text-emerald-500"></i> Identitas Diri</h2>
                <div class="space-y-3">
                    <input type="text" id="nama" placeholder="Nama Sesuai KTP" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500 transition-all">
                    <input type="text" inputmode="numeric" id="nik" maxlength="20" placeholder="NIK KTP (16 Digit)" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none tracking-wide text-sm focus:border-emerald-500">
                    <input type="tel" id="wa" placeholder="WhatsApp Aktif" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                    <textarea id="alamat" rows="2" placeholder="Alamat Domisili" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-medium outline-none resize-none text-sm focus:border-emerald-500"></textarea>
                </div>
            </section>

            <section class="glass-panel p-5 rounded-3xl">
                <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="briefcase" class="w-4 h-4 text-emerald-500"></i> Pekerjaan & Kontak</h2>
                <div class="space-y-3">
                    <select id="pekerjaan" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                        <option value="" disabled selected>-- Pilih Profesi --</option>
                        <option value="Karyawan Swasta">Karyawan Swasta</option><option value="Wirausaha">Wirausaha</option><option value="Lainnya">Lainnya</option>
                    </select>
                    <select id="gaji" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                        <option value="" disabled selected>-- Estimasi Penghasilan --</option>
                        <option value="< Rp 3 Juta">< Rp 3 Juta</option><option value="Rp 3 - 5 Juta">Rp 3 - 5 Juta</option><option value="> Rp 5 Juta">> Rp 5 Juta</option>
                    </select>
                    <div class="p-3 bg-slate-50 border rounded-xl">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[10px] font-extrabold text-slate-400 uppercase">Kontak Darurat</label>
                            <button type="button" onclick="pickContact()" class="text-[9px] font-bold bg-indigo-100 text-indigo-600 px-2 py-1 rounded hover:bg-indigo-200 transition-colors">Pilih Kontak</button>
                        </div>
                        <input type="text" id="daruratNama" placeholder="Nama Kerabat" required class="w-full p-2.5 bg-white border rounded-lg text-sm font-bold outline-none mb-2 focus:border-emerald-500">
                        <input type="tel" id="daruratWa" placeholder="No. HP Kerabat" required class="w-full p-2.5 bg-white border rounded-lg text-sm font-bold outline-none focus:border-emerald-500">
                    </div>
                </div>
            </section>

            <section class="glass-panel p-5 rounded-3xl">
                <h2 class="text-sm font-extrabold mb-4 flex items-center gap-2 text-slate-800"><i data-lucide="shopping-bag" class="w-4 h-4 text-emerald-500"></i> Detail Akad Barang</h2>
                <div class="space-y-4">
                    <input type="text" id="barang" placeholder="Gadget Yang Diinginkan" required class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div class="relative flex items-center"><span class="absolute left-3 text-slate-400 font-bold text-xs">Rp</span><input type="text" id="hargaBarang" inputmode="numeric" placeholder="Harga Pokok" required class="w-full pl-9 pr-3 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500"></div>
                        <div class="relative flex items-center"><span class="absolute left-3 text-slate-400 font-bold text-xs">Rp</span><input type="text" id="dpBarang" inputmode="numeric" placeholder="DP (Uang Muka)" class="w-full pl-9 pr-3 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500"></div>
                    </div>

                    <div class="pt-2 border-t border-slate-100">
                        <label class="block text-[10px] font-bold text-slate-500 mb-1">Jalur Transaksi</label>
                        <select id="pilihJalur" required onchange="toggleJalur()" class="w-full px-4 py-3 bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                            <option value="REGULER" selected>REGULER (Margin 25%) - Tanpa Jaminan</option>
                            <option value="VIP">🌟 VIP (Margin 15%) - Titip Jaminan</option>
                        </select>
                    </div>

                    <div class="p-3 bg-amber-50/50 border border-amber-100 rounded-2xl">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="ticket-percent" class="w-3 h-3 text-amber-500"></i>
                            <span class="text-[9px] font-black text-amber-700 uppercase tracking-wider">Kode Promo</span>
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="inputVoucher" placeholder="Ketik kode..." class="flex-grow px-3 py-2 bg-white border border-amber-200 rounded-lg font-black uppercase outline-none text-xs focus:border-amber-500">
                            <button type="button" id="btnCekVoucher" onclick="verifikasiVoucher()" class="bg-amber-500 text-white px-3 rounded-lg font-bold text-[10px] active:scale-95 transition-all">Gunakan</button>
                        </div>
                        <p id="msgVoucher" class="text-[9px] mt-1.5 font-bold hidden"></p>
                    </div>

                    <div id="boxJaminan" class="hidden space-y-2 p-3 bg-emerald-50/50 border border-emerald-100 rounded-xl">
                        <select id="jenisJaminan" class="w-full px-4 py-3 bg-white border rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                            <option value="" disabled selected>-- Pilih Jenis Jaminan --</option>
                            <option value="BPKB Motor">BPKB Motor</option>
                            <option value="Ijazah Asli">Ijazah Asli</option>
                            <option value="Lainnya">Lainnya...</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-2 pt-2 border-t border-slate-100">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Jatuh Tempo</label>
                            <div class="relative flex items-center"><span class="absolute left-3 text-slate-400 font-bold text-xs">Tgl</span><input type="number" id="jatuhTempo" min="1" max="31" placeholder="25" required class="w-full pl-10 pr-3 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500"></div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1 uppercase">Tenor (Durasi)</label>
                            <select id="tenorSelect" class="w-full px-4 py-3 bg-slate-50 border rounded-xl font-bold outline-none text-sm focus:border-emerald-500">
                                <option value="3">3 Bulan</option>
                                <option value="5" selected>5 Bulan</option>
                                <option value="8">8 Bulan</option>
                                <option value="10">10 Bulan</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <div class="w-full h-24 shrink-0"></div>

            <div class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[92%] max-w-md z-50">
                <button type="submit" id="btnSubmitForm" class="w-full bg-slate-900 text-white font-extrabold py-4 px-6 rounded-2xl active:scale-95 transition-all flex justify-center items-center gap-2 shadow-2xl border border-slate-700">
                    <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i><span id="txtBtnSubmit">Ajukan Pembiayaan</span>
                </button>
            </div>
        </form>
    </main>

    <div id="instruksiModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4 opacity-0 transition-opacity">
        <div class="bg-white rounded-[2rem] p-6 max-w-[320px] w-full text-center shadow-2xl transform scale-95 transition-transform">
            <div class="w-16 h-16 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-4"><i data-lucide="check-circle" class="w-8 h-8 text-emerald-500"></i></div>
            <h3 class="text-lg font-extrabold text-slate-900 mb-1">Berhasil Disimpan</h3>
            <p class="text-slate-500 text-xs mb-6 leading-relaxed">Pengajuan Anda telah direkam oleh sistem. Silakan lanjutkan ke WhatsApp Admin untuk validasi.</p>
            <button onclick="location.reload()" class="w-full bg-slate-100 font-bold py-3 rounded-xl text-sm active:scale-95 transition-all">Selesai</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        let promoMarginAktif = null;

        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-emerald-500' : (type === 'info' ? 'bg-blue-500' : 'bg-red-500');
            const icon = type === 'success' ? 'check-circle' : (type === 'info' ? 'info' : 'alert-circle');
            toast.className = `${bgColor} text-white px-5 py-3.5 rounded-2xl shadow-xl flex items-center gap-3 fixed top-5 left-1/2 -translate-x-1/2 z-[1000] min-w-[250px] font-bold text-sm text-left pointer-events-auto`;
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5 shrink-0"></i><span>${message}</span>`;
            document.getElementById('toastContainer').appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.remove('-translate-y-10', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('-translate-y-10', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        function verifikasiVoucher() {
            const input = document.getElementById('inputVoucher'), msg = document.getElementById('msgVoucher'), btn = document.getElementById('btnCekVoucher');
            const kode = input.value.trim().toLowerCase();
            const jalurDipilih = document.getElementById('pilihJalur').value;
            const marginJalur = jalurDipilih === "VIP" ? 15 : 25;

            if(!kode) { showToast("Silakan masukkan kode voucher terlebih dahulu."); return; }
            if(CONFIG.VOUCHERS && CONFIG.VOUCHERS[kode]) {
                let marginVoucher = CONFIG.VOUCHERS[kode].margin;
                if (marginVoucher >= marginJalur) {
                    showToast(`Maaf, Jalur ${jalurDipilih} (${marginJalur}%) sudah lebih murah dari voucher ini (${marginVoucher}%).`, "info");
                    input.value = ""; return;
                }
                promoMarginAktif = marginVoucher;
                msg.innerText = "Kode Promo Aktif (Margin: " + marginVoucher + "%)";
                msg.className = "text-[9px] mt-1.5 font-bold text-emerald-600 block animate-pulse-soft";
                input.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                input.disabled = true; btn.classList.add('hidden');
                showToast(`Voucher Aktif. Margin menjadi ${marginVoucher}%`, "success");
            } else {
                promoMarginAktif = null;
                msg.innerText = "Kode voucher tidak valid.";
                msg.className = "text-[9px] mt-1.5 font-bold text-red-500 block";
            }
        }

        function toggleJalur() {
            const jalur = document.getElementById('pilihJalur').value;
            document.getElementById('boxJaminan').classList.toggle('hidden', jalur === 'REGULER');
            
            if (promoMarginAktif !== null) {
                promoMarginAktif = null; 
                const input = document.getElementById('inputVoucher'), btn = document.getElementById('btnCekVoucher'), msg = document.getElementById('msgVoucher');
                input.value = ""; input.disabled = false; input.classList.remove('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                btn.classList.remove('hidden'); msg.classList.add('hidden');
                showToast("Voucher dibatalkan otomatis karena perubahan jalur transaksi.", "info");
            }
        }

        const formatRupiah = (num) => (num === 0 || isNaN(num)) ? "" : new Intl.NumberFormat('id-ID').format(num);
        const parseRupiah = (str) => parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;

        ['hargaBarang', 'dpBarang'].forEach(id => { 
            document.getElementById(id).addEventListener('input', (e) => { e.target.value = formatRupiah(parseRupiah(e.target.value)); }); 
        });

        document.getElementById('nik').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '').substring(0, 16);
        });

        document.getElementById('wa').addEventListener('input', function() {
            let val = this.value.replace(/[^0-9]/g, ''); 
            if (val.startsWith('62')) val = '0' + val.substring(2); 
            this.value = val.substring(0, 15);
        });

        async function pickContact() {
            if (!('contacts' in navigator && 'ContactsManager' in window)) return showToast("Fitur pilih kontak tidak didukung pada peramban ini.", "info");
            try {
                const contacts = await navigator.contacts.select(['name', 'tel'], { multiple: false });
                if (contacts.length > 0) {
                    document.getElementById('daruratNama').value = contacts[0].name[0] || '';
                    let phone = contacts[0].tel[0].replace(/[^0-9]/g, '');
                    if (phone.startsWith('62')) phone = '0' + phone.substring(2);
                    document.getElementById('daruratWa').value = phone;
                }
            } catch (ex) { console.log(ex); }
        }

        // FORCE SUBMIT LOGIC
        document.getElementById('pengajuanForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmitForm');
            const nikClean = document.getElementById('nik').value;
            if (nikClean.length !== 16) return showToast("NIK KTP harus berjumlah tepat 16 digit.");

            const marginFix = promoMarginAktif ? promoMarginAktif : (document.getElementById('pilihJalur').value === "VIP" ? 15 : 25);
            const data = {
                nama: document.getElementById('nama').value, nik: nikClean, wa: document.getElementById('wa').value,
                alamat: document.getElementById('alamat').value, pekerjaan: document.getElementById('pekerjaan').value,
                gaji: document.getElementById('gaji').value, daruratNama: document.getElementById('daruratNama').value,
                daruratWa: document.getElementById('daruratWa').value, barang: document.getElementById('barang').value,
                harga: document.getElementById('hargaBarang').value, dp: document.getElementById('dpBarang').value || "0",
                tenor: document.getElementById('tenorSelect').value, 
                jaminan: document.getElementById('pilihJalur').value === "VIP" ? document.getElementById('jenisJaminan').value : "Tanpa Jaminan",
                jatuhTempo: document.getElementById('jatuhTempo').value, margin: marginFix
            };

            btn.disabled = true; btn.innerHTML = `<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Menyimpan...`;
            lucide.createIcons();
            const id = "ZN-" + Math.floor(100000 + Math.random() * 900000);

            try {
                fetch(CONFIG.API_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ tipe: "PENGAJUAN_BARU", idKontrak: id, timestamp: new Date().toLocaleString('id-ID'), ...data }) 
                });
                
                // --- PESAN WA: MAHASISWA KE DOSEN (Formal & Sopan) ---
                const waMsg = `Assalamu'alaikum Admin Zenith Cell.\n\nPermisi, saya bermaksud mengajukan pembiayaan dengan rincian sebagai berikut:\n\nID Pengajuan: ${id}\nNama: ${data.nama}\nBarang: ${data.barang}\nHarga Pokok: Rp ${data.harga}\nDP: Rp ${data.dp}\nTenor: ${data.tenor} Bulan\nJatuh Tempo: Tgl ${data.jatuhTempo}\nSkema: ${data.margin}% (${data.jaminan})\n\nBerikut saya lampirkan foto KTP dan jaminan fisik (jika ada).\nMohon arahannya untuk proses verifikasi lebih lanjut. Terima kasih.`;
                
                window.open(`https://api.whatsapp.com/send?phone=${CONFIG.WA_ADMIN}&text=${encodeURIComponent(waMsg)}`, '_blank');
                
                document.getElementById('instruksiModal').classList.replace('hidden', 'flex');
                setTimeout(() => document.getElementById('instruksiModal').classList.remove('opacity-0'), 10);
            } catch(error) {
                showToast("Terjadi kendala jaringan.");
                btn.disabled = false; btn.innerText = "Ajukan Pembiayaan";
            }
        });
    </script>
</body>
</html>
